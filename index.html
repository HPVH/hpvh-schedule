          const gc=(C||DEF_COLORS)[grp]||DEF_COLORS[grp];
          return(
            <div key={grp} style={{marginBottom:12}}>
              <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:4,padding:"4px 8px",borderRadius:6,background:gc.gbg,borderLeft:`2px solid ${gc.acc}`}}>
                <span style={{fontWeight:800,fontSize:10,color:gc.htx,letterSpacing:"0.15em"}}>{grp}</span>
                {!locked&&<Btn onClick={()=>{setNewEmpModal({weekId:week.id,grp,isBackfill});setNewEmpName("");}} style={{marginLeft:"auto",fontSize:8,color:gc.acc,background:"none",border:`1px solid ${gc.acc}88`}}>+ ADD</Btn>}
              </div>
              <table style={{width:"100%",borderCollapse:"separate",borderSpacing:0,minWidth:760}}>
                <colgroup><col style={{width:118}}/>{DAYS.map((_,i)=><col key={i} style={{minWidth:88}}/>)}<col style={{width:44}}/></colgroup>
                <tbody>
                  {(week.groups[grp]||[]).map((emp,ei)=>(
                    <tr key={emp.id} style={{background:ei%2===0?"#fff":gc.gbg+"66"}}>
                      <td style={{padding:"3px 5px",verticalAlign:"middle"}}>
                        <div style={{display:"flex",alignItems:"center",gap:3}}>
                          {!locked&&(
                            <div style={{display:"flex",flexDirection:"column",gap:1,flexShrink:0}}>
                              <Btn onClick={()=>moveFn(week.id,grp,ei,-1)} style={{padding:"1px 3px",fontSize:7,color:"#94a3b8"}}>▲</Btn>
                              <Btn onClick={()=>moveFn(week.id,grp,ei,1)} style={{padding:"1px 3px",fontSize:7,color:"#94a3b8"}}>▼</Btn>
                            </div>
                          )}
                          <div style={{width:4,height:4,borderRadius:"50%",background:gc.acc,flexShrink:0}}/>
                          <input value={emp.name} onChange={e=>!locked&&renameFn(week.id,grp,ei,e.target.value)} disabled={locked} style={{background:"none",border:"none",borderBottom:!locked?"1px solid #e2e8f0":"none",color:"#1e293b",fontWeight:600,fontSize:11,outline:"none",width:"100%",padding:"1px 2px"}}/>
                          {!locked&&<Btn onClick={()=>setDeleteConfirm({weekId:week.id,group:grp,empIdx:ei,name:emp.name,isBackfill})} variant="danger" style={{padding:"2px 4px",fontSize:8,flexShrink:0}}>✕</Btn>}
                        </div>
                      </td>
                      {emp.shifts.map((s,si)=>{
                        const dt=week.dates?.[si]||""; const isT=dt===todayStr();
                        return(
                          <ShiftCell key={si} s={s} group={grp} isAdmin={!locked} isToday={isT} C={C||DEF_COLORS} customDayLabels={customDayLabels}
                            onTap={rect=>!locked&&onSC&&onSC({weekId:week.id,group:grp,empIdx:ei,shiftIdx:si,rect,isMaster:!isBackfill,isBackfill,keepTags:s?.tg||[]})}
                            onLong={(x,y)=>!locked&&onRC&&onRC({weekId:week.id,group:grp,empIdx:ei,shiftIdx:si,x,y,isMaster:!isBackfill,isBackfill})}
                            onCtxMenu={(x,y)=>!locked&&onRC&&onRC({weekId:week.id,group:grp,empIdx:ei,shiftIdx:si,x,y,isMaster:!isBackfill,isBackfill})}
                            onHrsChange={v=>!locked&&updFn(week.id,grp,ei,si,{h:v})}
                            onSickHrsChange={v=>!locked&&updFn(week.id,grp,ei,si,{sh:v})}
                            onApprove={()=>{const req=requests?.find(r=>r.id===s?.reqId);if(req&&setRequests){setRequests(prev=>prev.map(r=>r.id===req.id?{...r,status:"APPROVED"}:r));updFn(week.id,grp,ei,si,{reqSt:"APPROVED"});}}}
                            onDeny={()=>{const req=requests?.find(r=>r.id===s?.reqId);if(req&&setRequests){setRequests(prev=>prev.map(r=>r.id===req.id?{...r,status:"DENIED"}:r));updFn(week.id,grp,ei,si,{st:null,t:"",reqId:null,reqSt:"DENIED"});}}}
                          />
                        );
                      })}
                      <td style={{padding:"3px 5px",verticalAlign:"middle"}}>
                        <div style={{background:"#f8fafc",border:"1px solid #e2e8f0",borderRadius:5,padding:"4px",fontSize:12,fontWeight:700,color:hrsColor(empTotal(emp),gc),textAlign:"center",minWidth:36}}>{empTotal(emp)}</div>
                      </td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          );
        })}
      </div>
    );
  };

  return(
    <div>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:14,padding:"9px 14px",background:"#fff",border:"1px solid #e2e8f0",borderRadius:9,boxShadow:"0 1px 3px rgba(0,0,0,0.06)"}}>
        <div style={{display:"flex",gap:4}}>
          <button onClick={()=>setTab("active")} style={{padding:"6px 14px",borderRadius:7,border:`1px solid ${tab==="active"?"#3b82f6":"#e2e8f0"}`,background:tab==="active"?"#eff6ff":"none",color:tab==="active"?"#1d4ed8":"#64748b",fontSize:10,cursor:"pointer",fontWeight:tab==="active"?700:400}}>⚙ Master Schedule</button>
          <button onClick={()=>setTab("backfill")} style={{padding:"6px 14px",borderRadius:7,border:`1px solid ${tab==="backfill"?"#7c3aed":"#e2e8f0"}`,background:tab==="backfill"?"#faf5ff":"none",color:tab==="backfill"?"#5b21b6":"#64748b",fontSize:10,cursor:"pointer",fontWeight:tab==="backfill"?700:400,position:"relative"}}>
            ⏪ Master Backfill{(masterBackfill||[]).length>0&&<span style={{marginLeft:4,background:"#7c3aed",color:"#fff",borderRadius:10,fontSize:7,padding:"1px 5px",fontWeight:700}}>{masterBackfill.length}</span>}
          </button>
          <button onClick={()=>setTab("archive")} style={{padding:"6px 14px",borderRadius:7,border:`1px solid ${tab==="archive"?"#d97706":"#e2e8f0"}`,background:tab==="archive"?"#fef9c3":"none",color:tab==="archive"?"#92400e":"#64748b",fontSize:10,cursor:"pointer",fontWeight:tab==="archive"?700:400,position:"relative"}}>
            📦 Master Archive{masterArchived.length>0&&<span style={{marginLeft:4,background:"#d97706",color:"#fff",borderRadius:10,fontSize:7,padding:"1px 5px",fontWeight:700}}>{masterArchived.length}</span>}
          </button>
        </div>
        {tab==="active"&&<Btn onClick={addWeek} variant="primary">+ NEW WEEK</Btn>}
        {tab==="backfill"&&(
          <div style={{display:"flex",gap:6}}>
            {(masterBackfill||[]).length===0&&<Btn onClick={seedBackfill} variant="primary" style={{fontSize:9}}>⏪ Seed Jan 1 → May 3</Btn>}
            <Btn onClick={addBackfillWeek} variant="primary" style={{fontSize:9}}>+ Add Backfill Week</Btn>
          </div>
        )}
      </div>
      {tab==="active"&&<DualScroll showTop><div style={{display:"flex",gap:14,alignItems:"flex-start",paddingBottom:24}}>{masterWeeks.length===0&&<div style={{padding:40,color:"#94a3b8",fontSize:11}}>No master weeks.</div>}{masterWeeks.map(w=>renderWeekCard(w,false,false))}</div></DualScroll>}
      {tab==="backfill"&&<DualScroll showTop><div style={{display:"flex",gap:14,alignItems:"flex-start",paddingBottom:24}}>{(masterBackfill||[]).length===0&&<div style={{padding:40,color:"#94a3b8",fontSize:11}}>No backfill weeks. Click <strong>Seed Jan 1 → May 3</strong> to pre-populate the date range, then fill in the schedule and archive each week to send it to Past Schedules + Master Archive.</div>}{(masterBackfill||[]).map(w=>renderWeekCard(w,false,true))}</div></DualScroll>}
      {tab==="archive"&&<DualScroll showTop><div style={{display:"flex",gap:14,alignItems:"flex-start",paddingBottom:24}}>{masterArchived.length===0&&<div style={{padding:40,color:"#94a3b8",fontSize:11}}>No archived master weeks.</div>}{masterArchived.map(w=>renderWeekCard(w,true,false))}</div></DualScroll>}

      {coverModal&&(
        <Modal onClose={()=>setCoverModal(null)}>
          <div style={{padding:24,width:420}}>
            <div style={{fontWeight:800,fontSize:14,color:"#dc2626",marginBottom:4}}>⚠ Coverage Issues</div>
            <div style={{fontSize:9,color:"#64748b",marginBottom:14}}>The following coverage rules are not met for this week:</div>
            <div style={{maxHeight:240,overflowY:"auto",marginBottom:16}}>
              {coverModal.flags.map((f,i)=>(
                <div key={i} style={{padding:"7px 10px",background:"#fff5f5",border:"1px solid #fecaca",borderRadius:6,marginBottom:4,fontSize:9,color:"#991b1b"}}>
                  <strong>{f.day}</strong> — {f.group}: {f.msg}
                </div>
              ))}
            </div>
            <div style={{display:"flex",gap:8}}>
              <Btn onClick={()=>{doPublish(coverModal.weekId);setCoverModal(null);}} variant="warning" style={{flex:1,fontSize:10}}>Override & Publish Anyway</Btn>
              <Btn onClick={()=>setCoverModal(null)} style={{fontSize:10}}>Go Back</Btn>
            </div>
          </div>
        </Modal>
      )}

      {newEmpModal&&(
        <Modal onClose={()=>setNewEmpModal(null)}>
          <div style={{padding:24,width:300}}>
            <div style={{fontWeight:700,fontSize:13,color:"#1e293b",marginBottom:12}}>Add New Employee</div>
            <input autoFocus value={newEmpName} onChange={e=>setNewEmpName(e.target.value)} onKeyDown={e=>e.key==="Enter"&&confirmAddEmp()} placeholder="Name" style={{width:"100%",background:"#f8fafc",border:"1px solid #e2e8f0",borderRadius:8,padding:"9px 12px",color:"#1e293b",fontSize:13,outline:"none",boxSizing:"border-box",marginBottom:12}}/>
            <div style={{display:"flex",gap:8}}>
              <Btn onClick={confirmAddEmp} variant="primary" disabled={!newEmpName.trim()} style={{flex:1,fontSize:11}}>Add</Btn>
              <Btn onClick={()=>setNewEmpModal(null)} style={{fontSize:11}}>Cancel</Btn>
            </div>
          </div>
        </Modal>
      )}

      {deleteConfirm&&(
        <Modal onClose={()=>setDeleteConfirm(null)}>
          <div style={{padding:24,width:340}}>
            <div style={{fontWeight:700,fontSize:13,color:"#dc2626",marginBottom:8}}>Delete Employee?</div>
            <div style={{fontSize:10,color:"#475569",marginBottom:16}}>Remove <strong>{deleteConfirm.name}</strong> from {deleteConfirm.group} starting from this week onward. Past weeks are untouched.</div>
            <div style={{display:"flex",gap:8}}>
              <Btn onClick={confirmDelEmp} variant="danger" style={{flex:1,fontSize:11}}>Delete</Btn>
              <Btn onClick={()=>setDeleteConfirm(null)} style={{fontSize:11}}>Cancel</Btn>
            </div>
          </div>
        </Modal>
      )}
    </div>
  );
}

/* ── PAST SCHEDULES ─────────────────────────────────────────────── */
function PastSchedules({archived,onUnarchive,onArchiveToMaster,C}){
  const tabs=[...new Set(archived.map(monthYear))];
  const [active,setActive]=useState(null);
  useEffect(()=>{if(tabs.length&&!tabs.includes(active))setActive(tabs[0]);},[archived.length]);
  if(!archived.length) return <div style={{textAlign:"center",padding:60,color:"#94a3b8",fontSize:11}}><div style={{fontSize:32,marginBottom:8}}>📦</div>No past schedules yet.</div>;
  const cur=active||tabs[0];
  const tw=archived.filter(w=>monthYear(w)===cur);
  const allNames={}; GROUPS.forEach(g=>{allNames[g]=[];const seen=new Set();tw.forEach(w=>(w.groups[g]||[]).forEach(e=>{if(!seen.has(e.name)){seen.add(e.name);allNames[g].push(e.name);}}));});
  return(
    <div>
      <div style={{display:"flex",gap:6,marginBottom:14,flexWrap:"wrap"}}>
        {tabs.map(t=><button key={t} onClick={()=>setActive(t)} style={{padding:"5px 14px",borderRadius:7,border:`1px solid ${cur===t?"#3b82f6":"#e2e8f0"}`,background:cur===t?"#eff6ff":"#fff",color:cur===t?"#1d4ed8":"#64748b",fontSize:9,cursor:"pointer",fontWeight:cur===t?700:400}}>{t}</button>)}
      </div>
      {tw.length===0?<div style={{padding:40,color:"#94a3b8",textAlign:"center",fontSize:11}}>No weeks here.</div>:(
        <DualScroll>
          <table style={{borderCollapse:"separate",borderSpacing:0,minWidth:"max-content",background:"#fff",borderRadius:8,overflow:"hidden",boxShadow:"0 1px 4px rgba(0,0,0,0.08)"}}>
            <thead>
              <tr style={{background:"#f8fafc"}}>
                <th style={{position:"sticky",left:0,zIndex:11,background:"#f8fafc",minWidth:118,padding:"6px 10px",borderBottom:"2px solid #e2e8f0",borderRight:"2px solid #e2e8f0",fontSize:9,color:"#64748b",textAlign:"left",fontWeight:700}}>STAFF</th>
                {tw.map((w,wi)=>(
                  <th key={w.id} colSpan={8} style={{background:"#f8fafc",borderBottom:"2px solid #e2e8f0",borderLeft:wi>0?"2px solid #e2e8f0":"none",padding:"6px 10px",fontWeight:700,fontSize:13,color:"#1e293b",textAlign:"left",whiteSpace:"nowrap"}}>
                    <div style={{display:"flex",alignItems:"center",gap:7}}>
                      <span>{w.label}</span>
                      <Btn onClick={()=>onUnarchive(w.id)} variant="success" style={{fontSize:7,padding:"2px 6px"}}>↩ Restore</Btn>
                      {onArchiveToMaster&&<Btn onClick={()=>onArchiveToMaster(w.id)} style={{fontSize:7,padding:"2px 6px",color:"#d97706",border:"1px solid #fde047",background:"#fef9c3"}}>📦 → Master Archive</Btn>}
                    </div>
                  </th>
                ))}
              </tr>
            </thead>
            <tbody>
              {GROUPS.flatMap(grp=>{
                const gc=(C||DEF_COLORS)[grp]||DEF_COLORS[grp]; const names=allNames[grp];
                if(!names.length)return[];
                return[
                  <tr key={`gh-${grp}`} style={{background:gc.gbg}}>
                    <td colSpan={1+tw.length*8} style={{padding:"4px 12px",borderTop:"2px solid #e2e8f0"}}>
                      <span style={{fontWeight:800,fontSize:11,color:gc.htx,letterSpacing:"0.15em"}}>{grp}</span>
                    </td>
                  </tr>,
                  <tr key={`dh-${grp}`} style={{background:gc.gbg}}>
                    <td style={{position:"sticky",left:0,zIndex:6,background:gc.gbg,padding:"2px 10px",borderRight:"2px solid #e2e8f0",borderBottom:"1px solid #e2e8f0"}}/>
                    {tw.flatMap((w,wi)=>[...DAYS.map((d,di)=>(
                      <td key={`${w.id}-${d}`} style={{textAlign:"center",padding:"3px 2px",fontSize:11,fontWeight:700,color:gc.htx,borderLeft:di===0&&wi>0?"2px solid #e2e8f0":"none",borderBottom:"1px solid #e2e8f0",minWidth:88,background:gc.gbg}}>
                        <div>{d}</div><div style={{fontSize:8,color:gc.acc,fontWeight:400}}>{w.dates?.[di]||""}</div>
                      </td>
                    )),<td key={`${w.id}-h`} style={{textAlign:"center",padding:"2px 4px",fontSize:8,color:gc.acc,borderLeft:"1px solid #e2e8f0",borderBottom:"1px solid #e2e8f0",background:gc.gbg,fontWeight:600}}>HRS</td>])}
                  </tr>,
                  ...names.map((name,ni)=>(
                    <tr key={`${grp}-${name}`} style={{background:ni%2===0?"#fff":gc.gbg+"88"}}>
                      <td style={{position:"sticky",left:0,zIndex:5,background:ni%2===0?"#fff":gc.gbg+"cc",padding:"3px 10px",verticalAlign:"middle",borderRight:"2px solid #e2e8f0",whiteSpace:"nowrap"}}>
                        <div style={{display:"flex",alignItems:"center",gap:5}}>
                          <div style={{width:6,height:6,borderRadius:"50%",background:gc.acc}}/>
                          <span style={{fontWeight:600,fontSize:11,color:"#1e293b"}}>{name}</span>
                        </div>
                      </td>
                      {tw.flatMap((week,wi)=>{
                        const ei=(week.groups[grp]||[]).findIndex(e=>e.name===name);
                        const emp=ei>=0?week.groups[grp][ei]:null;
                        const tot=emp?empTotal(emp):0;
                        const cells=emp?emp.shifts.map((s,si)=>{
                          const sc=getShiftColor(s,grp,C||DEF_COLORS);
                          return <td key={`${week.id}-${si}`} style={{padding:0,height:CELL_HEIGHT,maxHeight:CELL_HEIGHT,minWidth:88,maxWidth:88,overflow:"hidden",...(si===0&&wi>0?{borderLeft:"2px solid #e2e8f0"}:{})}}>
                            <div style={{background:sc.bg,border:`1px solid ${sc.bo}`,borderRadius:6,margin:"3px 2px",padding:"5px 7px",height:`calc(${CELL_HEIGHT}px - 6px)`,boxSizing:"border-box",display:"flex",flexDirection:"column",justifyContent:"center",position:"relative",overflow:"hidden"}}>
                              {s?.st==="VAC"&&<div style={{fontSize:12,fontWeight:700,color:sc.tx}}>🌴 VAC</div>}
                              {s?.st==="OFF"&&<div style={{fontSize:11,color:sc.tx}}>OFF</div>}
                              {s?.st==="CLOSED"&&<div style={{fontSize:10,color:sc.tx,fontWeight:600}}>CLOSED</div>}
                              {s?.st==="SICK"&&<div style={{fontSize:9,color:sc.tx,fontWeight:700}}>🤒 SICK{s.sh?` ${s.sh}h`:""}</div>}
                              {!s?.st&&s?.t&&<div style={{fontSize:12,fontWeight:700,color:sc.tx}}>{s.t}</div>}
                              {s?.swapped&&<div style={{position:"absolute",bottom:3,right:4,fontSize:7,color:sc.tx,opacity:0.8}}>↔</div>}
                            </div>
                          </td>;
                        }):Array(7).fill(0).map((_,si)=><td key={`${week.id}-e${si}`} style={{padding:0,height:CELL_HEIGHT,maxHeight:CELL_HEIGHT,minWidth:88,maxWidth:88,overflow:"hidden",...(si===0&&wi>0?{borderLeft:"2px solid #e2e8f0"}:{})}}><div style={{background:EMPTY_C.bg,border:`1px solid ${EMPTY_C.bo}`,borderRadius:6,margin:"3px 2px",height:`calc(${CELL_HEIGHT}px - 6px)`}}/></td>);
                        return[...cells,<td key={`${week.id}-tot`} style={{padding:"3px 5px",verticalAlign:"middle",borderLeft:"1px solid #e2e8f0"}}>{emp&&<div style={{background:"#f8fafc",border:"1px solid #e2e8f0",borderRadius:5,padding:"4px",fontSize:12,fontWeight:700,color:hrsColor(tot,gc),textAlign:"center",minWidth:36}}>{tot}</div>}</td>];
                      })}
                    </tr>
                  ))
                ];
              })}
            </tbody>
          </table>
        </DualScroll>
      )}
    </div>
  );
}

/* ── STATS & REQUESTS ───────────────────────────────────────────── */
function StatsPage({requests,liveWeeks,liveArchived,masterWeeks,masterArchived,masterBackfill,C}){
  const [tab,setTab]=useState("hours");
  const today=new Date();
  const todayKey=todayStr();
  const [year,setYear]=useState(today.getFullYear());
  const [hoursFilter,setHoursFilter]=useState("total"); // total | year | month | period
  const [filterMonth,setFilterMonth]=useState(today.getMonth());
  const [filterPeriod,setFilterPeriod]=useState(0); // 0=1st(30-14), 1=2nd(15-29)

  // v2: Pull from ALL data sources — Live + Live Archive + Master + Master Archive + Master Backfill
  const allWeeks=useMemo(()=>[
    ...(liveWeeks||[]),
    ...(liveArchived||[]),
    ...(masterWeeks||[]),
    ...(masterArchived||[]),
    ...(masterBackfill||[])
  ],[liveWeeks,liveArchived,masterWeeks,masterArchived,masterBackfill]);

  const gc=grp=>(C||DEF_COLORS)[grp]||DEF_COLORS[grp];

  // Determine if a date string falls within a filter
  const inYear=(dateStr)=>{
    // Date strings are "DD-MMM" — assume year matches `year` state for now (v2: when GAS-backed, store year)
    if(!dateStr)return false;
    return true; // current implementation assumes 2026; year filter is forward-looking
  };
  const inMonth=(dateStr,m)=>{
    if(!dateStr)return false;
    const parts=dateStr.split("-");
    if(parts.length<2)return false;
    return MON.indexOf(parts[1])===m;
  };
  const inPayPeriod=(dateStr,m,p)=>{
    if(!dateStr)return false;
    const parts=dateStr.split("-");
    if(parts.length<2)return false;
    const d=parseInt(parts[0]); const mo=MON.indexOf(parts[1]);
    if(p===0){
      // 1st period: 30 of (m-1) through 14 of m
      return (mo===m&&d<=14)||(mo===((m-1+12)%12)&&d>=30);
    } else {
      // 2nd period: 15 of m through 29 of m
      return mo===m&&d>=15&&d<=29;
    }
  };

  const dateMatches=(dateStr)=>{
    if(hoursFilter==="total")return true;
    if(hoursFilter==="year")return inYear(dateStr);
    if(hoursFilter==="month")return inYear(dateStr)&&inMonth(dateStr,filterMonth);
    if(hoursFilter==="period")return inYear(dateStr)&&inPayPeriod(dateStr,filterMonth,filterPeriod);
    return true;
  };

  // Build aggregate map for hours/sick (filtered)
  const empAgg=useMemo(()=>{
    const map={};
    const seen=new Set(); // dedupe (week.id × emp.name × group × shiftIdx)
    allWeeks.forEach(w=>GROUPS.forEach(g=>(w.groups[g]||[]).forEach(e=>{
      const k=`${e.name}||${g}`;
      if(!map[k])map[k]={name:e.name,group:g,hours:0,sickDays:0,sickHours:0};
      e.shifts.forEach((s,si)=>{
        if(!s)return;
        const dt=w.dates?.[si];
        if(!dt)return;
        if(!dateMatches(dt))return;
        const dedupeKey=`${w.id}::${e.name}::${g}::${si}`;
        if(seen.has(dedupeKey))return;
        seen.add(dedupeKey);
        if(s.st==="SICK"){map[k].sickDays++;if(s.sh)map[k].sickHours+=s.sh;}
        else if(!s.st&&s.t)map[k].hours+=s.h||0;
      });
    })));
    return Object.values(map);
  },[allWeeks,hoursFilter,filterMonth,filterPeriod,year]);

  // v2: Vacation broken into Taken / Upcoming / Awaiting
  const vacAgg=useMemo(()=>{
    const map={};
    const todayD=parseDate(todayKey);
    const liveDateSet=new Set();
    (liveWeeks||[]).forEach(w=>w.dates.forEach(d=>{if(d)liveDateSet.add(d);}));

    // From archived & live weeks: VAC days = TAKEN if past or APPROVED-on-live, UPCOMING if APPROVED-future
    [...(liveWeeks||[]),...(liveArchived||[])].forEach(w=>GROUPS.forEach(g=>(w.groups[g]||[]).forEach(e=>{
      const k=`${e.name}||${g}`;
      if(!map[k])map[k]={name:e.name,group:g,taken:0,upcoming:0,awaiting:0};
      e.shifts.forEach((s,si)=>{
        if(s?.st!=="VAC")return;
        const dt=w.dates?.[si];if(!dt)return;
        const d=parseDate(dt);
        if(d<todayD)map[k].taken++;
        else map[k].upcoming++;
      });
    })));
    // From master + backfill: pending requests count as awaiting; future approved = upcoming; past = taken
    [...(masterWeeks||[]),...(masterBackfill||[])].forEach(w=>GROUPS.forEach(g=>(w.groups[g]||[]).forEach(e=>{
      const k=`${e.name}||${g}`;
      if(!map[k])map[k]={name:e.name,group:g,taken:0,upcoming:0,awaiting:0};
      e.shifts.forEach((s,si)=>{
        if(s?.st!=="VAC")return;
        const dt=w.dates?.[si];if(!dt)return;
        if(liveDateSet.has(dt))return; // already counted in live pass
        if(s.reqSt==="PENDING"){map[k].awaiting++;return;}
        const d=parseDate(dt);
        if(d<todayD)map[k].taken++;
        else map[k].upcoming++;
      });
    })));
    return Object.values(map);
  },[liveWeeks,liveArchived,masterWeeks,masterBackfill,todayKey]);

  const monthOptions=MON.map((m,i)=>({label:m,value:i}));
  const yearOptions=[2024,2025,2026,2027,2028];

  return(
    <div>
      <div style={{display:"flex",gap:4,marginBottom:14,flexWrap:"wrap",alignItems:"center"}}>
        {["hours","vacation","sick"].map(t=><button key={t} onClick={()=>setTab(t)} style={{padding:"7px 16px",borderRadius:7,border:`1px solid ${tab===t?"#3b82f6":"#e2e8f0"}`,background:tab===t?"#eff6ff":"#fff",color:tab===t?"#1d4ed8":"#64748b",fontSize:10,cursor:"pointer",fontWeight:tab===t?700:400,textTransform:"capitalize"}}>{t==="hours"?"Hours":t==="vacation"?"Vacation":"Sick Days"}</button>)}
        <div style={{flex:1}}/>
        {/* v2: Year filter shown for all tabs */}
        <span style={{fontSize:9,color:"#64748b",fontWeight:600}}>YEAR</span>
        <select value={year} onChange={e=>setYear(+e.target.value)} style={{fontSize:10,padding:"5px 8px",border:"1px solid #e2e8f0",borderRadius:6,background:"#fff",color:"#475569"}}>{yearOptions.map(y=><option key={y} value={y}>{y}</option>)}</select>
      </div>

      {/* v2: Hours-specific filters */}
      {tab==="hours"&&(
        <div style={{display:"flex",gap:6,marginBottom:12,padding:"8px 12px",background:"#fff",border:"1px solid #e2e8f0",borderRadius:8,alignItems:"center",flexWrap:"wrap"}}>
          <span style={{fontSize:9,fontWeight:700,color:"#64748b",letterSpacing:"0.05em"}}>FILTER:</span>
          {[["total","Total"],["year","Year"],["month","Month"],["period","Pay Period"]].map(([id,l])=>(
            <button key={id} onClick={()=>setHoursFilter(id)} style={{padding:"4px 10px",borderRadius:6,border:`1px solid ${hoursFilter===id?"#3b82f6":"#e2e8f0"}`,background:hoursFilter===id?"#eff6ff":"#f8fafc",color:hoursFilter===id?"#1d4ed8":"#64748b",fontSize:9,cursor:"pointer",fontWeight:hoursFilter===id?700:500}}>{l}</button>
          ))}
          {(hoursFilter==="month"||hoursFilter==="period")&&(
            <select value={filterMonth} onChange={e=>setFilterMonth(+e.target.value)} style={{fontSize:9,padding:"4px 8px",border:"1px solid #e2e8f0",borderRadius:6,background:"#fff",color:"#475569",marginLeft:6}}>{monthOptions.map(o=><option key={o.value} value={o.value}>{o.label}</option>)}</select>
          )}
          {hoursFilter==="period"&&(
            <select value={filterPeriod} onChange={e=>setFilterPeriod(+e.target.value)} style={{fontSize:9,padding:"4px 8px",border:"1px solid #e2e8f0",borderRadius:6,background:"#fff",color:"#475569"}}>
              {PAY_PERIODS.map((p,i)=><option key={i} value={i}>{p.label}</option>)}
            </select>
          )}
        </div>
      )}

      <div style={{background:"#fff",border:"1px solid #e2e8f0",borderRadius:10,overflow:"hidden",boxShadow:"0 1px 3px rgba(0,0,0,0.06)"}}>
        <table style={{width:"100%",borderCollapse:"collapse"}}>
          <thead><tr style={{background:"#f8fafc"}}>
            <th style={{padding:"8px 12px",textAlign:"left",fontSize:9,fontWeight:700,color:"#64748b",borderBottom:"1px solid #e2e8f0"}}>NAME</th>
            <th style={{padding:"8px 12px",textAlign:"left",fontSize:9,fontWeight:700,color:"#64748b",borderBottom:"1px solid #e2e8f0"}}>GROUP</th>
            {tab==="hours"&&<th style={{padding:"8px 12px",textAlign:"right",fontSize:9,fontWeight:700,color:"#64748b",borderBottom:"1px solid #e2e8f0"}}>HOURS</th>}
            {tab==="vacation"&&<>
              <th style={{padding:"8px 12px",textAlign:"right",fontSize:9,fontWeight:700,color:"#64748b",borderBottom:"1px solid #e2e8f0"}}>TAKEN</th>
              <th style={{padding:"8px 12px",textAlign:"right",fontSize:9,fontWeight:700,color:"#64748b",borderBottom:"1px solid #e2e8f0"}}>UPCOMING</th>
              <th style={{padding:"8px 12px",textAlign:"right",fontSize:9,fontWeight:700,color:"#64748b",borderBottom:"1px solid #e2e8f0"}}>AWAITING</th>
            </>}
            {tab==="sick"&&<>
              <th style={{padding:"8px 12px",textAlign:"right",fontSize:9,fontWeight:700,color:"#64748b",borderBottom:"1px solid #e2e8f0"}}>SICK DAYS</th>
              <th style={{padding:"8px 12px",textAlign:"right",fontSize:9,fontWeight:700,color:"#64748b",borderBottom:"1px solid #e2e8f0"}}>SICK HRS</th>
            </>}
          </tr></thead>
          <tbody>
            {GROUPS.flatMap(grp=>{
              const data=tab==="vacation"?vacAgg.filter(e=>e.group===grp):empAgg.filter(e=>e.group===grp);
              if(!data.length)return[];
              const g=gc(grp);
              return[
                <tr key={`gh-${grp}`}><td colSpan={tab==="vacation"?5:tab==="sick"?4:3} style={{padding:"6px 12px",background:g.gbg,borderTop:"2px solid #e2e8f0"}}><span style={{fontWeight:700,fontSize:10,color:g.htx}}>{grp}</span></td></tr>,
                ...data.map((e,i)=>{
                  return <tr key={e.name} style={{background:i%2===0?"#fff":g.gbg+"44"}}>
                    <td style={{padding:"7px 12px",fontSize:11,color:"#1e293b",fontWeight:600}}>{e.name}</td>
                    <td style={{padding:"7px 12px",fontSize:9}}><span style={{padding:"2px 7px",borderRadius:20,background:g.cbg,border:`1px solid ${g.cbo}`,color:g.htx,fontWeight:600}}>{grp}</span></td>
                    {tab==="hours"&&<td style={{padding:"7px 12px",textAlign:"right",fontSize:12,fontWeight:700,color:hrsColor(e.hours,g)}}>{e.hours}h</td>}
                    {tab==="vacation"&&<>
                      <td style={{padding:"7px 12px",textAlign:"right",fontSize:12,fontWeight:700,color:e.taken>0?"#475569":"#cbd5e1"}}>{e.taken}</td>
                      <td style={{padding:"7px 12px",textAlign:"right",fontSize:12,fontWeight:700,color:e.upcoming>0?"#16a34a":"#cbd5e1"}}>{e.upcoming}</td>
                      <td style={{padding:"7px 12px",textAlign:"right",fontSize:12,fontWeight:700,color:e.awaiting>0?"#f59e0b":"#cbd5e1"}}>{e.awaiting}</td>
                    </>}
                    {tab==="sick"&&<>
                      <td style={{padding:"7px 12px",textAlign:"right",fontSize:12,fontWeight:700,color:e.sickDays>0?"#dc2626":"#cbd5e1"}}>{e.sickDays}</td>
                      <td style={{padding:"7px 12px",textAlign:"right",fontSize:11,fontWeight:600,color:e.sickHours>0?"#991b1b":"#cbd5e1"}}>{e.sickHours||0}h</td>
                    </>}
                  </tr>;
                })
              ];
            })}
          </tbody>
        </table>
      </div>

      <div style={{marginTop:20,background:"#fff",border:"1px solid #e2e8f0",borderRadius:10,padding:16,boxShadow:"0 1px 3px rgba(0,0,0,0.06)"}}>
        <div style={{fontWeight:700,fontSize:12,color:"#475569",marginBottom:10}}>Past Requests</div>
        {requests.length===0?<div style={{fontSize:10,color:"#94a3b8"}}>No requests yet.</div>
        :requests.filter(r=>r.status!=="PENDING").slice().reverse().map(r=>{
          const g=gc(r.group);
          return <div key={r.id} style={{display:"flex",gap:10,padding:"8px 0",borderBottom:"1px solid #f1f5f9",alignItems:"center",flexWrap:"wrap"}}>
            <span style={{fontSize:9,padding:"2px 7px",borderRadius:20,background:r.status==="APPROVED"?"#dcfce7":"#fee2e2",color:r.status==="APPROVED"?"#15803d":"#991b1b",fontWeight:700,border:`1px solid ${r.status==="APPROVED"?"#86efac":"#fca5a5"}`}}>{r.status}</span>
            <span style={{fontWeight:600,fontSize:10,color:"#1e293b"}}>{r.empName}</span>
            <span style={{fontSize:9,padding:"2px 6px",borderRadius:20,background:g.cbg,color:g.htx,fontWeight:600}}>{r.group}</span>
            <span style={{fontSize:9,color:"#64748b"}}>{REQ_TYPES[r.type]?.s||r.type} · {r.dates?.join(", ")}</span>
            <span style={{marginLeft:"auto",fontSize:8,color:"#94a3b8"}}>{r.ts}</span>
          </div>;
        })}
      </div>
    </div>
  );
}

/* ── AUDIT LOG PAGE ─────────────────────────────────────────────── */
function AuditPage({auditLog,masterWeeks,masterArchived,deletedEmps}){
  const [selEmp,setSelEmp]=useState(null);
  const allWeeks=[...(masterWeeks||[]),...(masterArchived||[])];
  const liveOrder=useMemo(()=>{
    const seen=new Set(); const out=[];
    allWeeks.forEach(w=>GROUPS.forEach(g=>(w.groups[g]||[]).forEach(e=>{const k=`${e.name}||${g}`;if(!seen.has(k)){seen.add(k);out.push({name:e.name,group:g});}})));
    return out;
  },[masterWeeks,masterArchived]);
  const liveKeys=new Set(liveOrder.map(e=>`${e.name}||${e.group}`));
  const auditActors=[...new Set(auditLog.map(e=>e.actor))];
  const deletedFromAudit=auditActors.filter(n=>!liveOrder.some(e=>e.name===n)&&n!=="Admin").map(n=>({name:n,group:"—",deleted:true}));
  const extraDeleted=(deletedEmps||[]).filter(d=>!liveKeys.has(`${d.name}||${d.group}`)&&!deletedFromAudit.some(x=>x.name===d.name));
  const employees=[...liveOrder,...deletedFromAudit,...extraDeleted];
  const empLog=selEmp?auditLog.filter(e=>e.actor===selEmp):[];
  return(
    <div>
      <div style={{padding:"10px 14px",background:"#fff",border:"1px solid #e2e8f0",borderRadius:9,marginBottom:14,boxShadow:"0 1px 3px rgba(0,0,0,0.06)"}}>
        <div style={{fontWeight:800,fontSize:13,color:"#1e293b"}}>🗓 Audit Log</div>
        <div style={{fontSize:9,color:"#94a3b8"}}>Login and action events.</div>
      </div>
      <div style={{display:"flex",gap:14,alignItems:"flex-start"}}>
        <div style={{width:180,flexShrink:0,background:"#fff",border:"1px solid #e2e8f0",borderRadius:9,overflow:"hidden",boxShadow:"0 1px 3px rgba(0,0,0,0.06)"}}>
          <div style={{padding:"8px 12px",background:"#f8fafc",borderBottom:"1px solid #e2e8f0",fontSize:9,fontWeight:700,color:"#64748b"}}>EMPLOYEES</div>
          {employees.length===0&&<div style={{padding:16,fontSize:9,color:"#94a3b8"}}>No data yet.</div>}
          {employees.map((emp,idx)=>{
            const name=emp.name;
            const gc=emp.group&&DEF_COLORS[emp.group]?DEF_COLORS[emp.group]:DEF_COLORS.Tech;
            const count=auditLog.filter(a=>a.actor===name).length;
            const lastLogin=auditLog.filter(a=>a.actor===name&&a.type==="login").slice(-1)[0];
            return(
              <div key={`${name}-${idx}`} onClick={()=>setSelEmp(selEmp===name?null:name)} style={{padding:"9px 12px",borderBottom:"1px solid #f1f5f9",cursor:"pointer",background:selEmp===name?"#eff6ff":"none"}}>
                <div style={{display:"flex",alignItems:"center",gap:5,marginBottom:1}}>
                  {emp.group&&emp.group!=="—"&&<div style={{width:5,height:5,borderRadius:"50%",background:gc.acc}}/>}
                  <div style={{fontWeight:600,fontSize:11,color:emp.deleted?"#94a3b8":"#1e293b"}}>{name}{emp.deleted?" ✕":""}</div>
                </div>
                <div style={{fontSize:7,color:gc.htx,marginBottom:1}}>{emp.group&&emp.group!=="—"?emp.group:""}</div>
                <div style={{fontSize:8,color:"#94a3b8"}}>{count} event{count!==1?"s":""}</div>
                {lastLogin&&<div style={{fontSize:7,color:"#64748b"}}>Last: {lastLogin.ts}</div>}
              </div>
            );
          })}
        </div>
        <div style={{flex:1}}>
          {!selEmp?<div style={{padding:40,textAlign:"center",color:"#94a3b8",fontSize:11,background:"#fff",border:"1px solid #e2e8f0",borderRadius:9}}>Select an employee to view their audit trail.</div>:(
            <div style={{background:"#fff",border:"1px solid #e2e8f0",borderRadius:9,overflow:"hidden"}}>
              <div style={{padding:"8px 14px",background:"#f8fafc",borderBottom:"1px solid #e2e8f0",display:"flex",gap:8,alignItems:"center"}}>
                <span style={{fontWeight:700,fontSize:12,color:"#1e293b"}}>{selEmp}</span>
                <span style={{fontSize:8,color:"#94a3b8"}}>{empLog.length} events</span>
              </div>
              {empLog.length===0?<div style={{padding:20,fontSize:9,color:"#94a3b8"}}>No events yet.</div>:(
                <div style={{maxHeight:500,overflowY:"auto"}}>
                  {empLog.slice().reverse().map((entry,i)=>(
                    <div key={i} style={{display:"flex",gap:12,padding:"9px 14px",borderBottom:"1px solid #f1f5f9",alignItems:"flex-start"}}>
                      <div style={{width:8,height:8,borderRadius:"50%",background:entry.type==="login"?"#3b82f6":"#16a34a",flexShrink:0,marginTop:3}}/>
                      <div style={{flex:1}}>
                        <div style={{fontSize:10,fontWeight:600,color:"#1e293b"}}>{entry.description}</div>
                        <div style={{fontSize:8,color:"#94a3b8",marginTop:2}}>{entry.ts}</div>
                      </div>
                      <span style={{fontSize:7,padding:"1px 6px",borderRadius:10,background:entry.type==="login"?"#eff6ff":"#f0fdf4",color:entry.type==="login"?"#1d4ed8":"#15803d",fontWeight:700}}>{entry.type}</span>
                    </div>
                  ))}
                </div>
              )}
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

/* ── ADMIN PAGE ─────────────────────────────────────────────────── */
function AdminPage({C,setC,pwd,setPwd,pwd2,setPwd2,adminName1,setAdminName1,adminName2,setAdminName2,adminPin1,setAdminPin1,adminPin2,setAdminPin2,staffPins,setStaffPins,viewerPins,setViewerPins,lockMs,setLockMs,auditLog,liveWeeks,masterWeeks,liveArchived,masterArchived,requests,messages,swapRequests,onClearAll,deletedEmps,customDayLabels,setCustomDayLabels,cellTypeStyles,setCellTypeStyles,customCellTypes,setCustomCellTypes,setLiveWeeks,setLiveArchived,setMasterWeeks,setMasterArchived,gasPost,loadPinsFromGas}){
  const [adminTab,setAdminTab]=useState("settings");
  const [editingPin,setEditingPin]=useState(null);
  const [pinInput,setPinInput]=useState("");
  const [pinMsg,setPinMsg]=useState("");
  const [revealPin,setRevealPin]=useState(null);
  const [pinSection,setPinSection]=useState(true);
  const [newViewerName,setNewViewerName]=useState("");
  const [newViewerPin,setNewViewerPin]=useState("");
  const [viewerMsg,setViewerMsg]=useState("");
  const [customLabelInput,setCustomLabelInput]=useState(customDayLabels?.[0]||"Custom");
  const [archiveMsg,setArchiveMsg]=useState("");
  const [clearModal,setClearModal]=useState(false);

  const allPins=[...staffPins.map(s=>s.pin).filter(Boolean),...viewerPins.map(v=>v.pin).filter(Boolean),adminPin1,adminPin2].filter(Boolean);

  const setPin=(name,group,pin,onDup)=>{
    if(pin&&allPins.includes(pin)&&staffPins.find(s=>s.name===name&&s.group===group)?.pin!==pin){if(onDup)onDup();setPinMsg("⚠ That PIN is already used.");return;}
    const updated=staffPins.map(s=>s.name===name&&s.group===group?{...s,pin}:s);
    setStaffPins(updated);
    // Sync to GAS server so PINs never live in browser storage
    if(gasPost&&pwd){gasPost({action:"savePins",pins:updated,adminPwd:pwd}).catch(()=>setPinMsg("⚠ PIN saved locally but server sync failed."));}
    setPinMsg("");
  };

  const addViewer=()=>{
    if(!newViewerName.trim()||newViewerPin.length<3){setViewerMsg("Name and 3-4 digit PIN required.");return;}
    if(allPins.includes(newViewerPin)){setViewerMsg("⚠ PIN already used.");return;}
    setViewerPins(prev=>[...prev,{id:uid(),name:newViewerName.trim(),pin:newViewerPin}]);
    setNewViewerName("");setNewViewerPin("");setViewerMsg("✓ Added");setTimeout(()=>setViewerMsg(""),2000);
  };

  const grouped=GROUPS.map(group=>({group,staff:staffPins.filter(s=>s.group===group)}));

  const downloadSnapshot=()=>{
    try{
      const html=`<!DOCTYPE html><html><head><title>HPVH Snapshot ${new Date().toLocaleDateString()}</title></head><body><pre>${JSON.stringify({liveWeeks,masterWeeks,liveArchived,masterArchived,requests,messages,swapRequests},null,2)}</pre></body></html>`;
      const blob=new Blob([html],{type:"text/html"});
      const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download=`hpvh-snapshot-${new Date().toISOString().slice(0,10)}.html`;a.click();
      setArchiveMsg("✓ Snapshot downloaded.");setTimeout(()=>setArchiveMsg(""),3000);
    }catch(e){setArchiveMsg("Error creating snapshot.");}
  };

  const exportJSON=()=>{
    const data=JSON.stringify({liveWeeks,masterWeeks,liveArchived,masterArchived,requests,messages,swapRequests,staffPins,viewerPins},null,2);
    const blob=new Blob([data],{type:"application/json"});
    const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download=`hpvh-data-${new Date().toISOString().slice(0,10)}.json`;a.click();
  };

  const TABS=[{id:"settings",l:"⚙️ Settings"},{id:"pins",l:"🔑 PINs"},{id:"colours",l:"🎨 Colours & Cell Types"},{id:"passwords",l:"🔐 Passwords"},{id:"data",l:"💾 Data"},{id:"audit",l:"📋 Audit"}];

  return(
    <div>
      <div style={{fontWeight:800,fontSize:14,color:"#1e293b",marginBottom:12}}>⚙️ Admin</div>
      <div style={{display:"flex",gap:4,marginBottom:16,flexWrap:"wrap"}}>
        {TABS.map(t=><button key={t.id} onClick={()=>setAdminTab(t.id)} style={{padding:"6px 12px",borderRadius:7,border:`1px solid ${adminTab===t.id?"#3b82f6":"#e2e8f0"}`,background:adminTab===t.id?"#eff6ff":"#fff",color:adminTab===t.id?"#1d4ed8":"#64748b",fontSize:10,cursor:"pointer",fontWeight:adminTab===t.id?700:400}}>{t.l}</button>)}
      </div>

      {adminTab==="settings"&&(
        <div>
          <div style={{background:"#fff",border:"1px solid #e2e8f0",borderRadius:9,padding:16,marginBottom:12,boxShadow:"0 1px 3px rgba(0,0,0,0.06)"}}>
            <div style={{fontWeight:700,fontSize:12,color:"#475569",marginBottom:10,paddingBottom:8,borderBottom:"1px solid #f1f5f9"}}>⏱ Auto-Lock Timeout</div>
            <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
              {LOCK_OPTIONS.map(opt=><button key={opt.ms} onClick={()=>setLockMs(opt.ms)} style={{padding:"7px 14px",borderRadius:7,border:`1px solid ${lockMs===opt.ms?"#3b82f6":"#e2e8f0"}`,background:lockMs===opt.ms?"#eff6ff":"#f8fafc",color:lockMs===opt.ms?"#1d4ed8":"#475569",fontSize:10,cursor:"pointer",fontWeight:lockMs===opt.ms?700:400}}>{opt.label}</button>)}
            </div>
          </div>
          <div style={{background:"#fff",border:"1px solid #e2e8f0",borderRadius:9,padding:16,boxShadow:"0 1px 3px rgba(0,0,0,0.06)"}}>
            <div style={{fontWeight:700,fontSize:12,color:"#475569",marginBottom:8,paddingBottom:8,borderBottom:"1px solid #f1f5f9"}}>⭐ Custom Day Label</div>
            <div style={{display:"flex",gap:8,alignItems:"center"}}>
              <input value={customLabelInput} onChange={e=>setCustomLabelInput(e.target.value)} placeholder="e.g. Stat Holiday" style={{background:"#f8fafc",border:"1px solid #e2e8f0",borderRadius:7,padding:"7px 10px",color:"#1e293b",fontSize:11,outline:"none",width:200}}/>
              <Btn onClick={()=>setCustomDayLabels([customLabelInput||"Custom"])} variant="primary" style={{fontSize:10}}>Save</Btn>
            </div>
            <div style={{marginTop:6,fontSize:8,color:"#94a3b8"}}>Current: <strong>{customDayLabels?.[0]||"Custom"}</strong></div>
          </div>
        </div>
      )}

      {adminTab==="pins"&&(
        <div>
          <div style={{background:"#eff6ff",border:"1px solid #93c5fd",borderRadius:9,padding:"10px 14px",marginBottom:12,fontSize:10,color:"#1e3a8a"}}>
            🔒 <strong>Security:</strong> When deployed via Google Apps Script, PINs are stored server-side in the StaffPins sheet — never in the page source. They cannot be inspected through browser DevTools. PINs shown here are decrypted in-memory after admin authentication.
          </div>
          <div style={{background:"#fff",border:"1px solid #e2e8f0",borderRadius:9,padding:16,marginBottom:12,boxShadow:"0 1px 3px rgba(0,0,0,0.06)"}}>
            <div style={{fontWeight:700,fontSize:12,color:"#475569",marginBottom:10,paddingBottom:8,borderBottom:"1px solid #f1f5f9"}}>👁 View-Only PINs</div>
            {viewerPins.map(v=>(
              <div key={v.id} style={{display:"flex",alignItems:"center",gap:8,padding:"7px 10px",borderRadius:6,background:"#f8fafc",border:"1px solid #e2e8f0",marginBottom:4}}>
                <span style={{fontSize:11,fontWeight:600,color:"#1e293b",minWidth:120}}>{v.name}</span>
                <span style={{fontSize:9,padding:"2px 8px",borderRadius:20,background:"#e0f2fe",border:"1px solid #7dd3fc",color:"#0369a1",fontWeight:700}}>VIEW ONLY</span>
                <span style={{fontSize:13,letterSpacing:3,color:"#94a3b8",minWidth:60}}>{revealPin===v.id?v.pin:maskPin(v.pin)}</span>
                <Btn onClick={()=>setRevealPin(revealPin===v.id?null:v.id)} style={{fontSize:8,padding:"2px 6px"}}>{revealPin===v.id?"Hide":"Peek"}</Btn>
                <Btn onClick={()=>setViewerPins(prev=>prev.filter(x=>x.id!==v.id))} variant="danger" style={{marginLeft:"auto",fontSize:8,padding:"2px 6px"}}>Remove</Btn>
              </div>
            ))}
            <div style={{display:"flex",gap:8,alignItems:"center",flexWrap:"wrap",marginTop:8}}>
              <input value={newViewerName} onChange={e=>setNewViewerName(e.target.value)} placeholder="Name" style={{background:"#f8fafc",border:"1px solid #e2e8f0",borderRadius:7,padding:"7px 10px",color:"#1e293b",fontSize:11,outline:"none",width:140}}/>
              <input value={newViewerPin} onChange={e=>setNewViewerPin(e.target.value.replace(/\D/g,"").slice(0,4))} placeholder="PIN (3-4 digits)" style={{background:"#f8fafc",border:"1px solid #e2e8f0",borderRadius:7,padding:"7px 10px",color:"#1e293b",fontSize:11,outline:"none",width:120,letterSpacing:3}}/>
              <Btn onClick={addViewer} variant="primary" style={{fontSize:10}}>+ Add</Btn>
              {viewerMsg&&<span style={{fontSize:9,color:viewerMsg.startsWith("✓")?"#15803d":"#dc2626",fontWeight:600}}>{viewerMsg}</span>}
            </div>
          </div>
          <div style={{background:"#fff",border:"1px solid #e2e8f0",borderRadius:9,padding:16,boxShadow:"0 1px 3px rgba(0,0,0,0.06)"}}>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:12,paddingBottom:8,borderBottom:"1px solid #f1f5f9"}}>
              <div style={{fontWeight:700,fontSize:12,color:"#475569"}}>Staff PINs</div>
              <Btn onClick={()=>setPinSection(v=>!v)} style={{fontSize:8}}>{pinSection?"▲ Collapse":"▼ Expand"}</Btn>
              {loadPinsFromGas&&<Btn onClick={()=>loadPinsFromGas(pwd).then(r=>{if(!r.ok)setPinMsg("Could not load pins: "+r.error);})} style={{fontSize:8,color:"#0369a1",border:"1px solid #7dd3fc",background:"#e0f2fe"}}>↻ Refresh from Server</Btn>}
            </div>
            {pinSection&&(
              <div>
                {pinMsg&&<div style={{fontSize:9,color:"#dc2626",fontWeight:600,marginBottom:8,padding:"6px 10px",background:"#fee2e2",borderRadius:6}}>{pinMsg}</div>}
                {grouped.map(({group,staff})=>{
                  const gc=DEF_COLORS[group];
                  return(
                    <div key={group} style={{marginBottom:14}}>
                      <div style={{fontSize:10,fontWeight:700,color:gc.htx,padding:"4px 8px",background:gc.gbg,borderRadius:5,marginBottom:6,borderLeft:`2px solid ${gc.acc}`}}>{group}</div>
                      {staff.map(s=>{
                        const k=`${s.name}||${s.group}`;
                        const isEd=editingPin&&editingPin.name===s.name&&editingPin.group===s.group;
                        const isRev=revealPin===k;
                        return(
                          <div key={k} style={{display:"flex",alignItems:"center",gap:8,padding:"7px 10px",borderRadius:6,background:isEd?"#eff6ff":"#f8fafc",border:`1px solid ${isEd?"#93c5fd":"#e2e8f0"}`,marginBottom:4}}>
                            <span style={{fontSize:11,fontWeight:600,color:"#1e293b",minWidth:100}}>{s.name}</span>
                            {!s.pin&&<span style={{fontSize:8,color:"#ef4444",fontWeight:600}}>⚠ No PIN</span>}
                            {isEd?(
                              <div style={{display:"flex",gap:5,alignItems:"center",flex:1}}>
                                <input autoFocus type="tel" maxLength={4} value={pinInput} onChange={e=>setPinInput(e.target.value.replace(/\D/g,""))} placeholder="3-4 digits" style={{width:80,background:"#fff",border:"1px solid #93c5fd",borderRadius:6,padding:"5px 8px",fontSize:13,outline:"none",letterSpacing:4,textAlign:"center"}}/>
                                <Btn onClick={()=>{if(pinInput.length>=3){let dup=false;setPin(s.name,s.group,pinInput,()=>{dup=true;});if(!dup){setEditingPin(null);setPinInput("");setPinMsg("");}else{setPinInput("");}}}} variant="primary" style={{fontSize:9}} disabled={pinInput.length<3}>Save</Btn>
                                <Btn onClick={()=>{setEditingPin(null);setPinInput("");}} style={{fontSize:9}}>Cancel</Btn>
                                {s.pin&&<Btn onClick={()=>{setPin(s.name,s.group,"");setEditingPin(null);setPinInput("");}} variant="danger" style={{fontSize:9}}>Clear</Btn>}
                              </div>
                            ):(
                              <div style={{display:"flex",gap:6,alignItems:"center",flex:1}}>
                                <span style={{fontSize:14,letterSpacing:3,color:"#94a3b8",minWidth:60}}>{s.pin?(isRev?s.pin:maskPin(s.pin)):"—"}</span>
                                {s.pin&&<Btn onClick={()=>setRevealPin(isRev?null:k)} style={{fontSize:8,padding:"2px 6px"}}>{isRev?"Hide":"Peek"}</Btn>}
                                <Btn onClick={()=>{setEditingPin({name:s.name,group:s.group});setPinInput(s.pin||"");setRevealPin(null);}} style={{fontSize:9,marginLeft:"auto"}}>{s.pin?"Change PIN":"Set PIN"}</Btn>
                              </div>
                            )}
                          </div>
                        );
                      })}
                    </div>
                  );
                })}
              </div>
            )}
          </div>
        </div>
      )}

      {adminTab==="colours"&&(
        <div style={{background:"#fff",border:"1px solid #e2e8f0",borderRadius:9,padding:20,boxShadow:"0 1px 3px rgba(0,0,0,0.06)"}}>
          <div style={{fontWeight:700,fontSize:13,color:"#1e293b",marginBottom:16}}>Shift & Status Colours</div>
          <div style={{marginBottom:20}}>
            <div style={{fontWeight:600,fontSize:11,color:"#475569",marginBottom:10,paddingBottom:6,borderBottom:"1px solid #f1f5f9"}}>Shift Colours</div>
            {GROUPS.map(grp=>{
              const def=DEF_COLORS[grp]; const cur=C[grp]||def;
              return(
                <div key={grp} style={{display:"flex",alignItems:"center",gap:12,marginBottom:12,padding:"8px 10px",background:"#f8fafc",borderRadius:8,border:"1px solid #e2e8f0"}}>
                  <span style={{fontWeight:600,fontSize:11,color:"#1e293b",minWidth:90}}>{grp} Shifts</span>
                  {[["CBG","cbg"],["CBO","cbo"],["CTX","ctx"]].map(([lbl,k])=>(
                    <div key={k} style={{display:"flex",flexDirection:"column",alignItems:"center",gap:2}}>
                      <span style={{fontSize:7,color:"#94a3b8"}}>{lbl}</span>
                      <input type="color" value={cur[k]} onChange={e=>setC(prev=>({...prev,[grp]:{...prev[grp]||def,[k]:e.target.value}}))} style={{width:28,height:24,borderRadius:4,border:"1px solid #e2e8f0",cursor:"pointer",padding:1}}/>
                    </div>
                  ))}
                  <div style={{padding:"4px 12px",borderRadius:6,background:cur.cbg,border:`1px solid ${cur.cbo}`,fontSize:9,fontWeight:600,color:cur.ctx}}>Preview</div>
                  <Btn onClick={()=>setC(prev=>({...prev,[grp]:{...def}}))} style={{fontSize:8}}>Reset</Btn>
                </div>
              );
            })}
          </div>
          <div>
            <div style={{fontWeight:600,fontSize:11,color:"#475569",marginBottom:10,paddingBottom:6,borderBottom:"1px solid #f1f5f9"}}>Status Colours & Text Styling</div>
            {[...["VAC","OFF","CLOSED","SICK","CUSTOM"],...(customCellTypes||[]).map(c=>c.id)].map(st=>{
              const isCustom=(customCellTypes||[]).some(c=>c.id===st);
              const customDef=isCustom?(customCellTypes.find(c=>c.id===st)?.colors):null;
              const def=DEF_COLORS[st]||customDef||{bg:"#f1f5f9",bo:"#cbd5e1",tx:"#475569"};
              const cur=C[st]||def;
              const sty=cellTypeStyles?.[st]||{};
              const label=isCustom?(customCellTypes.find(c=>c.id===st)?.name||st):(st==="VAC"?"Vacation (VAC)":st==="OFF"?"Day Off (OFF)":st==="CLOSED"?"Closed":st==="SICK"?"Sick":"Custom Day ⭐");
              return(
                <div key={st} style={{display:"flex",alignItems:"center",gap:10,marginBottom:10,padding:"8px 10px",background:"#f8fafc",borderRadius:8,border:"1px solid #e2e8f0",flexWrap:"wrap"}}>
                  <span style={{fontWeight:600,fontSize:11,color:"#1e293b",minWidth:120}}>{label}{isCustom&&<span style={{fontSize:8,color:"#94a3b8",marginLeft:4}}>(custom)</span>}</span>
                  {[["BG","bg"],["BO","bo"],["TX","tx"]].map(([lbl,k])=>(
                    <div key={k} style={{display:"flex",flexDirection:"column",alignItems:"center",gap:2}}>
                      <span style={{fontSize:7,color:"#94a3b8"}}>{lbl}</span>
                      <input type="color" value={cur[k]} onChange={e=>setC(prev=>({...prev,[st]:{...(prev[st]||def),[k]:e.target.value}}))} style={{width:28,height:24,borderRadius:4,border:"1px solid #e2e8f0",cursor:"pointer",padding:1}}/>
                    </div>
                  ))}
                  {/* v2: Font weight + style controls */}
                  <div style={{display:"flex",gap:3,borderLeft:"1px solid #e2e8f0",paddingLeft:8}}>
                    <button title="Bold" onClick={()=>setCellTypeStyles(prev=>({...prev,[st]:{...(prev[st]||{}),bold:!sty.bold}}))} style={{padding:"4px 8px",borderRadius:4,border:`1px solid ${sty.bold?"#3b82f6":"#e2e8f0"}`,background:sty.bold?"#eff6ff":"#fff",color:sty.bold?"#1d4ed8":"#64748b",fontSize:10,fontWeight:700,cursor:"pointer"}}>B</button>
                    <button title="Italic" onClick={()=>setCellTypeStyles(prev=>({...prev,[st]:{...(prev[st]||{}),italic:!sty.italic}}))} style={{padding:"4px 8px",borderRadius:4,border:`1px solid ${sty.italic?"#3b82f6":"#e2e8f0"}`,background:sty.italic?"#eff6ff":"#fff",color:sty.italic?"#1d4ed8":"#64748b",fontSize:10,fontStyle:"italic",cursor:"pointer"}}>I</button>
                    <select value={sty.size||"normal"} onChange={e=>setCellTypeStyles(prev=>({...prev,[st]:{...(prev[st]||{}),size:e.target.value}}))} style={{fontSize:9,border:"1px solid #e2e8f0",borderRadius:4,padding:"2px 4px",background:"#fff",color:"#475569"}}>
                      <option value="small">S</option>
                      <option value="normal">M</option>
                      <option value="large">L</option>
                    </select>
                  </div>
                  <div style={{padding:"4px 12px",borderRadius:6,background:cur.bg,border:`1px solid ${cur.bo}`,fontSize:sty.size==="large"?12:sty.size==="small"?9:10,fontWeight:sty.bold?800:600,fontStyle:sty.italic?"italic":"normal",color:cur.tx}}>Preview</div>
                  <Btn onClick={()=>{setC(prev=>{const n={...prev};delete n[st];return n;});setCellTypeStyles(prev=>{const n={...prev};delete n[st];return n;});}} style={{fontSize:8}}>Reset</Btn>
                  {isCustom&&<Btn onClick={()=>{if(window.confirm(`Delete custom cell type "${label}"?`)){setCustomCellTypes(prev=>prev.filter(c=>c.id!==st));setC(prev=>{const n={...prev};delete n[st];return n;});setCellTypeStyles(prev=>{const n={...prev};delete n[st];return n;});}}} variant="danger" style={{fontSize:8}}>✕ Delete</Btn>}
                </div>
              );
            })}
            {/* v2: Add new custom cell type */}
            <div style={{marginTop:12,padding:12,background:"#faf5ff",border:"1px dashed #c084fc",borderRadius:8}}>
              <div style={{fontWeight:700,fontSize:10,color:"#5b21b6",marginBottom:8}}>+ Add New Cell Type</div>
              <div style={{display:"flex",gap:8,alignItems:"center",flexWrap:"wrap"}}>

            <div style={{display:"flex",gap:8,flexWrap:"wrap",alignItems:"center"}}>
              <Btn onClick={downloadSnapshot} style={{fontSize:10}}>📥 Archive Snapshot (HTML)</Btn>
              <Btn onClick={exportJSON} style={{fontSize:10}}>📤 Export All Data (JSON)</Btn>
              {archiveMsg&&<span style={{fontSize:9,color:archiveMsg.startsWith("✓")?"#15803d":"#dc2626",fontWeight:600}}>{archiveMsg}</span>}

            <div style={{fontWeight:700,fontSize:12,color:"#dc2626",marginBottom:4}}>🗑 Clear All Data</div>
            <div style={{fontSize:9,color:"#94a3b8",marginBottom:12}}>Wipes all schedule data. Staff names are preserved. Use with caution.</div>

  );
}


function ClearDataModal({masterWeeks,liveWeeks,pwd,pwd2,onConfirm,onClose}){
  const [step,setStep]=useState("date");
  const [startInput,setStartInput]=useState("");
  const [clearInput,setClearInput]=useState("");
  const [clearErr,setClearErr]=useState(false);
  const parseInputDate=s=>{
    if(!s)return null; const parts=s.split("/"); if(parts.length<2)return null;
    const d=parseInt(parts[0]),m=parseInt(parts[1])-1; if(isNaN(d)||isNaN(m))return null;
    return new Date(2026,m,d);
  };
  const inputDate=parseInputDate(startInput);
  const isValidDate=inputDate&&!isNaN(inputDate.getTime());
  const lastPublished=liveWeeks.length?liveWeeks[liveWeeks.length-1]:masterWeeks[masterWeeks.length-1];
  return(
    <Modal onClose={onClose}>
      <div style={{padding:24,width:360}}>
        {step==="date"?(
          <div>
            <div style={{fontWeight:800,fontSize:14,color:"#dc2626",marginBottom:4}}>🗑 Clear Schedule Data</div>
            <div style={{fontSize:10,color:"#64748b",marginBottom:16}}>Enter the new schedule start date. The app will rebuild 5 blank weeks from this date forward. Staff names from the last published week will be preserved.</div>
            <div style={{fontSize:11,fontWeight:600,color:"#475569",marginBottom:6}}>New Start Date (DD/MM)</div>
            <input autoFocus value={startInput} onChange={e=>setStartInput(e.target.value)} placeholder="e.g. 28/04" style={{width:"100%",background:"#f8fafc",border:`1px solid ${isValidDate?"#86efac":startInput?"#f87171":"#e2e8f0"}`,borderRadius:8,padding:"10px 12px",color:"#1e293b",fontSize:14,outline:"none",boxSizing:"border-box",marginBottom:4,letterSpacing:2}}/>
            <div style={{fontSize:9,color:"#94a3b8",marginBottom:16}}>{isValidDate?`✓ Will build weeks from ${inputDate.getDate()}-${MON[inputDate.getMonth()]}`:startInput?"Invalid — use DD/MM":""}</div>
            {lastPublished&&<div style={{fontSize:9,color:"#475569",padding:"8px 12px",background:"#f8fafc",borderRadius:7,border:"1px solid #e2e8f0",marginBottom:16}}>Staff carried forward: {GROUPS.flatMap(g=>(lastPublished.groups[g]||[]).map(e=>e.name)).join(", ")}</div>}
            <div style={{display:"flex",gap:8}}>
              <Btn onClick={()=>setStep("confirm")} variant="danger" style={{flex:1,fontSize:11}} disabled={!isValidDate}>Next →</Btn>
              <Btn onClick={onClose} style={{padding:"8px 14px",fontSize:11}}>Cancel</Btn>
            </div>
          </div>
        ):(
          <div>
            <div style={{fontWeight:800,fontSize:14,color:"#dc2626",marginBottom:4}}>⚠ Confirm Clear</div>
            <div style={{fontSize:10,color:"#475569",marginBottom:14}}>This will permanently wipe all schedule data. Type your admin password to confirm.</div>
            <input type="password" autoFocus value={clearInput} onChange={e=>{setClearInput(e.target.value);setClearErr(false);}} placeholder="Admin password" style={{width:"100%",background:"#f8fafc",border:`1px solid ${clearErr?"#ef4444":"#e2e8f0"}`,borderRadius:8,padding:"10px 12px",color:"#1e293b",fontSize:13,outline:"none",boxSizing:"border-box",marginBottom:4}}/>
            {clearErr&&<div style={{fontSize:9,color:"#ef4444",fontWeight:700,marginBottom:8}}>⚠ Incorrect password</div>}
            <div style={{display:"flex",gap:8,marginTop:12}}>
              <Btn onClick={()=>{if(clearInput===pwd||clearInput===pwd2){onConfirm({startDate:parseInputDate(startInput),lastPublished});}else{setClearErr(true);}}} variant="danger" style={{flex:1,fontSize:11}} disabled={!clearInput}>🗑 Clear Everything</Btn>
              <Btn onClick={onClose} style={{padding:"8px 14px",fontSize:11}}>Cancel</Btn>
            </div>
          </div>
        )}
      </div>
    </Modal>
  );
}

function PrintModal({weeks,customDayLabels,onClose}){
  const [printing,setPrinting]=useState(false);
  const doPrint=()=>{
    setPrinting(true);
    const rows=GROUPS.flatMap(grp=>{
      const allE=[];const seen=new Set();weeks.forEach(w=>(w.groups[grp]||[]).forEach(e=>{if(!seen.has(e.name)){seen.add(e.name);allE.push(e.name);}}));
      return allE.map(name=>`<tr><td>${name}</td>${weeks.flatMap(w=>{const emp=(w.groups[grp]||[]).find(e=>e.name===name);return(emp?emp.shifts:Array(7).fill(null)).map(s=>`<td>${s?.st||s?.t||""}</td>`);}).join("")}</tr>`);
    });
    const html=`<!DOCTYPE html><html><head><style>body{font-family:sans-serif;font-size:9px}table{border-collapse:collapse;width:100%}td,th{border:1px solid #ccc;padding:3px 5px;text-align:center}@page{size:landscape}</style></head><body><h2>HPVH Schedule</h2><table><thead><tr><th>Staff</th>${weeks.flatMap(w=>DAYS.map((d,i)=>`<th>${d}<br/>${w.dates?.[i]||""}</th>`)).join("")}</tr></thead><tbody>${rows.join("")}</tbody></table></body></html>`;
    try{const ifr=document.createElement("iframe");ifr.style.cssText="position:fixed;top:-9999px;left:-9999px;width:1400px;height:900px;border:none;";document.body.appendChild(ifr);ifr.contentDocument.open();ifr.contentDocument.write(html);ifr.contentDocument.close();setTimeout(()=>{try{ifr.contentWindow.focus();ifr.contentWindow.print();}catch(e){}setTimeout(()=>{if(document.body.contains(ifr))document.body.removeChild(ifr);setPrinting(false);},3000);},700);}catch(e){setPrinting(false);}
  };
  return(
    <Modal onClose={onClose}>
      <div style={{padding:24,width:300}}>
        <div style={{fontWeight:700,fontSize:14,color:"#1e293b",marginBottom:8}}>🖨 Print Live Schedule</div>
        <div style={{fontSize:9,color:"#94a3b8",marginBottom:16}}>Prints the current live published schedule in landscape format.</div>
        <div style={{display:"flex",gap:8}}>
          <Btn onClick={doPrint} variant="primary" style={{flex:1,padding:"9px",fontSize:11}}>{printing?"Preparing…":"🖨 Print"}</Btn>
          <Btn onClick={onClose} style={{padding:"9px 14px",fontSize:11}}>Close</Btn>
        </div>
      </div>
    </Modal>
  );
}

/* ═══════════════════════════════════════════════════════════════════
