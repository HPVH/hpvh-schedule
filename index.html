const toHours = t => {
  if (!t) return 0;
  if (HOURS_MAP[t] !== undefined) return HOURS_MAP[t];
  try {
    const [a,b] = t.split("-");
    const p = s => { s=s.trim(); return s.includes(":")?+s.split(":")[0]+ +s.split(":")[1]/60:+s; };
    let [st,en] = [p(a),p(b)];
    if (en < st) en += 12;
    return +((en-st).toFixed(1)) || 0;
  } catch { return 0; }
};

  if (!last) return Array(7).fill("");
  const [d,m] = last.split("-");
  let dt = new Date(2026, MON.indexOf(m), +d);
  return Array(7).fill(0).map(() => { dt=new Date(dt.getTime()+86400000); return `${dt.getDate()}-${MON[dt.getMonth()]}`; });
};

// v2: generate Mon-Sun weeks from a start date through an end date
const seedBackfillWeeks = (startStr, endStr, year=2026) => {
  const [sd,sm] = startStr.split("-");
  const [ed,em] = endStr.split("-");
  const start = new Date(year, MON.indexOf(sm), +sd);
  const end = new Date(year, MON.indexOf(em), +ed);
  // Walk back to nearest Monday on or before start
  let cur = new Date(start);
  const dow = cur.getDay()===0?6:cur.getDay()-1; // Mon=0
  cur.setDate(cur.getDate()-dow);
  const out = [];
  while (cur <= end) {
    const dates = Array(7).fill(0).map((_,i)=>{
      const d = new Date(cur.getTime()+i*86400000);
      return `${d.getDate()}-${MON[d.getMonth()]}`;
    });
    const groups = {};
    GROUPS.forEach(g=>{groups[g]=[];});
    out.push({id:uid(),label:wkLabel(dates),dates,published:false,approved:false,groups,backfill:true});
    cur = new Date(cur.getTime()+7*86400000);
  }
  return out;
};

/* ── COVERAGE CHECKER ───────────────────────────────────────────── */
function checkCoverage(week) {
  const flags = [];
  const parseHr = s => { s=s.trim(); return s.includes(":")?+s.split(":")[0]+ +s.split(":")[1]/60:+s; };
  // v3: parse a "X-Y" shift and return [startHr, endHr] using 24h clock with PM rollover
  const parseShift = t => {
    if(!t) return [99, 0];
    const [a, b] = t.split("-");
    let st = parseHr(a), en = parseHr(b);
    // If end time appears to be PM (smaller than start, and start is morning/midday) — roll forward 12h
    if (en < st) en += 12;
    return [st, en];
  };
  // Approx float compare (avoid 7.499999 vs 7.5 misses)
  const eq = (a, b) => Math.abs(a - b) < 0.05;
  const lte = (a, b) => a <= b + 0.05;
  const gte = (a, b) => a >= b - 0.05;

  week.dates.forEach((dt, di) => {
    if(!dt || di===6) return; // skip Sun (closed)
    const dayLabel = `${DAYS[di]} ${dt}`;
    const isMonday = di===0;
    const tech = (week.groups.Tech||[]).map(e=>e.shifts[di]).filter(s=>s&&!["VAC","OFF","CLOSED","SICK","CUSTOM"].includes(s.st)&&s.t);
    const ccr = (week.groups.CCR||[]).map(e=>e.shifts[di]).filter(s=>s&&!["VAC","OFF","CLOSED","SICK","CUSTOM"].includes(s.st)&&s.t);
    const techShifts = tech.map(s=>parseShift(s.t));
    const ccrShifts = ccr.map(s=>parseShift(s.t));

    // v3 rules per spec:
    // - Every day needs a Tech at 7:30 and a CCR at 7:30
    // - Every day needs a Tech finishing at 8pm and a CCR finishing at 8pm
    // - Mondays specifically need 2 CCRs starting at 7:30
    // - Weekdays need at least 2 Techs and 2 CCRs

    if (tech.length < 2) {
      flags.push({day:dayLabel, group:"Tech", msg:"Fewer than 2 Techs scheduled"});
    } else {
      const has730Start = techShifts.some(([s])=>eq(s, 7.5));
      const has8End = techShifts.some(([,e])=>gte(e, 20));
      if (!has730Start) flags.push({day:dayLabel, group:"Tech", msg:"No Tech starting at 7:30 AM"});
      if (!has8End) flags.push({day:dayLabel, group:"Tech", msg:"No Tech finishing at 8:00 PM"});
    }

    if (ccr.length < 2) {
      flags.push({day:dayLabel, group:"CCR", msg:"Fewer than 2 CCRs scheduled"});
    } else {
      const ccr730Count = ccrShifts.filter(([s])=>eq(s, 7.5)).length;
      const ccr8End = ccrShifts.some(([,e])=>gte(e, 20));
      if (isMonday) {
        if (ccr730Count < 2) flags.push({day:dayLabel, group:"CCR", msg:"Monday: needs 2 CCRs starting at 7:30 AM"});
      } else {
        if (ccr730Count < 1) flags.push({day:dayLabel, group:"CCR", msg:"No CCR starting at 7:30 AM"});
      }
      if (!ccr8End) flags.push({day:dayLabel, group:"CCR", msg:"No CCR finishing at 8:00 PM"});
    }
  });
  return flags;
}

/* ── LONG PRESS HOOK ────────────────────────────────────────────── */
function useLongPress(onLong, onShort, delay=600) {
  const timer = useRef(null);
  const fired = useRef(false);
  const ctxFiredRef = useRef(false);
  const markCtx = () => { ctxFiredRef.current = true; };
  const start = useCallback(e => {
    fired.current = false; ctxFiredRef.current = false;
    timer.current = setTimeout(() => { fired.current = true; onLong&&onLong(e); }, delay);
  },[onLong,delay]);
  const end = useCallback(e => {
    clearTimeout(timer.current);
    if(!fired.current&&!ctxFiredRef.current) onShort&&onShort(e);
    fired.current = false; ctxFiredRef.current = false;
  },[onShort]);
  const cancel = useCallback(() => { clearTimeout(timer.current); fired.current=true; },[]);
  return {
    onMouseDown:start, onMouseUp:end, onTouchStart:start,
    onTouchEnd:end, onMouseLeave:cancel, _markCtx:markCtx
  };
}

function Btn({children,onClick,variant="default",disabled,style={}}){
  const base = {
    padding:"5px 10px",borderRadius:7,border:"1px solid #e2e8f0",
    background:"#f8fafc",color:"#475569",fontSize:10,cursor:disabled?"not-allowed":"pointer",
    fontWeight:500,transition:"all 0.12s",opacity:disabled?0.5:1,...style
  };
  const vars = {
    default:{},
    primary:{background:"#1d4ed8",color:"#fff",border:"1px solid #1d4ed8"},
    success:{background:"#16a34a",color:"#fff",border:"1px solid #16a34a"},
    danger: {background:"#dc2626",color:"#fff",border:"1px solid #dc2626"},
    warning:{background:"#d97706",color:"#fff",border:"1px solid #d97706"},
  };
  const merged = {...base,...(vars[variant]||{}),...style};
  return <button onClick={onClick} disabled={disabled} style={merged}>{children}</button>;
}

/* ── DUAL SCROLL ────────────────────────────────────────────────── */
function DualScroll({children,showTop=false,scrollRef=null}){
  const topR=useRef(null); const botR=useRef(null); const sync=useRef(false);
  const [tw,setTw]=useState(3000);
  useEffect(()=>{
    const ob=new ResizeObserver(()=>{if(botR.current)setTw(botR.current.scrollWidth);});
    if(botR.current)ob.observe(botR.current); return()=>ob.disconnect();
  },[]);
  useEffect(()=>{ if(scrollRef)scrollRef.current=botR.current; },[scrollRef]);
  const onTop=()=>{ if(sync.current)return; sync.current=true; if(botR.current)botR.current.scrollLeft=topR.current.scrollLeft; sync.current=false; };
  const onBot=()=>{ if(sync.current)return; sync.current=true; if(topR.current)topR.current.scrollLeft=botR.current.scrollLeft; sync.current=false; };
  return (
    <div>
      {showTop&&<div ref={topR} onScroll={onTop} style={{overflowX:"auto",overflowY:"hidden",height:8,marginBottom:2}}><div style={{width:tw,height:1}}/></div>}
      <div ref={botR} onScroll={onBot} style={{overflowX:"auto"}}>{children}</div>
    </div>
  );
}

/* ── PIN PAD ────────────────────────────────────────────────────── */
function PinPad({validPins,onMatch,onCancel,title,subtitle,dark=false}){
  const [input,setInput]=useState("");
  const [err,setErr]=useState(false);
  const press = useCallback(n => {
    setInput(prev => {
      if(prev.length>=4)return prev;
      const nv = prev+n;
      if(nv.length>=3){
        const m=validPins.find(p=>p===nv);
        if(m){
          const hasLonger=validPins.some(p=>p!==nv&&p.startsWith(nv));
          if(!hasLonger)setTimeout(()=>onMatch(nv),0);
        }
      }
      return nv;
    }); setErr(false);
  },[validPins,onMatch]);
  const backspace=()=>{ setInput(i=>i.slice(0,-1)); setErr(false); };
  const confirm=()=>{ if(validPins.includes(input))onMatch(input); else{setErr(true);setTimeout(()=>{setErr(false);setInput("");},1200);} };
  useEffect(()=>{
    const h=e=>{
      const numByCode=e.code?.startsWith("Numpad")&&"0123456789".includes(e.code.slice(6))?e.code.slice(6):null;
      const digit="0123456789".includes(e.key)?e.key:numByCode;
      if(digit)press(digit); else if(e.key==="Backspace")backspace(); else if(e.key==="Enter")confirm();
    };
    window.addEventListener("keydown",h); return()=>window.removeEventListener("keydown",h);
  },[press]);

  const bg=dark?"#1e293b":"#fff"; const bd=dark?"#334155":"#e2e8f0";
  const btnBg=dark?"#0f172a":"#f8fafc"; const btnHov=dark?"#1e3a8a":"#eff6ff";
  const txtC=dark?"#f8fafc":"#1e293b";
  return (
    <div style={{background:bg,borderRadius:16,padding:24,width:280,boxShadow:"0 24px 64px rgba(0,0,0,0.3)"}}>
      {title&&<div style={{fontWeight:700,fontSize:13,color:txtC,marginBottom:4}}>{title}</div>}
      {subtitle&&<div style={{fontSize:9,color:"#64748b",marginBottom:14}}>{subtitle}</div>}
      <div style={{display:"flex",gap:8,justifyContent:"center",marginBottom:16}}>
        {[0,1,2,3].map(i=>(
          <div key={i} style={{width:48,height:56,border:`2px solid ${err?"#ef4444":input.length>i?"#3b82f6":bd}`,borderRadius:10,display:"flex",alignItems:"center",justifyContent:"center",fontSize:24,color:txtC,background:input.length>i?"#1d4ed8":dark?"#0f172a":"#f8fafc",transition:"all 0.15s"}}>
            {input.length>i?"●":""}
          </div>
        ))}
      </div>
      {err&&<div style={{textAlign:"center",fontSize:9,color:"#ef4444",fontWeight:700,marginBottom:10}}>⚠ Incorrect PIN</div>}
      <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:8,marginBottom:8}}>
        {[1,2,3,4,5,6,7,8,9].map(n=>(
          <button key={n} onClick={()=>press(String(n))} style={{padding:"14px",borderRadius:10,border:`1px solid ${bd}`,background:btnBg,fontSize:18,fontWeight:600,cursor:"pointer",color:txtC}} onMouseEnter={e=>e.currentTarget.style.background=btnHov} onMouseLeave={e=>e.currentTarget.style.background=btnBg}>{n}</button>
        ))}
        <button onClick={backspace} style={{padding:"14px",borderRadius:10,border:`1px solid ${bd}`,background:"#7f1d1d",fontSize:16,cursor:"pointer",color:"#fca5a5"}} onMouseEnter={e=>e.currentTarget.style.background="#991b1b"} onMouseLeave={e=>e.currentTarget.style.background="#7f1d1d"}>⌫</button>
        <button onClick={()=>press("0")} style={{padding:"14px",borderRadius:10,border:`1px solid ${bd}`,background:btnBg,fontSize:18,fontWeight:600,cursor:"pointer",color:txtC}} onMouseEnter={e=>e.currentTarget.style.background=btnHov} onMouseLeave={e=>e.currentTarget.style.background=btnBg}>0</button>
        <button onClick={confirm} style={{padding:"14px",borderRadius:10,border:"none",background:"#1d4ed8",fontSize:16,cursor:"pointer",color:"#fff",fontWeight:700}} onMouseEnter={e=>e.currentTarget.style.background="#2563eb"} onMouseLeave={e=>e.currentTarget.style.background="#1d4ed8"}>✓</button>
      </div>
      {onCancel&&<button onClick={onCancel} style={{width:"100%",padding:"8px",borderRadius:8,border:`1px solid ${bd}`,background:"none",color:"#475569",fontSize:9,cursor:"pointer",marginTop:4}}>Cancel</button>}
    </div>
  );
}

/* ── GAS PIN PAD (async, server-verified) ───────────────────────── */
function GasPinPad({onEntry,err,checking,dark=false}){
  const [input,setInput]=useState("");
  const bg=dark?"#1e293b":"#fff";
  const bd=dark?"#334155":"#e2e8f0";
  const tx=dark?"#f8fafc":"#1e293b";
  const dots=Array(4).fill(0).map((_,i)=>(
    <div key={i} style={{width:12,height:12,borderRadius:"50%",background:err?"#ef4444":input.length>i?(dark?"#f8fafc":"#1e293b"):"transparent",border:`2px solid ${err?"#ef4444":bd}`,transition:"background 0.1s"}}/>
  ));
  const press=d=>{
    if(checking||input.length>=4)return;
    const nv=input+d;
    setInput(nv);
    if(nv.length===4){
      onEntry(nv);
      setTimeout(()=>setInput(""),800);
    }
  };
  const del=()=>{if(!checking)setInput(p=>p.slice(0,-1));};
  return(

/* ── GAS PIN PAD ASYNC (with cancel, for modals) ────────────────── */
function GasPinPadAsync({onEntry,onCancel}){
  const [checking,setChecking]=useState(false);
  const [err,setErr]=useState(false);
  const handle=async pin=>{
    setChecking(true);
    try { await onEntry(pin); }
    catch { setErr(true); setTimeout(()=>setErr(false),1200); }
    finally { setChecking(false); }
  };
  return(
    <div>
      <GasPinPad onEntry={handle} err={err} checking={checking}/>
      {onCancel&&<button onClick={onCancel} style={{width:"100%",marginTop:8,padding:"8px",borderRadius:8,border:"1px solid #e2e8f0",background:"none",color:"#475569",fontSize:9,cursor:"pointer"}}>Cancel</button>}
    </div>
  );
}

/* ── LANDING LOCK SCREEN ────────────────────────────────────────── */
function LandingLock({adminName1,adminName2,onAccess,gasVerifyAdmin,gasVerifyAnyPin}){
  const [showAdmin,setShowAdmin]=useState(false);
  const [adminInput,setAdminInput]=useState("");
  const [adminErr,setAdminErr]=useState(false);
  const [pinErr,setPinErr]=useState(false);
  const [checking,setChecking]=useState(false);

  // GAS-backed PIN check: ask the server, never validate client-side
  const handlePinEntry = async (pin) => {
    if(checking) return;
    setChecking(true);
    try {
      const res = await gasVerifyAnyPin(pin);
      if(res.match){
        onAccess({type:"staff", name:res.name, group:res.group});
      } else {
        setPinErr(true);
        setTimeout(()=>setPinErr(false), 1200);
      }
    } catch {
      setPinErr(true);
      setTimeout(()=>setPinErr(false), 1200);
    } finally {
      setChecking(false);
    }
  };

  const tryAdmin = async () => {
    if(checking) return;
    setChecking(true);
    try {
      const res = await gasVerifyAdmin(adminInput);
      if(res.match){
        const name = res.role==="admin2" ? (adminName2||"Admin 2") : (adminName1||"Admin");
        const idx  = res.role==="admin2" ? 2 : 1;
        onAccess({type:"admin", name, profileIdx:idx});
        setAdminInput(""); setShowAdmin(false);
      } else {
        setAdminErr(true);
        setTimeout(()=>{setAdminErr(false);setAdminInput("");},1400);
      }
    } catch {
      setAdminErr(true);
      setTimeout(()=>{setAdminErr(false);setAdminInput("");},1400);
    } finally {
      setChecking(false);
    }
  };

  return (
    <div style={{position:"fixed",inset:0,background:"#0f172a",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",zIndex:10000}}>
      <style>{SCROLLBAR_CSS}</style>
      <div style={{marginBottom:32,textAlign:"center"}}>
        <div style={{width:64,height:64,borderRadius:18,background:"linear-gradient(135deg,#3b82f6,#06b6d4)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:32,margin:"0 auto 16px",boxShadow:"0 8px 32px rgba(59,130,246,0.4)"}}>🐾</div>
        <div style={{fontSize:22,fontWeight:800,color:"#f8fafc",letterSpacing:"-0.5px"}}>HPVH Schedule</div>
        <div style={{fontSize:11,color:"#64748b",marginTop:4}}>Hammonds Plains Veterinary Hospital</div>
      </div>

      {!showAdmin ? (
        <div>
          {/* GAS-backed PinPad: each digit fires server check on 4 digits */}
          <GasPinPad onEntry={handlePinEntry} err={pinErr} checking={checking} dark/>
          <button onClick={()=>setShowAdmin(true)} style={{marginTop:16,width:"100%",padding:"8px",borderRadius:8,border:"1px solid #334155",background:"none",color:"#475569",fontSize:9,cursor:"pointer"}}>Admin / Password login</button>
        </div>
      ) : (
        <div style={{background:"#1e293b",borderRadius:16,padding:24,width:280,boxShadow:"0 24px 64px rgba(0,0,0,0.4)"}}>
          <div style={{fontWeight:700,fontSize:12,color:"#f8fafc",marginBottom:4}}>Admin Password</div>
          <input type="password" autoFocus value={adminInput} onChange={e=>setAdminInput(e.target.value)} onKeyDown={e=>e.key==="Enter"&&tryAdmin()} placeholder="Password" style={{width:"100%",background:"#0f172a",border:`1px solid ${adminErr?"#ef4444":"#334155"}`,borderRadius:8,padding:"10px 12px",color:"#f8fafc",fontSize:14,outline:"none",boxSizing:"border-box",marginBottom:8}}/>
          {adminErr&&<div style={{fontSize:9,color:"#ef4444",fontWeight:700,marginBottom:8}}>⚠ Incorrect password</div>}
          <div style={{display:"flex",gap:8}}>
            <Btn onClick={tryAdmin} variant="primary" style={{flex:1,fontSize:11}}>{checking?"Checking…":"Unlock"}</Btn>
            <Btn onClick={()=>{setShowAdmin(false);setAdminInput("");setAdminErr(false);}} style={{fontSize:11,border:"1px solid #334155",color:"#94a3b8",background:"none"}}>Back</Btn>
          </div>
        </div>
      )}
    </div>
  );
}

/* ── STAFF PIN UNLOCK MODAL ─────────────────────────────────────── */
function StaffPinModal({name,group,C,onUnlock,onClose,gasVerifyPin}){
  const gc=(C||DEF_COLORS)[group]||DEF_COLORS.Tech;
  const [checking,setChecking]=useState(false);
  const [err,setErr]=useState(false);
  const handleEntry = async (pin) => {
    setChecking(true);
    try {
      const res = await gasVerifyPin(name, group, pin);
      if(res.match){ onUnlock(); onClose(); }
      else { setErr(true); setTimeout(()=>setErr(false),1200); }

  return (
    <Modal onClose={onClose}>
      <div style={{padding:24,width:300,textAlign:"center"}}>

  onApprove,onDeny,onApproveSwap,onDenySwap,onSwapRequest}){

  const customLabel = s?.customLabel||(customDayLabels?.[0]||"Custom");
  const lp = useLongPress(

    e.preventDefault(); e.stopPropagation();
    if(isAdmin&&onCtxMenu){ if(lp._markCtx)lp._markCtx(); onCtxMenu(e.clientX,e.clientY); }

  const todayRing = isToday ? {boxShadow:"inset 0 0 0 2px #3b82f6"} : {};

        onMouseEnter={e=>{if(isAdmin||canSwap)e.currentTarget.style.borderColor="#3b82f6";}}
        onMouseLeave={e=>{e.currentTarget.style.borderColor=sc.bo;}}>

        {/* Tags overlay - absolute top so they don't push content */}
        {visibleTags.length>0&&(
          <div style={{position:"absolute",top:2,left:3,right:3,display:"flex",gap:2,flexWrap:"wrap",zIndex:2,pointerEvents:"none"}}>
            {visibleTags.map(t=>{const tc=TAG_CFG[t]||{}; return <span key={t} style={{fontSize:7,padding:"1px 4px",borderRadius:3,fontWeight:700,background:tc.bg||"#f1f5f9",color:tc.c||"#475569"}}>{tc.lbl||t}</span>;})}
          </div>

        {/* Center content */}
        {s?.st==="VAC"&&<div style={{fontSize:12,fontWeight:700,color:sc.tx,textAlign:"center"}}>🌴 VAC</div>}
        {s?.st==="OFF"&&<div style={{fontSize:11,color:sc.tx,textAlign:"center"}}>OFF</div>}
        {s?.st==="CLOSED"&&<div style={{fontSize:10,color:sc.tx,fontWeight:600,textAlign:"center"}}>CLOSED</div>}
        {s?.st==="CUSTOM"&&<div style={{fontSize:10,fontWeight:700,color:sc.tx,textAlign:"center"}}>⭐ {customLabel}</div>}
        {s?.st==="SICK"&&(
          <div style={{textAlign:"center"}}>
            <div style={{fontSize:9,color:"#94a3b8",textDecoration:"line-through"}}>{s.t||"—"}</div>
            <div style={{fontSize:9,color:sc.tx,fontWeight:700}}>🤒 SICK</div>
            <div style={{display:"flex",alignItems:"center",justifyContent:"center",gap:3,marginTop:1}}
                 onClick={e=>e.stopPropagation()}
                 onMouseDown={e=>e.stopPropagation()}
                 onMouseUp={e=>e.stopPropagation()}
                 onTouchStart={e=>e.stopPropagation()}
                 onTouchEnd={e=>e.stopPropagation()}>
              {isAdmin
                ? <input type="number" min="0" max="12" step="0.5" value={s.sh!==null?s.sh:""} onChange={e=>onSickHrsChange&&onSickHrsChange(e.target.value===""?null:+e.target.value)} placeholder="0" style={{width:28,background:"#fff",border:"1px solid #f87171",borderRadius:3,color:"#991b1b",fontSize:9,padding:"0 3px",outline:"none",textAlign:"center"}}/>
                : <span style={{fontSize:9,color:"#991b1b"}}>{s.sh!==null?`${s.sh}h`:"0h"}</span>
              }
            </div>
          </div>
        )}
        {!s?.st&&s?.t&&(
          <div style={{textAlign:"left"}}>
            <div style={{fontSize:12,fontWeight:700,color:sc.tx,lineHeight:1.1}}>{s.t}</div>

              : <div style={{fontSize:9,color:"#94a3b8",marginTop:1}}>{s.h?`${s.h}h`:""}</div>

          </div>

        {!isAdmin&&canSwap&&s?.t&&!s?.st&&<div style={{position:"absolute",bottom:3,left:0,right:0,fontSize:7,color:"#7c3aed",fontWeight:700,textAlign:"center",zIndex:2}}>tap to swap</div>}

               onMouseUp={e=>e.stopPropagation()}
               onTouchStart={e=>e.stopPropagation()}

            <Btn onClick={isPending?onApprove:onApproveSwap} variant="success" style={{flex:1,padding:"1px",fontSize:7,minWidth:0}}>✓</Btn>
            <Btn onClick={isPending?onDeny:onDenySwap} variant="danger" style={{flex:1,padding:"1px",fontSize:7,minWidth:0}}>✕</Btn>
          </div>
        )}

        {s?.swapped&&<div style={{position:"absolute",bottom:2,right:4,fontSize:7,color:sc.tx,fontWeight:700,opacity:0.8,zIndex:2}}>↔</div>}
      </div>
    </td>
  );
}

                        type="text"
                        value={week.note||""}
                        onChange={e=>onWeekNoteChange&&onWeekNoteChange(week.id,e.target.value)}
                        placeholder="+ add week note (e.g. Party Friday)"
                        style={{flex:"1 1 200px",minWidth:180,maxWidth:340,background:week.note?"#fef9c3":"#f8fafc",border:`1px ${week.note?"solid #fbbf24":"dashed #cbd5e1"}`,borderRadius:5,padding:"3px 8px",fontSize:10,color:"#78350f",outline:"none",fontStyle:week.note?"normal":"italic"}}
                      />
                    : (week.note ? <span style={{background:"#fef9c3",border:"1px solid #fbbf24",borderRadius:5,padding:"3px 8px",fontSize:10,color:"#78350f",fontWeight:600}}>📌 {week.note}</span> : null)
                  }
                  {!isAdmin&&swapRequesterInfo&&swapRequesterInfo.weekId===week.id&&(
                    <span style={{fontSize:9,padding:"3px 8px",borderRadius:5,background:"#faf5ff",border:"1px solid #a78bfa",color:"#7c3aed",fontWeight:700}}>👆 Tap your shift to swap</span>
                  )}
                  {isAdmin&&onArchive&&<button onClick={()=>onArchive(week.id)} style={{fontSize:8,padding:"2px 6px",borderRadius:5,border:"1px solid #e2e8f0",background:"none",color:"#94a3b8",cursor:"pointer"}}>● archive</button>}
                </div>
              </th>
            ))}
          </tr>
        </thead>
        <tbody>
          {GROUPS.map(grp => {
            const gc=(C||DEF_COLORS)[grp]||DEF_COLORS[grp];
            const allEmps=[];
            const seen=new Set();
            weeks.forEach(w=>(w.groups[grp]||[]).forEach(e=>{if(!seen.has(e.name)){seen.add(e.name);allEmps.push(e.name);}}));

            return [
              // Group header
              <tr key={`gh-${grp}`}>
                <td colSpan={1+weeks.length*8} style={{padding:"4px 12px",background:gc.gbg,borderTop:"2px solid #e2e8f0",borderBottom:"1px solid #e2e8f0"}}>
                  <div style={{display:"flex",alignItems:"center",gap:6}}>
                    <span style={{fontWeight:800,fontSize:11,color:gc.htx,letterSpacing:"0.15em",textTransform:"uppercase"}}>{grp}</span>
                    <span style={{fontSize:9,color:gc.acc}}>{allEmps.length} staff</span>
                  </div>
                </td>
              </tr>,
              // Day headers per week
              <tr key={`dh-${grp}`} style={{background:gc.gbg}}>
                <td style={{position:"sticky",left:0,zIndex:6,background:gc.gbg,padding:"2px 10px",borderRight:"2px solid #e2e8f0",borderBottom:"1px solid #e2e8f0",minWidth:118}}/>
                {weeks.flatMap((week,wi) => [
                  ...DAYS.map((d,di) => {
                    const dt=week.dates?.[di]||"";
                    const isT=dt===today;
                    return (
                      <td key={`${week.id}-${d}`} style={{textAlign:"center",padding:"3px 2px",minWidth:88,borderLeft:di===0&&wi>0?"2px solid #e2e8f0":"none",borderBottom:"1px solid #e2e8f0",background:isT?"#dbeafe":gc.gbg}}>
                        <div style={{fontSize:11,fontWeight:700,color:isT?"#1d4ed8":gc.htx}}>{d}</div>
                        <div style={{fontSize:8,color:isT?"#3b82f6":gc.acc}}>{dt}</div>
                      </td>
                    );
                  }),
                  <td key={`${week.id}-hrs`} style={{textAlign:"center",padding:"2px 4px",fontSize:8,color:gc.acc,borderLeft:"1px solid #e2e8f0",borderBottom:"1px solid #e2e8f0",background:gc.gbg,fontWeight:600,minWidth:40}}>HRS</td>
                ])}
              </tr>,
              // Employee rows
              ...allEmps.map((name,ni) => (
                <tr key={`${grp}-${name}`} style={{background:ni%2===0?"#fff":gc.gbg+"66"}}>
                  <td style={{position:"sticky",left:0,zIndex:5,background:ni%2===0?"#fff":gc.gbg+"cc",padding:"3px 10px",verticalAlign:"middle",borderRight:"2px solid #e2e8f0",whiteSpace:"nowrap"}}>
                    <div style={{display:"flex",alignItems:"center",gap:5}}>
                      <div style={{width:6,height:6,borderRadius:"50%",background:gc.acc,flexShrink:0}}/>
                      <span style={{fontWeight:600,fontSize:11,color:"#1e293b"}}>{name}</span>
                    </div>
                  </td>
                  {weeks.flatMap((week,wi) => {
                    const empIdx=(week.groups[grp]||[]).findIndex(e=>e.name===name);
                    const emp=empIdx>=0?week.groups[grp][empIdx]:null;
                    const tot=emp?empTotal(emp):0;
                    const tC=hrsColor(tot,gc);
                    const cells=DAYS.map((d,si) => {
                      const s=emp?emp.shifts[si]:null;
                      const dt=week.dates?.[si]||"";
                      const isT=dt===today;
                      const isSwapR=swapRequesterInfo&&swapRequesterInfo.name===name&&swapRequesterInfo.group===grp;
                      const pendSwap=swapRequests?.find(sr=>sr.status==="PENDING"&&sr.weekId===week.id&&((sr.requesterName===name&&sr.shiftIdx===si)||(sr.targetName===name&&sr.shiftIdx===si)));
                      // v3: The requester taps their OWN shift cells. Modal opens to pick a target for that day.
                      // Other employees' cells are NOT tappable from the requester's perspective.
                      const canSwap=!isAdmin&&isSwapR&&!!emp&&!!s?.t&&!s?.st&&!s?.swapPending;
                      if(!emp) return <td key={`${week.id}-${si}`} style={{padding:0,height:CELL_HEIGHT,maxHeight:CELL_HEIGHT,minWidth:88,maxWidth:88,overflow:"hidden",borderLeft:si===0&&wi>0?"2px solid #e2e8f0":"none"}}><div style={{background:"#f8fafc",border:"1px solid #f1f5f9",borderRadius:6,margin:"3px 2px",height:`calc(${CELL_HEIGHT}px - 6px)`}}/></td>;
                      return (
                        <td key={`${week.id}-${si}`} style={{padding:"3px 2px",borderLeft:si===0&&wi>0?"2px solid #e2e8f0":"none"}}>
                          <ShiftCell
                            s={pendSwap?{...s,swapPending:true}:s}
                            group={grp} isAdmin={isAdmin}
                            canSwap={canSwap}
                            isToday={isT}
                            C={C||DEF_COLORS} customDayLabels={customDayLabels}
                            onTap={rect=>onTap&&onTap({weekId:week.id,group:grp,empIdx,shiftIdx:si,rect,isMaster:false,keepTags:s?.tg||[]})}
                            onLong={(x,y)=>onLong&&onLong({weekId:week.id,group:grp,empIdx,shiftIdx:si,x,y,isMaster:false})}
                            onCtxMenu={(x,y)=>onCtxMenu&&onCtxMenu({weekId:week.id,group:grp,empIdx,shiftIdx:si,x,y,isMaster:false})}
                            onHrsChange={v=>onHrs&&onHrs(week.id,grp,empIdx,si,v)}
                            onSickHrsChange={v=>onSickHrs&&onSickHrs(week.id,grp,empIdx,si,v)}
                            onApprove={()=>onApprove&&onApprove(week.id,grp,empIdx,si)}
                            onDeny={()=>onDeny&&onDeny(week.id,grp,empIdx,si)}
                            onApproveSwap={()=>onApproveSwap&&pendSwap&&onApproveSwap(pendSwap.id)}
                            onDenySwap={()=>onDenySwap&&pendSwap&&onDenySwap(pendSwap.id)}
                            onSwapRequest={()=>onSwapRequest&&onSwapRequest(week.id,grp,empIdx,si,s,dt)}
                          />
                        </td>
                      );
                    });
                    return [...cells,
                      <td key={`${week.id}-tot`} style={{padding:"3px 5px",verticalAlign:"middle",borderLeft:"1px solid #e2e8f0"}}>
                        {emp&&<div style={{background:"#f8fafc",border:"1px solid #e2e8f0",borderRadius:5,padding:"4px",fontSize:12,fontWeight:700,color:tC,textAlign:"center",minWidth:36}}>{tot}</div>}
                      </td>
                    ];
                  })}
                </tr>
              ))
            ];
          })}
        </tbody>
      </table>
    </DualScroll>
  );
}

/* ── SWAP REQUEST MODAL ─────────────────────────────────────────── */
function SwapRequestModal({requesterName,requesterGroup,requesterDate,weekId,shiftIdx,liveWeeks,staffPins,C,onSubmit,onClose}){
  const [targetName,setTargetName]=useState("");
  const [targetGroup,setTargetGroup]=useState("");
  const [note,setNote]=useState("");
  const week=liveWeeks.find(w=>w.id===weekId);
  const targets=useMemo(()=>{
    if(!week)return[];
    const out=[];
    GROUPS.forEach(g=>(week.groups[g]||[]).forEach(e=>{
      if(e.name===requesterName&&g===requesterGroup)return;
      const hasPIN=staffPins.some(p=>p.name===e.name&&p.group===g&&p.pin&&p.pin.length>=3);
      if(!hasPIN)return;
      const s=e.shifts[shiftIdx];
      if(!s||["VAC","OFF","CLOSED","CUSTOM"].includes(s.st)||(!s.t&&!s.st))return;
      out.push({name:e.name,group:g,shift:s});
    }));
    return out;
  },[week,staffPins]);

  const submit=()=>{
    if(!targetName)return;
    onSubmit({weekId,shiftIdx,targetName,targetGroup,note,date:requesterDate});
    onClose();
  };

  return (
    <Modal onClose={onClose}>
      <div style={{padding:24,width:380}}>
        <div style={{fontWeight:800,fontSize:14,color:"#1e293b",marginBottom:4,display:"flex",alignItems:"center",gap:8}}>
          🔄 Request Shift Swap
        </div>
        <div style={{fontSize:9,color:"#64748b",marginBottom:16}}>{requesterName} · {requesterDate}</div>
        <div style={{fontSize:10,fontWeight:600,color:"#475569",marginBottom:8}}>Select who to swap with:</div>
        {targets.length===0
          ? <div style={{padding:"12px 14px",background:"#f8fafc",borderRadius:8,fontSize:10,color:"#94a3b8"}}>No eligible staff found for this day.</div>
          : targets.map(t=>{
            const gc=(C||DEF_COLORS)[t.group]||DEF_COLORS[t.group]; const sel=targetName===t.name&&targetGroup===t.group;
            return(
              <div key={`${t.name}-${t.group}`} onClick={()=>{setTargetName(t.name);setTargetGroup(t.group);}} style={{display:"flex",alignItems:"center",gap:10,padding:"10px 14px",borderRadius:8,border:`1px solid ${sel?"#3b82f6":"#e2e8f0"}`,background:sel?"#eff6ff":"#f8fafc",cursor:"pointer",marginBottom:6}}>
                <div style={{width:8,height:8,borderRadius:"50%",background:gc.acc}}/>
                <span style={{fontWeight:600,fontSize:11,color:"#1e293b",flex:1}}>{t.name}</span>
                <span style={{fontSize:9,padding:"2px 7px",borderRadius:20,background:gc.cbg,border:`1px solid ${gc.cbo}`,color:gc.htx,fontWeight:700}}>{t.group}</span>
                <span style={{fontSize:10,color:"#64748b"}}>{t.shift?.t||"—"}</span>
              </div>
            );
          })
        }
        <input value={note} onChange={e=>setNote(e.target.value)} placeholder="Optional note…" style={{width:"100%",background:"#f8fafc",border:"1px solid #e2e8f0",borderRadius:8,padding:"9px 12px",color:"#1e293b",fontSize:10,outline:"none",boxSizing:"border-box",marginTop:8,marginBottom:16}}/>
        <div style={{display:"flex",gap:8}}>
          <Btn onClick={submit} variant="primary" disabled={!targetName} style={{flex:1,fontSize:11,padding:"10px"}}>🔄 Submit Request</Btn>
          <Btn onClick={onClose} style={{padding:"10px 16px",fontSize:11}}>Cancel</Btn>
        </div>
      </div>
    </Modal>
  );
}

/* ── TIME OFF CALENDAR ──────────────────────────────────────────── */
function TimeOffPage({requests,setRequests,masterWeeks,setMasterWeeks,liveWeeks,lockedTOWeeks,setLockedTOWeeks,isAdmin,staffUnlocked,staffPins,currentUser,onRequestStaffPin,pwd,pwd2,C}){
  const [calStart,setCalStart]=useState(()=>{const d=new Date();return new Date(d.getFullYear(),d.getMonth(),1);});
  const [dragging,setDragging]=useState(false);
  const [dragStart,setDragStart]=useState(null);
  const [dragDates,setDragDates]=useState(new Set());
  const [reqModal,setReqModal]=useState(null);
  const [unlockModal,setUnlockModal]=useState(null);
  const [unlockInput,setUnlockInput]=useState("");
  const [unlockErr,setUnlockErr]=useState(false);
  const scrollRef=useRef(null);
  const renderedReqIds=useRef(new Set());

  // Get all weeks visible in this month
  const calMonthWeeks=useMemo(()=>{
    const y=calStart.getFullYear(),mo=calStart.getMonth();
    const first=new Date(y,mo,1); const last=new Date(y,mo+1,0);
    const allWk=[...liveWeeks,...(masterWeeks||[])];
    return allWk.filter(w=>{
      const ds=w.dates.filter(Boolean);
      if(!ds.length)return false;
      const fs=parseDate(ds[0]); const ls=parseDate(ds[ds.length-1]);
      return fs<=last&&ls>=first;
    });
  },[calStart,liveWeeks,masterWeeks]);

  // v3: Display ALL weeks of the displayed month (Mon-Sun blocks), generating virtual placeholders
  // for weeks that don't yet have a record in liveWeeks or masterWeeks. This way the user can always
  // see the upcoming time-off grid, even before any schedules are built.
  const displayWeeks=useMemo(()=>{
    const y=calStart.getFullYear(),mo=calStart.getMonth();
    const first=new Date(y,mo,1); const last=new Date(y,mo+1,0);
    const seenIds=new Set();
    const out=[];
    const allWk=[...liveWeeks,...(masterWeeks||[])];

    // 1) Pull in all real weeks that overlap this month
    allWk.forEach(w=>{
      if(seenIds.has(w.id))return;
      const ds=w.dates.filter(Boolean);
      if(!ds.length)return;
      const fs=parseDate(ds[0]);
      const ls=parseDate(ds[ds.length-1]);
      if(fs<=last&&ls>=first){seenIds.add(w.id);out.push(w);}
    });

    // 2) Fill in virtual weeks for any Mon-Sun blocks that touch this month and aren't covered yet
    // Track which dates are already accounted for
    const coveredDates=new Set();
    out.forEach(w=>w.dates.forEach(d=>{if(d)coveredDates.add(d);}));

    // Walk back to the Monday on or before the 1st of the month
    let cur=new Date(first);
    const dow=cur.getDay()===0?6:cur.getDay()-1;
    cur.setDate(cur.getDate()-dow);
    // Walk forward week by week until past month end
    while(cur<=last){
      const dates=Array(7).fill(0).map((_,i)=>{
        const d=new Date(cur.getTime()+i*86400000);
        return `${d.getDate()}-${MON[d.getMonth()]}`;
      });
      if(!dates.some(d=>coveredDates.has(d))){
        // No real week covers this Mon-Sun → create a virtual placeholder
        const virt={
          id:`virt-${dates[0]}`,
          label:wkLabel(dates),
          dates,
          published:false,
          virtual:true,
          groups:{Tech:[],VA:[],CCR:[]}
        };
        out.push(virt);
      }
      cur=new Date(cur.getTime()+7*86400000);
    }

    return sortWeeks(out);
  },[calStart,liveWeeks,masterWeeks]);

  const allStaff=useMemo(()=>{
    const seen=new Set(); const out=[];
    const allWk=[...liveWeeks,...(masterWeeks||[])];
    allWk.forEach(w=>GROUPS.forEach(g=>(w.groups[g]||[]).forEach(e=>{const k=`${e.name}||${g}`;if(!seen.has(k)){seen.add(k);out.push({name:e.name,group:g});}})));
    return out;
  },[liveWeeks,masterWeeks]);

  const pendingCount=requests.filter(r=>r.status==="PENDING").length;
  const prevMo=()=>setCalStart(d=>new Date(d.getFullYear(),d.getMonth()-1,1));
  const nextMo=()=>setCalStart(d=>new Date(d.getFullYear(),d.getMonth()+1,1));

  // All dates in this month's displayed weeks
  const allDisplayDates=useMemo(()=>{
    const out=[];
    displayWeeks.forEach(w=>w.dates.forEach(d=>{if(d)out.push(d);}));
    return out;
  },[displayWeeks]);

  const isLivePub=wid=>liveWeeks.some(w=>w.id===wid);
  const isLocked=wid=>lockedTOWeeks.has(wid)||isLivePub(wid);

  const handleLockToggle=(wid,currentlyLocked)=>{
    if(currentlyLocked&&isLivePub(wid)){
      // Need password to unlock a published week
      setUnlockModal({wid}); setUnlockInput(""); setUnlockErr(false);
    } else if(currentlyLocked){
      setLockedTOWeeks(prev=>{const n=new Set(prev);n.delete(wid);return n;});
    } else {
      setLockedTOWeeks(prev=>{const n=new Set(prev);n.add(wid);return n;});
    }
  };

  const submitUnlock=()=>{
    if(unlockInput===pwd||unlockInput===pwd2){
      setLockedTOWeeks(prev=>{const n=new Set(prev);n.delete(unlockModal.wid);return n;});
      setUnlockModal(null); setUnlockInput(""); setUnlockErr(false);
    } else {
      setUnlockErr(true);
    }
  };

  const submitRequest=(dates,type,empName,group,note)=>{
    const id=uid();
    const reqDate=todayStr(); // v2: capture creation date
    const r={id,empName,group,dates,type,status:"PENDING",note,ts:nowTs(),reqDate};
    setRequests(prev=>[...prev,r]);
    // Stamp PENDING in master weeks
    if(setMasterWeeks&&["VAC","SICK","AM2","PM12","PM2","CUSTOM"].includes(type)){
      setMasterWeeks(prev=>prev.map(w=>{
        const newGroups={...w.groups};
        (newGroups[group]||[]).forEach((emp,ei)=>{
          if(emp.name!==empName)return;
          dates.forEach(dt=>{
            const si=w.dates.indexOf(dt);
            if(si<0)return;
            const st=type==="VAC"?"VAC":type==="SICK"?"SICK":type==="CUSTOM"?"CUSTOM":null;
            const t=type==="AM2"?"7:30-2":type==="PM12"?"12-8":type==="PM2"?"2-8":null;
            const customLabel=type==="CUSTOM"?(note||"Custom"):emp.shifts[si]?.customLabel;
            emp.shifts[si]={...emp.shifts[si],st,t:t||emp.shifts[si].t,reqId:id,reqSt:"PENDING",customLabel};
          });
        });
        return{...w,groups:newGroups};
      }));
    }
  };

  const approveReq=id=>{
    setRequests(prev=>prev.map(r=>r.id===id?{...r,status:"APPROVED"}:r));
    setMasterWeeks(prev=>prev.map(w=>({...w,groups:Object.fromEntries(GROUPS.map(g=>[g,(w.groups[g]||[]).map(e=>({...e,shifts:e.shifts.map(s=>s?.reqId===id?{...s,reqSt:"APPROVED"}:s)}))]))})));
  };
  const denyReq=id=>{
    setRequests(prev=>prev.map(r=>r.id===id?{...r,status:"DENIED"}:r));
    setMasterWeeks(prev=>prev.map(w=>({...w,groups:Object.fromEntries(GROUPS.map(g=>[g,(w.groups[g]||[]).map(e=>({...e,shifts:e.shifts.map(s=>s?.reqId===id?{...s,st:null,t:"",reqId:null,reqSt:"DENIED"}:s)}))]))})));
  };

  // v3: Staff can cancel their own PENDING requests; also clears any master stamp
  const cancelRequest=id=>{
    setRequests(prev=>prev.filter(r=>r.id!==id));
    setMasterWeeks(prev=>prev.map(w=>({...w,groups:Object.fromEntries(GROUPS.map(g=>[g,(w.groups[g]||[]).map(e=>({...e,shifts:e.shifts.map(s=>s?.reqId===id?{...s,st:null,t:"",reqId:null,reqSt:null,customLabel:null}:s)}))]))})));
  };

  // Mouse drag for selecting dates
  useEffect(()=>{
    if(!dragging)return;
    const up=()=>{
      if(dragDates.size>0&&dragStart){
        setReqModal({dates:[...dragDates],empName:dragStart.empName,group:dragStart.group});
      }
      setDragging(false); setDragDates(new Set()); setDragStart(null);
    };
    window.addEventListener("mouseup",up);
    return()=>window.removeEventListener("mouseup",up);
  },[dragging,dragDates,dragStart]);

  const REQ_COLORS={VAC:"#f59e0b",SICK:"#ef4444",AM2:"#3b82f6",PM12:"#8b5cf6",PM2:"#a78bfa",CUSTOM:"#c084fc"};

  return (
    <div>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"12px 16px",background:"#fff",border:"1px solid #e2e8f0",borderRadius:10,marginBottom:14,boxShadow:"0 1px 3px rgba(0,0,0,0.06)"}}>
        <div>
          <span style={{fontWeight:800,fontSize:14,color:"#1e293b"}}>TIME OFF REQUESTS</span>
          {pendingCount>0&&<span style={{marginLeft:10,fontSize:9,padding:"2px 8px",borderRadius:20,background:"#fee2e2",border:"1px solid #fca5a5",color:"#dc2626",fontWeight:700}}>{pendingCount} pending</span>}
        </div>
        <div style={{display:"flex",alignItems:"center",gap:8}}>
          <button onClick={prevMo} style={{padding:"4px 10px",border:"1px solid #e2e8f0",borderRadius:6,background:"none",cursor:"pointer",fontSize:14,color:"#64748b"}}>‹</button>
          <span style={{fontWeight:700,fontSize:13,color:"#1e293b",minWidth:110,textAlign:"center"}}>{MON[calStart.getMonth()]} {calStart.getFullYear()}</span>
          <button onClick={nextMo} style={{padding:"4px 10px",border:"1px solid #e2e8f0",borderRadius:6,background:"none",cursor:"pointer",fontSize:14,color:"#64748b"}}>›</button>
        </div>
      </div>

      <DualScroll showTop scrollRef={scrollRef}>
        <table style={{borderCollapse:"separate",borderSpacing:0,background:"#fff",borderRadius:10,overflow:"hidden",boxShadow:"0 1px 4px rgba(0,0,0,0.08)",minWidth:"max-content"}}>
          <thead>
            <tr style={{background:"#f8fafc"}}>
              <th style={{position:"sticky",left:0,zIndex:11,background:"#f8fafc",minWidth:118,padding:"6px 10px",borderBottom:"2px solid #e2e8f0",borderRight:"2px solid #e2e8f0",fontSize:9,color:"#64748b",textAlign:"left",fontWeight:700}}>STAFF</th>
              {displayWeeks.map((week,wi)=>{
                const isLive=isLivePub(week.id);
                const locked=isLocked(week.id)||isLive;
                return(
                  <th key={week.id} colSpan={7} style={{borderLeft:wi>0?"2px solid #e2e8f0":"none",borderBottom:"2px solid #e2e8f0",background:"#f8fafc",padding:"4px 8px",textAlign:"left",whiteSpace:"nowrap"}}>
                    <div style={{display:"flex",alignItems:"center",gap:6,flexWrap:"wrap"}}>
                      <span style={{fontWeight:700,fontSize:10,color:"#1e293b"}}>{week.dates.filter(Boolean)[0]} – {week.dates.filter(Boolean).slice(-1)[0]}</span>
                      {isLive
                        ? <span style={{fontSize:8,padding:"1px 6px",borderRadius:20,background:"#dcfce7",border:"1px solid #86efac",color:"#15803d",fontWeight:700}}>🟢 LIVE</span>
                        : locked
                          ? <span style={{fontSize:8,padding:"1px 6px",borderRadius:20,background:"#fef3c7",border:"1px solid #fde047",color:"#92400e",fontWeight:700}}>🔐 Locked</span>
                          : <span style={{fontSize:8,padding:"1px 6px",borderRadius:20,background:"#f0fdf4",border:"1px solid #86efac",color:"#15803d",fontWeight:700}}>🔓 Open</span>
                      }
                      {isAdmin&&<button onClick={()=>handleLockToggle(week.id,locked&&!isLive)} style={{fontSize:8,border:"1px solid #e2e8f0",borderRadius:4,background:"none",cursor:"pointer",color:"#94a3b8",padding:"1px 4px"}}>{locked?"Unlock":"Lock"}</button>}
                    </div>
                  </th>
                );
              })}
            </tr>
            <tr style={{background:"#f8fafc"}}>
              <td style={{position:"sticky",left:0,zIndex:6,background:"#f8fafc",borderRight:"2px solid #e2e8f0",borderBottom:"1px solid #e2e8f0"}}/>
              {displayWeeks.flatMap((week,wi)=>
                DAYS.map((d,di)=>{
                  const dt=week.dates?.[di]||"";
                  const isT=dt===todayStr();
                  return(
                    <td key={`${week.id}-${d}`} style={{textAlign:"center",padding:"3px 1px",minWidth:46,borderLeft:di===0&&wi>0?"2px solid #e2e8f0":"none",borderBottom:"1px solid #e2e8f0",background:isT?"#dbeafe":"transparent"}}>
                      <div style={{fontSize:9,fontWeight:700,color:isT?"#1d4ed8":"#64748b"}}>{d}</div>
                      <div style={{fontSize:7,color:isT?"#3b82f6":"#94a3b8"}}>{dt.split("-")[0]}</div>
                    </td>
                  );
                })
              )}
            </tr>
          </thead>
          <tbody>
            {GROUPS.flatMap(grp=>{
              const gc=(C||DEF_COLORS)[grp]||DEF_COLORS[grp];
              const grpStaff=allStaff.filter(s=>s.group===grp);
              if(!grpStaff.length)return[];
              return [
                // Group header row
                <tr key={`gh-${grp}`}>
                  <td colSpan={1+displayWeeks.length*7} style={{padding:"4px 10px",background:gc.gbg,borderTop:"2px solid #e2e8f0",borderBottom:"1px solid #e2e8f0"}}>
                    <span style={{fontWeight:800,fontSize:10,color:gc.htx,letterSpacing:"0.12em",textTransform:"uppercase"}}>{grp}</span>
                    <span style={{marginLeft:8,fontSize:9,color:gc.acc}}>{grpStaff.length} staff</span>
                  </td>
                </tr>,
                ...grpStaff.map((staff,si)=>{
                  // v3: Only current user can edit their own row. Admin can edit any row.
                  const isOwnRow=currentUser&&currentUser.name===staff.name&&currentUser.group===staff.group;
                  const canEdit=isAdmin||isOwnRow;
                  // Row background: role-tinted, alternating
                  const rowBg=si%2===0?"#fff":gc.gbg+"44";
                  const stickyBg=si%2===0?"#fff":gc.gbg+"cc";
                  return(
                    <tr key={`${staff.name}-${grp}`} style={{background:rowBg}}>
                      <td style={{position:"sticky",left:0,zIndex:5,background:stickyBg,padding:"4px 10px",borderRight:"2px solid #e2e8f0",whiteSpace:"nowrap",verticalAlign:"middle"}}>
                        <div style={{display:"flex",alignItems:"center",gap:6}}>
                          <div style={{width:6,height:6,borderRadius:"50%",background:gc.acc,flexShrink:0}}/>
                          <span style={{fontWeight:600,fontSize:11,color:"#1e293b"}}>{staff.name}</span>
                          {isOwnRow&&<span style={{fontSize:7,padding:"1px 5px",borderRadius:8,background:gc.cbg,border:`1px solid ${gc.cbo}`,color:gc.htx,fontWeight:700}}>you</span>}
                        </div>
                      </td>
                      {displayWeeks.flatMap((week,wi)=>{
                        const locked=isLocked(week.id);
                        return DAYS.map((d,di)=>{
                          const dt=week.dates?.[di]||"";
                          if(!dt) return <td key={`${week.id}-${di}`} style={{borderLeft:di===0&&wi>0?"2px solid #e2e8f0":"none",padding:0}}><div style={{minHeight:38,margin:"1px",borderRadius:4,background:"#f8fafc"}}/></td>;

                          const reqs=requests.filter(r=>r.empName===staff.name&&r.group===grp&&r.dates.includes(dt));
                          const approved=reqs.find(r=>r.status==="APPROVED");
                          const pending=reqs.find(r=>r.status==="PENDING");
                          const denied=reqs.find(r=>r.status==="DENIED");
                          const req=approved||pending||denied;
                          const isDragging=dragDates.has(dt)&&dragStart?.empName===staff.name&&dragStart?.group===grp;

                          // v3: Role-colored cells. Empty cells use the group's subtle tint.
                          // Requests override with their type color.
                          const reqTypeColor=req?REQ_COLORS[req.type]||"#64748b":null;
                          // Cell background: role-tint when empty, req color when filled
                          const cellBg=req
                            ? (req.status==="PENDING" ? reqTypeColor+"28" : req.status==="APPROVED" ? reqTypeColor+"40" : "#f1f5f9")
                            : isDragging ? gc.cbg+"99"
                            : locked ? gc.gbg+"55"
                            : canEdit ? gc.gbg
                            : gc.gbg+"55";
                          const cellBorder=req
                            ? `${req.status==="PENDING"?"2px dashed":"1px solid"} ${reqTypeColor}`
                            : isDragging ? `2px dashed ${gc.acc}`
                            : `1px solid ${gc.cbo}55`;

                          return(
                            <td key={`${week.id}-${di}`} style={{padding:"2px 1px",verticalAlign:"top",borderLeft:di===0&&wi>0?"2px solid #e2e8f0":"none",minWidth:46}}>
                              <div
                                style={{
                                  minHeight:38,
                                  borderRadius:4,
                                  margin:"1px",
                                  border:cellBorder,
                                  background:cellBg,
                                  cursor:canEdit&&!locked&&!req?"pointer":req&&canEdit&&req.status==="PENDING"?"pointer":"default",
                                  position:"relative",
                                  transition:"background 0.1s",
                                  opacity:locked&&!req?0.7:1
                                }}
                                onMouseDown={()=>{if(!canEdit||locked||req)return;setDragging(true);setDragStart({empName:staff.name,group:grp});setDragDates(new Set([dt]));}}
                                onMouseEnter={()=>{if(dragging&&dragStart?.empName===staff.name&&dragStart?.group===grp)setDragDates(prev=>{const n=new Set(prev);n.add(dt);return n;});}}
                              >
                                {req&&(
                                  <div style={{padding:"3px 4px"}}>
                                    {/* Status badge */}
                                    <div style={{fontSize:7,fontWeight:700,marginBottom:1,color:
                                      req.status==="APPROVED"?"#15803d":
                                      req.status==="DENIED"?"#94a3b8":
                                      reqTypeColor}}>
                                      {req.status==="APPROVED"?"✓ approved":req.status==="DENIED"?"✕ declined":"⏳ pending"}
                                    </div>
                                    {/* Request type label */}
                                    <div style={{fontSize:9,fontWeight:700,color:req.status==="DENIED"?"#94a3b8":reqTypeColor}}>
                                      {req.type==="CUSTOM"&&req.note?req.note:(REQ_TYPES[req.type]?.s||req.type)}
                                    </div>
                                    {/* Request date */}
                                    {req.reqDate&&<div style={{fontSize:6,color:"#94a3b8",fontStyle:"italic"}}>req {req.reqDate}</div>}
                                    {/* Admin: approve/deny buttons */}
                                    {isAdmin&&req.status==="PENDING"&&(
                                      <div style={{display:"flex",gap:2,marginTop:3}} onClick={e=>e.stopPropagation()}>
                                        <Btn onClick={()=>approveReq(req.id)} variant="success" style={{flex:1,padding:"1px",fontSize:7}}>✓</Btn>
                                        <Btn onClick={()=>denyReq(req.id)} variant="danger" style={{flex:1,padding:"1px",fontSize:7}}>✕</Btn>
                                      </div>
                                    )}
                                    {/* Own row: cancel pending request */}
                                    {!isAdmin&&isOwnRow&&req.status==="PENDING"&&(
                                      <div style={{marginTop:3}} onClick={e=>e.stopPropagation()}>
                                        <button
                                          onClick={()=>{if(window.confirm("Cancel this request?"))cancelRequest(req.id);}}
                                          style={{width:"100%",padding:"1px 2px",fontSize:7,border:"1px solid #fca5a5",background:"#fee2e2",color:"#dc2626",borderRadius:3,cursor:"pointer",fontWeight:600}}>
                                          ✕ cancel
                                        </button>
                                      </div>
                                    )}
                                    {/* Own row: change approved request (submits new pending over it) */}
                                    {!isAdmin&&isOwnRow&&req.status==="APPROVED"&&!locked&&(
                                      <div style={{marginTop:3}} onClick={e=>e.stopPropagation()}>
                                        <button
                                          onClick={()=>setReqModal({dates:[dt],empName:staff.name,group:grp,replacingId:req.id})}
                                          style={{width:"100%",padding:"1px 2px",fontSize:7,border:`1px solid ${gc.cbo}`,background:gc.cbg,color:gc.htx,borderRadius:3,cursor:"pointer",fontWeight:600}}>
                                          ✎ change
                                        </button>
                                      </div>
                                    )}
                                  </div>
                                )}
                                {/* Empty + can edit + not locked: show + hint */}
                                {!req&&canEdit&&!locked&&(
                                  <div style={{position:"absolute",inset:0,display:"flex",alignItems:"center",justifyContent:"center",opacity:0.3,fontSize:11,color:gc.acc,fontWeight:700,pointerEvents:"none"}}>+</div>
                                )}
                              </div>
                            </td>
                          );
                        });
                      })}
                    </tr>
                  );
                })
              ];
            })}
          </tbody>
        </table>
      </DualScroll>

      {/* Request modal */}
      {reqModal&&(
        <Modal onClose={()=>setReqModal(null)}>
          <div style={{padding:24,width:340}}>
            <div style={{fontWeight:800,fontSize:14,color:"#1e293b",marginBottom:4}}>
              {reqModal.replacingId?"Change Time Off Request":"New Time Off Request"}
            </div>
            <div style={{fontSize:9,color:"#64748b",marginBottom:14}}>{reqModal.empName} · {reqModal.dates.join(", ")}</div>
            {reqModal.replacingId&&(
              <div style={{marginBottom:10,padding:"6px 10px",background:"#fef3c7",border:"1px solid #fde047",borderRadius:7,fontSize:9,color:"#92400e"}}>
                This will cancel your existing approved request and submit a new one for admin to re-approve.
              </div>
            )}
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6}}>
              {Object.entries(REQ_TYPES).filter(([k])=>k!=="SICK").map(([k,v])=>(
                <button key={k} onClick={()=>{
                  if(k==="CUSTOM"){setReqModal({...reqModal,pickingCustom:true});return;}
                  if(reqModal.replacingId)cancelRequest(reqModal.replacingId);
                  submitRequest(reqModal.dates,k,reqModal.empName,reqModal.group);
                  setReqModal(null);
                }} style={{padding:"10px 8px",borderRadius:8,border:`1px solid ${REQ_COLORS[k]||"#e2e8f0"}`,background:(REQ_COLORS[k]||"#f8fafc")+"22",color:REQ_COLORS[k]||"#475569",fontSize:10,fontWeight:600,cursor:"pointer",textAlign:"left"}}>{v.l}</button>
              ))}
            </div>
            {reqModal.pickingCustom&&(
              <div style={{marginTop:12,padding:12,background:"#faf5ff",border:"1px solid #c084fc",borderRadius:8}}>
                <div style={{fontSize:10,fontWeight:700,color:"#581c87",marginBottom:6}}>Custom request label:</div>
                <input autoFocus value={reqModal.customText||""} onChange={e=>setReqModal({...reqModal,customText:e.target.value})} onKeyDown={e=>{if(e.key==="Enter"&&reqModal.customText?.trim()){if(reqModal.replacingId)cancelRequest(reqModal.replacingId);submitRequest(reqModal.dates,"CUSTOM",reqModal.empName,reqModal.group,reqModal.customText.trim());setReqModal(null);}}} placeholder="e.g. Doctor appt, Personal day…" style={{width:"100%",background:"#fff",border:"1px solid #c084fc",borderRadius:6,padding:"7px 10px",fontSize:11,outline:"none",boxSizing:"border-box",marginBottom:8}}/>
                <Btn onClick={()=>{if(reqModal.customText?.trim()){if(reqModal.replacingId)cancelRequest(reqModal.replacingId);submitRequest(reqModal.dates,"CUSTOM",reqModal.empName,reqModal.group,reqModal.customText.trim());setReqModal(null);}}} variant="primary" disabled={!reqModal.customText?.trim()} style={{width:"100%",fontSize:10}}>Submit Custom Request</Btn>
              </div>
            )}
            <Btn onClick={()=>setReqModal(null)} style={{width:"100%",marginTop:12,fontSize:10}}>Cancel</Btn>
          </div>
        </Modal>
      )}

      {/* Unlock modal */}
      {unlockModal&&(
        <Modal onClose={()=>setUnlockModal(null)}>
          <div style={{padding:24,width:300}}>
            <div style={{fontWeight:700,fontSize:13,color:"#1e293b",marginBottom:12}}>🔐 Unlock Published Week</div>
            <input type="password" autoFocus value={unlockInput} onChange={e=>setUnlockInput(e.target.value)} onKeyDown={e=>e.key==="Enter"&&submitUnlock()} placeholder="Admin password" style={{width:"100%",background:"#f8fafc",border:`1px solid ${unlockErr?"#ef4444":"#e2e8f0"}`,borderRadius:8,padding:"9px 12px",color:"#1e293b",fontSize:13,outline:"none",boxSizing:"border-box",marginBottom:8}}/>
            {unlockErr&&<div style={{fontSize:9,color:"#ef4444",fontWeight:700,marginBottom:8}}>⚠ Incorrect password</div>}
            <div style={{display:"flex",gap:8}}>
              <Btn onClick={submitUnlock} variant="primary" style={{flex:1,fontSize:11}}>Unlock</Btn>
              <Btn onClick={()=>setUnlockModal(null)} style={{fontSize:11}}>Cancel</Btn>
            </div>
          </div>
        </Modal>
      )}
    </div>
  );
}

/* ── MESSAGES PAGE ──────────────────────────────────────────────── */
function MessagesPage({messages,setMessages,swapRequests,isAdmin,addAudit,currentUser,onApproveSwap,onDenySwap,gasVerifyAnyPin}){
  const [tab,setTab]=useState("inbox");
  const [sendPin,setSendPin]=useState(false);
  const [msgInput,setMsgInput]=useState("");
  const [sendChecking,setSendChecking]=useState(false);

  const inbox=messages.filter(m=>!m.isSwap);
  const unread=inbox.filter(m=>!m.read);
  const pending=swapRequests?.filter(s=>s.status==="PENDING")||[];

  const markAllRead=()=>setMessages(prev=>prev.map(m=>({...m,read:true})));
  const deleteMsg=id=>setMessages(prev=>prev.filter(m=>m.id!==id));

  // GAS-backed send: verify PIN server-side, then post message
  const sendMsg=async(pin)=>{
    if(!msgInput.trim())return;
    setSendChecking(true);
    try {
      const res=await gasVerifyAnyPin(pin);
      if(!res.match){setSendChecking(false);return;}
      const id=uid();
      setMessages(prev=>[...prev,{id,from:res.name,group:res.group,body:msgInput,ts:nowTs(),read:false,isSwap:false}]);
      if(addAudit)addAudit(res.name,"Sent a message","action");
      setMsgInput(""); setSendPin(false);
    } catch{} finally{setSendChecking(false);}
  };



  return (
    <div>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"12px 16px",background:"#fff",border:"1px solid #e2e8f0",borderRadius:10,marginBottom:14,boxShadow:"0 1px 3px rgba(0,0,0,0.06)"}}>
        <span style={{fontWeight:800,fontSize:14,color:"#1e293b"}}>💬 Messages</span>
        <button onClick={()=>setSendPin(true)} style={{padding:"7px 14px",borderRadius:7,border:"1px solid #3b82f6",background:"#eff6ff",color:"#1d4ed8",fontSize:10,fontWeight:600,cursor:"pointer"}}>+ Send a Message</button>
      </div>

      {isAdmin&&(
        <div style={{display:"flex",gap:4,marginBottom:12}}>
          <button onClick={()=>setTab("inbox")} style={{padding:"6px 14px",borderRadius:7,border:`1px solid ${tab==="inbox"?"#3b82f6":"#e2e8f0"}`,background:tab==="inbox"?"#eff6ff":"#fff",color:tab==="inbox"?"#1d4ed8":"#64748b",fontSize:10,cursor:"pointer",fontWeight:tab==="inbox"?700:400,position:"relative"}}>
            Inbox {unread.length>0&&<span style={{marginLeft:4,background:"#ef4444",color:"#fff",borderRadius:10,fontSize:7,padding:"1px 5px",fontWeight:700}}>{unread.length}</span>}
          </button>
          <button onClick={()=>setTab("swaps")} style={{padding:"6px 14px",borderRadius:7,border:`1px solid ${tab==="swaps"?"#3b82f6":"#e2e8f0"}`,background:tab==="swaps"?"#eff6ff":"#fff",color:tab==="swaps"?"#1d4ed8":"#64748b",fontSize:10,cursor:"pointer",fontWeight:tab==="swaps"?700:400,position:"relative"}}>
            Swap Requests {pending.length>0&&<span style={{marginLeft:4,background:"#ef4444",color:"#fff",borderRadius:10,fontSize:7,padding:"1px 5px",fontWeight:700}}>{pending.length}</span>}
          </button>
        </div>
      )}

      {tab==="inbox"&&isAdmin&&(
        <div style={{background:"#fff",border:"1px solid #e2e8f0",borderRadius:10,overflow:"hidden",boxShadow:"0 1px 3px rgba(0,0,0,0.06)"}}>
          {isAdmin&&unread.length>0&&(
            <div style={{padding:"8px 14px",borderBottom:"1px solid #f1f5f9",display:"flex",justifyContent:"flex-end",gap:6}}>
              <Btn onClick={markAllRead} style={{fontSize:9}}>Mark all read</Btn>
            </div>
          )}
          {inbox.length===0
            ? <div style={{padding:40,textAlign:"center",color:"#94a3b8",fontSize:11}}>No messages yet.</div>
            : inbox.slice().reverse().map(m=>(
              <div key={m.id} style={{padding:"12px 16px",borderBottom:"1px solid #f1f5f9",background:!m.read?"#fefce8":"#fff",display:"flex",gap:12,alignItems:"flex-start"}}>
                <div style={{width:8,height:8,borderRadius:"50%",background:m.read?"#e2e8f0":"#f59e0b",flexShrink:0,marginTop:4}}/>
                <div style={{flex:1}}>
                  <div style={{display:"flex",gap:8,alignItems:"center",marginBottom:3}}>
                    <span style={{fontWeight:700,fontSize:11,color:"#1e293b"}}>{m.from}</span>
                    <span style={{fontSize:8,color:"#94a3b8"}}>{m.ts}</span>
                  </div>
                  <div style={{fontSize:10,color:"#475569"}}>{m.body}</div>
                </div>
                {isAdmin&&(
                  <div style={{display:"flex",gap:4,flexShrink:0}}>
                    {!m.read&&<Btn onClick={()=>setMessages(prev=>prev.map(x=>x.id===m.id?{...x,read:true}:x))} style={{fontSize:8,padding:"2px 6px"}}>Read</Btn>}
                    <Btn onClick={()=>deleteMsg(m.id)} variant="danger" style={{fontSize:8,padding:"2px 6px"}}>✕</Btn>
                  </div>
                )}
              </div>
            ))
          }
        </div>
      )}

      {/* v2: Non-admin staff see only the send-message button. Inbox is admin-only per spec. */}
      {!isAdmin&&(
        <div style={{background:"#fff",border:"1px solid #e2e8f0",borderRadius:10,padding:24,textAlign:"center",boxShadow:"0 1px 3px rgba(0,0,0,0.06)"}}>
          <div style={{fontSize:32,marginBottom:8,opacity:0.5}}>💬</div>
          <div style={{fontSize:11,color:"#475569",fontWeight:600,marginBottom:4}}>Messages are sent privately to the admin team.</div>
          <div style={{fontSize:9,color:"#94a3b8"}}>Use the <strong>+ Send a Message</strong> button above. Only admins can read messages.</div>
        </div>
      )}

      {tab==="swaps"&&isAdmin&&(
        <div style={{background:"#fff",border:"1px solid #e2e8f0",borderRadius:10,overflow:"hidden",boxShadow:"0 1px 3px rgba(0,0,0,0.06)"}}>
          {(swapRequests||[]).length===0
            ? <div style={{padding:40,textAlign:"center",color:"#94a3b8",fontSize:11}}>No swap requests.</div>
            : (swapRequests||[]).slice().reverse().map(s=>{
              const isPend=s.status==="PENDING";
              return(
                <div key={s.id} style={{padding:"14px 16px",borderBottom:"1px solid #f1f5f9",background:isPend?"#faf5ff":"#fff"}}>
                  <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:8,flexWrap:"wrap"}}>
                    <span style={{fontSize:8,padding:"2px 7px",borderRadius:20,background:isPend?"#ede9fe":"#f1f5f9",color:isPend?"#4c1d95":"#64748b",fontWeight:700,border:`1px solid ${isPend?"#a78bfa":"#e2e8f0"}`}}>{s.status}</span>
                    <span style={{fontSize:9,color:"#94a3b8"}}>{s.ts}</span>
                  </div>
                  <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:8,flexWrap:"wrap"}}>
                    <div style={{padding:"6px 10px",background:"#f0fdf4",border:"1px solid #86efac",borderRadius:7,display:"flex",alignItems:"center",gap:6}}>
                      <span style={{fontWeight:700,fontSize:11}}>{s.requesterName}</span>
                      <span style={{fontSize:9,color:"#16a34a"}}>{s.requesterShift?.t||"—"}</span>
                    </div>
                    <span style={{fontSize:14,color:"#7c3aed",fontWeight:700}}>⇄</span>
                    <div style={{padding:"6px 10px",background:"#eef2ff",border:"1px solid #a5b4fc",borderRadius:7,display:"flex",alignItems:"center",gap:6}}>
                      <span style={{fontWeight:700,fontSize:11}}>{s.targetName}</span>
                      <span style={{fontSize:9,color:"#4338ca"}}>{s.targetShift?.t||"—"}</span>
                    </div>
                    <span style={{fontSize:9,color:"#64748b"}}>on {s.date}</span>
                  </div>
                  {s.note&&<div style={{fontSize:9,color:"#475569",background:"#f8fafc",border:"1px solid #e2e8f0",borderRadius:5,padding:"5px 8px",marginBottom:8}}>"{s.note}"</div>}
                  {isPend&&<div style={{display:"flex",gap:6}}>
                    <Btn onClick={()=>onApproveSwap&&onApproveSwap(s.id)} variant="success" style={{fontSize:9}}>✓ Approve</Btn>
                    <Btn onClick={()=>onDenySwap&&onDenySwap(s.id)} variant="danger" style={{fontSize:9}}>✕ Deny</Btn>
                  </div>}
                </div>
              );
            })
          }
        </div>
      )}

      {/* Send message modal */}
      {sendPin&&(
        <Modal onClose={()=>setSendPin(false)}>
          <div style={{padding:24,width:320}}>
            <div style={{fontWeight:700,fontSize:13,color:"#1e293b",marginBottom:8}}>Send a Message</div>
            <textarea value={msgInput} onChange={e=>setMsgInput(e.target.value)} placeholder="Your message…" rows={4} style={{width:"100%",background:"#f8fafc",border:"1px solid #e2e8f0",borderRadius:8,padding:"10px 12px",color:"#1e293b",fontSize:11,outline:"none",boxSizing:"border-box",resize:"vertical",marginBottom:12}}/>
            <div style={{fontSize:10,color:"#64748b",marginBottom:10}}>Enter your PIN to send:</div>
            <GasPinPad onEntry={sendMsg} err={false} checking={sendChecking}/>
            <Btn onClick={()=>setSendPin(false)} style={{width:"100%",marginTop:8,fontSize:9}}>Cancel</Btn>
          </div>
        </Modal>
      )}
    </div>
  );
}

/* ── MASTER PAGE ────────────────────────────────────────────────── */
function MasterPage({masterWeeks,setMasterWeeks,liveWeeks,setLiveWeeks,masterArchived,setMasterArchived,liveArchived,setLiveArchived,masterBackfill,setMasterBackfill,C,onSC,onRC,requests,setRequests,addAudit,pwd,pwd2,pushUndo,customDayLabels}){
  const [tab,setTab]=useState("active");
  const [coverModal,setCoverModal]=useState(null);
  const [newEmpModal,setNewEmpModal]=useState(null);
  const [newEmpName,setNewEmpName]=useState("");
  const [deleteConfirm,setDeleteConfirm]=useState(null);

  const addWeek=()=>{
    const all=[...masterWeeks,...(liveWeeks||[])];
    const last=sortWeeks(all).slice(-1)[0];
    const dates=last?nextWeekDates(last.dates):Array(7).fill(0).map((_,i)=>{const d=new Date();d.setDate(d.getDate()-d.getDay()+1+i);return`${d.getDate()}-${MON[d.getMonth()]}`;});
    if(datesOverlap(dates,[...masterWeeks,...(liveWeeks||[])])){alert("Date overlap detected.");return;}
    const seed=sortWeeks(masterWeeks).slice(-1)[0]||sortWeeks(liveWeeks||[]).slice(-1)[0];
    const groups={};
    GROUPS.forEach(g=>{groups[g]=(seed?.groups[g]||[]).map(e=>({...e,id:uid(),shifts:dates.map((_,i)=>i===6?mkClosed():mkShift(""))}));});
    const wk={id:uid(),label:wkLabel(dates),dates,published:false,groups};
    setMasterWeeks(prev=>sortWeeks([...prev,wk]));
    addAudit("Admin",`Added master week ${wk.label}`);
  };

  // v2: Seed backfill weeks Jan 1 → May 3
  const seedBackfill=()=>{
    if((masterBackfill||[]).length>0){if(!window.confirm("Backfill already has weeks. Adding more on top of existing? Click OK to add Jan 1 → May 3 weeks (will skip dates that overlap)."))return;}
    const seedWks=seedBackfillWeeks(BACKFILL_START,BACKFILL_END);
    // Carry employees over from the most recent master week if any
    const seed=sortWeeks(masterWeeks).slice(-1)[0]||sortWeeks(liveWeeks||[]).slice(-1)[0];
    seedWks.forEach(wk=>{
      GROUPS.forEach(g=>{wk.groups[g]=(seed?.groups[g]||[]).map(e=>({...e,id:uid(),shifts:wk.dates.map((_,i)=>i===6?mkClosed():mkShift(""))}));});
    });
    // Filter out anything that overlaps with existing backfill
    const existing=new Set();
    (masterBackfill||[]).forEach(w=>w.dates.forEach(d=>{if(d)existing.add(d);}));
    const fresh=seedWks.filter(w=>!w.dates.some(d=>d&&existing.has(d)));
    setMasterBackfill(prev=>sortWeeks([...(prev||[]),...fresh]));
    addAudit("Admin",`Seeded ${fresh.length} backfill weeks (${BACKFILL_START} → ${BACKFILL_END})`);
  };

  const addBackfillWeek=()=>{
    const last=sortWeeks(masterBackfill||[]).slice(-1)[0];
    const dates=last?nextWeekDates(last.dates):Array(7).fill(0).map((_,i)=>{const d=new Date(2026,0,1);d.setDate(d.getDate()-d.getDay()+1+i);return`${d.getDate()}-${MON[d.getMonth()]}`;});
    if(datesOverlap(dates,masterBackfill||[])){alert("Date overlap with existing backfill week.");return;}
    const seed=sortWeeks(masterBackfill||[]).slice(-1)[0]||sortWeeks(masterWeeks).slice(-1)[0];
    const groups={};
    GROUPS.forEach(g=>{groups[g]=(seed?.groups[g]||[]).map(e=>({...e,id:uid(),shifts:dates.map((_,i)=>i===6?mkClosed():mkShift(""))}));});
    const wk={id:uid(),label:wkLabel(dates),dates,published:false,backfill:true,groups};
    setMasterBackfill(prev=>sortWeeks([...(prev||[]),wk]));
    addAudit("Admin",`Added backfill week ${wk.label}`);
  };

  // v2: Archive a backfill week → Past Schedules (liveArchived) + Master Archive
  const archiveBackfill=wid=>{
    const wk=(masterBackfill||[]).find(w=>w.id===wid); if(!wk)return;
    if(!window.confirm(`Archive ${wk.label} to Past Schedules and Master Archive? This action records the week into stats and request history.`))return;
    const finalized={...deepClone(wk),approved:true,published:true,backfill:true};
    setLiveArchived&&setLiveArchived(prev=>sortWeeks([...prev.filter(x=>x.id!==wid),finalized]));
    setMasterArchived(prev=>sortWeeks([...prev.filter(x=>x.id!==wid),finalized]));
    setMasterBackfill(prev=>(prev||[]).filter(x=>x.id!==wid));
    addAudit("Admin",`Archived backfill week ${wk.label} → Past Schedules + Master Archive`);
  };

  const doPublish=wid=>{
    const wk=masterWeeks.find(w=>w.id===wid); if(!wk)return;
    setMasterWeeks(prev=>prev.map(w=>w.id===wid?{...w,published:true}:w));
    setLiveWeeks(prev=>{
      if(prev.some(w=>w.id===wid))return prev.map(w=>w.id===wid?{...deepClone(wk),published:true,approved:true}:w);
      return sortWeeks([...prev,{...deepClone(wk),published:true,approved:true}]);
    });
    addAudit("Admin",`Published week ${wk.label}`);
  };

  const publishWeek=wid=>{
    const wk=masterWeeks.find(w=>w.id===wid); if(!wk)return;
    if(liveArchived?.some(w=>w.id===wid)){alert("This week is in Live Archive. Restore it first.");return;}
    const flags=checkCoverage(wk);
    if(flags.length>0){setCoverModal({weekId:wid,flags});return;}
    doPublish(wid);
  };

  const unpublish=wid=>{
    setMasterWeeks(prev=>prev.map(w=>w.id===wid?{...w,published:false}:w));
    setLiveWeeks(prev=>prev.filter(w=>w.id!==wid));
    addAudit("Admin","Unpublished week");
  };

  // v3: archiveMaster works at any time. If the week is currently live, the live version stays;
  // we only move/copy the master copy into Master Archive. If the week was already in Master Archive,
  // we update it (keeping date order).
  const archiveMaster=wid=>{
    const w=masterWeeks.find(x=>x.id===wid);
    if(!w){alert("Week not found in Master Schedule.");return;}
    setMasterArchived(prev=>sortWeeks([...prev.filter(x=>x.id!==wid),deepClone(w)]));
    setMasterWeeks(prev=>prev.filter(x=>x.id!==wid));
    addAudit&&addAudit("Admin",`Archived master ${w.label} → Master Archive`);
  };

  const restoreFromMasterArchive=wid=>{
    setMasterArchived(prev=>{
      const w=prev.find(x=>x.id===wid);
      if(w)setMasterWeeks(m=>sortWeeks([...m.filter(x=>x.id!==wid),deepClone(w)]));
      return prev.filter(x=>x.id!==wid);
    });
  };

  const moveEmp=(wid,grp,idx,dir)=>{
    setMasterWeeks(prev=>prev.map(w=>{
      if(w.id!==wid)return w;
      const arr=[...w.groups[grp]]; const ni=idx+dir;
      if(ni<0||ni>=arr.length)return w;
      [arr[idx],arr[ni]]=[arr[ni],arr[idx]];
      return{...w,groups:{...w.groups,[grp]:arr}};
    }));
  };

  const renameEmp=(wid,grp,idx,name)=>{
    setMasterWeeks(prev=>prev.map(w=>w.id!==wid?w:{...w,groups:{...w.groups,[grp]:w.groups[grp].map((e,i)=>i===idx?{...e,name}:e)}}));
  };

  const confirmAddEmp=()=>{
    if(!newEmpModal||!newEmpName.trim())return;
    const{weekId,grp,isBackfill:bfill}=newEmpModal;
    if(bfill){
      addEmpBackfill(weekId,grp,newEmpName.trim());
      addAudit("Admin",`Added ${newEmpName} to ${grp} (backfill)`);
    } else {
      const s2=sortWeeks(masterWeeks); const fi=s2.findIndex(w=>w.id===weekId);
      const newE={id:uid(),name:newEmpName.trim(),shifts:masterWeeks.find(w=>w.id===weekId)?.dates.map((_,i)=>i===6?mkClosed():mkShift(""))||[]};
      setMasterWeeks(prev=>prev.map(w=>{const wi2=s2.findIndex(x=>x.id===w.id);if(wi2<fi)return w;return{...w,groups:{...w.groups,[grp]:[...(w.groups[grp]||[]),{...deepClone(newE),id:uid(),shifts:w.dates.map((_,i)=>i===6?mkClosed():mkShift(""))}]}};}));
      addAudit("Admin",`Added ${newEmpName} to ${grp}`);
    }
    setNewEmpModal(null);setNewEmpName("");
  };

  const confirmDelEmp=()=>{
    if(!deleteConfirm)return;
    const{weekId,group:grp,name,isBackfill:bfill}=deleteConfirm;
    if(bfill){
      deleteEmpBackfill(weekId,grp,name);
      addAudit("Admin",`Deleted ${name} from ${grp} (backfill)`);
    } else {
      const snapshot=deepClone(masterWeeks);
      pushUndo&&pushUndo({type:"delEmp",snapshot});
      const s2=sortWeeks(masterWeeks); const fi=s2.findIndex(w=>w.id===weekId);
      setMasterWeeks(prev=>prev.map(w=>{const wi2=s2.findIndex(x=>x.id===w.id);if(wi2<fi)return w;return{...w,groups:{...w.groups,[grp]:(w.groups[grp]||[]).filter(e=>e.name!==name)}};}));
      addAudit("Admin",`Deleted ${name} from ${grp} from week ${weekId} onward`);
    }
    setDeleteConfirm(null);
  };

  const updM=(wid,g,ei,si,patch)=>setMasterWeeks(prev=>prev.map(w=>{if(w.id!==wid)return w;return{...w,groups:{...w.groups,[g]:w.groups[g].map((emp,i)=>i!==ei?emp:{...emp,shifts:emp.shifts.map((s,j)=>j!==si?s:{...s,...patch})})}};}));
  // v2: backfill updater
  const updB=(wid,g,ei,si,patch)=>setMasterBackfill(prev=>(prev||[]).map(w=>{if(w.id!==wid)return w;return{...w,groups:{...w.groups,[g]:w.groups[g].map((emp,i)=>i!==ei?emp:{...emp,shifts:emp.shifts.map((s,j)=>j!==si?s:{...s,...patch})})}};}));
  // v2: backfill name/order/delete operations
  const renameEmpBackfill=(wid,grp,idx,name)=>setMasterBackfill(prev=>(prev||[]).map(w=>w.id!==wid?w:{...w,groups:{...w.groups,[grp]:w.groups[grp].map((e,i)=>i!==idx?e:{...e,name})}}));
  const moveEmpBackfill=(wid,grp,idx,dir)=>setMasterBackfill(prev=>(prev||[]).map(w=>{if(w.id!==wid)return w;const arr=[...w.groups[grp]]; const ni=idx+dir;if(ni<0||ni>=arr.length)return w;[arr[idx],arr[ni]]=[arr[ni],arr[idx]];return{...w,groups:{...w.groups,[grp]:arr}};}));
  const deleteEmpBackfill=(wid,grp,name)=>setMasterBackfill(prev=>(prev||[]).map(w=>w.id!==wid?w:{...w,groups:{...w.groups,[grp]:(w.groups[grp]||[]).filter(e=>e.name!==name)}}));
  const addEmpBackfill=(wid,grp,name)=>setMasterBackfill(prev=>(prev||[]).map(w=>{if(w.id!==wid)return w;const dates=w.dates;const newEmp={id:uid(),name,shifts:dates.map((_,i)=>i===6?mkClosed():mkShift(""))};return{...w,groups:{...w.groups,[grp]:[...(w.groups[grp]||[]),newEmp]}};}));

  const renderWeekCard=(week,isArch,isBackfill)=>{
    const isLive=liveWeeks.some(w=>w.id===week.id);
    const isLiveArch=(liveArchived||[]).some(w=>w.id===week.id);
    // v2: live weeks in master are read-only (reference only) until archived
    const liveLocked=isLive&&!isArch&&!isBackfill;
    const locked=isArch||isLiveArch||liveLocked;
    const updFn=isBackfill?updB:updM;
    const renameFn=isBackfill?renameEmpBackfill:renameEmp;
    const moveFn=isBackfill?moveEmpBackfill:moveEmp;
    const pendInWk=requests?.some(r=>r.status==="PENDING"&&week.dates.includes(r.dates?.[0]));
    return(
      <div key={week.id} style={{minWidth:860,background:"#fff",border:`1px solid ${isLiveArch?"#fde047":isBackfill?"#c084fc":"#e2e8f0"}`,borderRadius:10,padding:14,boxShadow:"0 1px 4px rgba(0,0,0,0.07)",flexShrink:0}}>
        <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:10,flexWrap:"wrap"}}>
          <span style={{fontWeight:800,fontSize:13,color:"#1e293b"}}>{week.label}</span>
          {isBackfill&&<span style={{fontSize:9,color:"#5b21b6",background:"#faf5ff",border:"1px solid #c084fc",borderRadius:20,padding:"2px 8px",fontWeight:700}}>⏪ Backfill</span>}
          {liveLocked&&<span style={{fontSize:9,color:"#15803d",background:"#dcfce7",border:"1px solid #86efac",borderRadius:20,padding:"2px 8px",fontWeight:700}}>🔒 LIVE — reference only</span>}
          {isLiveArch&&<span style={{fontSize:9,color:"#b45309",background:"#fef9c3",border:"1px solid #fde047",borderRadius:20,padding:"2px 8px",fontWeight:700}}>📦 Live Archived — read only</span>}
          {pendInWk&&<span style={{fontSize:9,color:"#92400e",background:"#fef3c7",border:"1px solid #f59e0b",borderRadius:20,padding:"2px 8px",fontWeight:700}}>⏳ Pending</span>}
          <div style={{marginLeft:"auto",display:"flex",gap:6,alignItems:"center",flexWrap:"wrap"}}>
            {/* Master Schedule actions */}
            {!isArch&&!isBackfill&&isLive&&!isLiveArch&&<Btn onClick={()=>unpublish(week.id)} style={{fontSize:9}}>↩ Unpublish</Btn>}
            {!isArch&&!isBackfill&&!isLiveArch&&!isLive&&<Btn onClick={()=>publishWeek(week.id)} variant="primary" style={{fontSize:9}}>✓ Publish</Btn>}
            {/* v3: Archive button always available for master weeks (regardless of live/archived status). Only hidden when this week is already in Master Archive. */}
            {!isArch&&!isBackfill&&<Btn onClick={()=>archiveMaster(week.id)} style={{fontSize:9,color:"#d97706",border:"1px solid #fde047",background:"#fef9c3"}}>📦 Archive to Master</Btn>}
            {/* Backfill action: single archive to both Past Schedules + Master Archive */}
            {isBackfill&&<Btn onClick={()=>archiveBackfill(week.id)} style={{fontSize:9,color:"#5b21b6",border:"1px solid #c084fc",background:"#faf5ff"}}>📦 Archive → Past + Master</Btn>}
            {/* Master Archive: restore */}
            {isArch&&<Btn onClick={()=>restoreFromMasterArchive(week.id)} variant="success" style={{fontSize:9}}>↩ Restore</Btn>}
          </div>
        </div>
        <div style={{display:"flex",paddingLeft:118,marginBottom:4}}>
          {DAYS.map((d,i)=>(
            <div key={d} style={{flex:1,minWidth:88,textAlign:"center"}}>
              <div style={{fontSize:11,fontWeight:700,color:"#475569"}}>{d}</div>
              <div style={{fontSize:8,color:"#94a3b8"}}>{week.dates?.[i]||""}</div>
            </div>
          ))}
          <div style={{width:44}}/>
        </div>
        {GROUPS.map(grp=>{
