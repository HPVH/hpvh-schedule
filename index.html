// All calls to the GAS backend go through gasCall().
// token = the Google ID token for the current session.
// action = what to do, payload = JSON args.
async function gasCall(token, action, payload = {}) {
  const params = new URLSearchParams({
    action,
    token,
    payload: JSON.stringify(payload),
  });
  const res = await fetch(`${GAS_URL}?${params}`);
  if (!res.ok) throw new Error(`Network error ${res.status}`);
  const data = await res.json();
  if (!data.ok) throw new Error(data.error || "Unknown GAS error");
  return data;
}

function checkCoverage(week){
  const flags=[];
  const dayOfWeek=dt=>{if(!dt)return-1;const d=parseDate(dt);return d.getDay()===0?6:d.getDay()-1;};
  week.dates.forEach((dt,di)=>{
    if(!dt||di===6)return;
    const dow=dayOfWeek(dt);const dayLabel=`${DAYS[di]} ${dt}`;
    const techShifts=(week.groups.Tech||[]).map(e=>e.shifts[di]).filter(s=>s&&!["VAC","OFF","CLOSED","SICK","CUSTOM"].includes(s.st)&&s.t);
    const ccrShifts=(week.groups.CCR||[]).map(e=>e.shifts[di]).filter(s=>s&&!["VAC","OFF","CLOSED","SICK","CUSTOM"].includes(s.st)&&s.t);
    const startHour=t=>{if(!t)return 99;const p=t.split("-")[0].trim();return p.includes(":")?+p.split(":")[0]+ +p.split(":")[1]/60:+p;};
    const endHour=t=>{if(!t)return 0;const p=t.split("-")[1]?.trim()||"";return p.includes(":")?+p.split(":")[0]+ +p.split(":")[1]/60:+p;};
    const techStarts=techShifts.map(s=>startHour(s.t));const techEnds=techShifts.map(s=>endHour(s.t));
    const ccrStarts=ccrShifts.map(s=>startHour(s.t));
    if(techShifts.length<2)flags.push({day:dayLabel,di,group:"Tech",msg:"Fewer than 2 Techs scheduled"});
    else{
      if(!techStarts.some(h=>h<=8))flags.push({day:dayLabel,di,group:"Tech",msg:"No Tech starting at or before 8:00 AM"});
      if(!techEnds.some(h=>h>=20))flags.push({day:dayLabel,di,group:"Tech",msg:"No Tech finishing at or after 8:00 PM"});
      if(!techStarts.some(h=>h<=7.5))flags.push({day:dayLabel,di,group:"Tech",msg:"No Tech starting at 7:30"});
    }
    if(ccrShifts.length<2)flags.push({day:dayLabel,di,group:"CCR",msg:"Fewer than 2 CCRs scheduled"});
    else{
      const has730=ccrStarts.filter(h=>h<=7.5).length;const has800=ccrStarts.some(h=>h>=7.51&&h<=8.01);
      const has12=ccrStarts.some(h=>h>=11.99&&h<=12.01);const hasEve=ccrStarts.some(h=>h>=12);
      if(dow===0){if(has730<2)flags.push({day:dayLabel,di,group:"CCR",msg:"Monday requires 2 × 7:30 CCR starters"});}
      else{if(has730<1)flags.push({day:dayLabel,di,group:"CCR",msg:"No CCR starting at 7:30"});}
      if(!has800)flags.push({day:dayLabel,di,group:"CCR",msg:"No CCR starting at 8:00 AM"});
      if(!has12)flags.push({day:dayLabel,di,group:"CCR",msg:"No CCR starting at 12:00 PM"});
      if(!hasEve)flags.push({day:dayLabel,di,group:"CCR",msg:"No evening CCR (12:00 PM or later start)"});
    }
  });
  return flags;
}

function PinPad({validPins,onMatch,onCancel,title,subtitle,dark=false}){
  const[input,setInput]=useState("");const[err,setErr]=useState(false);

    setInput(prev=>{

      const nv=prev+n;
      if(nv.length>=3){const m=validPins.find(p=>p===nv);if(m){const hasLonger=validPins.some(p=>p!==nv&&p.startsWith(nv));if(!hasLonger){setTimeout(()=>onMatch(nv),0);}}}
      return nv;
    });setErr(false);
  },[validPins,onMatch]);
  const backspace=()=>{setInput(i=>i.slice(0,-1));setErr(false);};
  const confirm=()=>{if(validPins.includes(input))onMatch(input);else{setErr(true);setTimeout(()=>{setErr(false);setInput("");},1200);}};
  useEffect(()=>{
    const h=e=>{
      const numByCode=e.code?.startsWith("Numpad")&&"0123456789".includes(e.code.slice(6))?e.code.slice(6):null;

      if(digit)press(digit);else if(e.key==="Backspace")backspace();else if(e.key==="Enter")confirm();
    };
    window.addEventListener("keydown",h);return()=>window.removeEventListener("keydown",h);
  },[press]);
  const bg=dark?"#1e293b":"#fff";const bd=dark?"#334155":"#e2e8f0";const btnBg=dark?"#0f172a":"#f8fafc";const btnHov=dark?"#1e3a8a":"#eff6ff";const txtC=dark?"#f8fafc":"#1e293b";

      <div style={{display:"flex",gap:8,justifyContent:"center",marginBottom:16}}>
        {[0,1,2,3].map(i=><div key={i} style={{width:48,height:56,border:`2px solid ${err?"#ef4444":input.length>i?"#3b82f6":bd}`,borderRadius:10,display:"flex",alignItems:"center",justifyContent:"center",fontSize:24,color:txtC,background:input.length>i?"#1d4ed8":dark?"#0f172a":"#f8fafc",transition:"all 0.15s"}}>{input.length>i?"●":""}</div>)}
      </div>
      {err&&<div style={{textAlign:"center",fontSize:9,color:"#ef4444",fontWeight:700,marginBottom:10}}>Incorrect PIN</div>}
      <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:8,marginBottom:8}}>

        <button onClick={backspace} style={{padding:"14px",borderRadius:10,border:`1px solid ${bd}`,background:"#7f1d1d",fontSize:16,cursor:"pointer",color:"#fca5a5"}} onMouseEnter={e=>e.currentTarget.style.background="#991b1b"} onMouseLeave={e=>e.currentTarget.style.background="#7f1d1d"}>⌫</button>
        <button onClick={()=>press("0")} style={{padding:"14px",borderRadius:10,border:`1px solid ${bd}`,background:btnBg,fontSize:18,fontWeight:600,cursor:"pointer",color:txtC}} onMouseEnter={e=>e.currentTarget.style.background=btnHov} onMouseLeave={e=>e.currentTarget.style.background=btnBg}>0</button>

/* ══ GOOGLE SIGN-IN LANDING ══════════════════════════════════════════
 * Auth flow:
 *   Step 1 — Button opens Google OAuth popup → returns id_token in hash
 *   Step 2 — gasValidateEmail confirms email is on allowlist
 *   Step 3 — PIN pad confirms role (staff / admin / viewer)
 *
 * Uses plain OAuth redirect (no GIS library) — works in GAS iframes.
 * =================================================================== */
function LandingLock({ onSignedIn }) {
  const [step, setStep]           = useState("google");
  const [token, setToken]         = useState(null);
  const [emailName, setEmailName] = useState("");
  const [validPins, setValidPins] = useState([]);
  const [error, setError]         = useState("");
  const [checking, setChecking]   = useState(false);

  // Listen for the token coming back from the OAuth popup
  useEffect(() => {
    function onMessage(event) {
      if (event.data && event.data.type === "GOOGLE_ID_TOKEN") {
        handleCredential(event.data.token);
      }
    }
    window.addEventListener("message", onMessage);
    return () => window.removeEventListener("message", onMessage);
  }, []);

  // Also check if we landed here with a token in the hash (redirect flow)
  useEffect(() => {
    const hash = window.location.hash;
    if (hash && hash.includes("id_token=")) {
      const params = new URLSearchParams(hash.slice(1));
      const idToken = params.get("id_token");
      if (idToken) handleCredential(idToken);
    }
  }, []);

  function triggerSignIn() {
    setError("");
    const nonce = Math.random().toString(36).slice(2);
    const redirectUri = window.location.href.split("#")[0].split("?")[0];
    const authUrl =
      "https://accounts.google.com/o/oauth2/v2/auth" +
      "?client_id=" + encodeURIComponent(GOOGLE_CLIENT_ID) +
      "&redirect_uri=" + encodeURIComponent(redirectUri) +
      "&response_type=id_token" +
      "&scope=" + encodeURIComponent("openid email profile") +
      "&nonce=" + nonce +
      "&prompt=select_account";

    const popup = window.open(authUrl, "hpvh_google_signin",
      "width=520,height=620,top=" + Math.round((screen.height-620)/2) +
      ",left=" + Math.round((screen.width-520)/2));

    if (!popup) {
      setError("Popup was blocked. Please allow popups for this site and try again.");
      return;
    }

    // Poll the popup for the id_token in its URL hash
    const timer = setInterval(() => {
      try {
        if (!popup || popup.closed) { clearInterval(timer); return; }
        const hash = popup.location.hash;
        if (hash && hash.includes("id_token=")) {
          clearInterval(timer);
          const params = new URLSearchParams(hash.slice(1));
          const idToken = params.get("id_token");
          popup.close();
          if (idToken) handleCredential(idToken);
        }
      } catch(e) {
        // Cross-origin while Google is loading — expected, keep polling
      }
    }, 300);
  }

  async function handleCredential(idToken) {
    setError(""); setChecking(true);
    try {
      const result = await gasValidateEmail(idToken);
      setToken(idToken);
      setEmailName(result.email || "");
      const sched = await gasGetSchedule(idToken);
      const sp = sched.data.staffPins || [];
      const settings = sched.data.settings || {};
      const pins = sp.filter(s=>s.pin&&s.pin.length>=3).map(s=>s.pin);
      if (settings.adminPin1&&String(settings.adminPin1).length>=3) pins.push(String(settings.adminPin1));
      if (settings.adminPin2&&String(settings.adminPin2).length>=3) pins.push(String(settings.adminPin2));
      setValidPins(pins);
      onSignedIn._schedData = sched.data;
      onSignedIn._token = idToken;
      setStep("pin");
    } catch(err) {
      setError(err.message || "Could not verify your account. Try again.");
    } finally { setChecking(false); }
  }

  async function handlePinMatch(pin) {
    setError(""); setChecking(true);
    try {
      const result = await gasValidatePin(token, pin);
      onSignedIn({ token, role:result.role, name:result.name, group:result.group, schedData:onSignedIn._schedData });

/* ══ LONG PRESS HOOK ════════════════════════════════════════════════ */
function useLongPress(onLongPress,onTap,ms=600){
  const timer=useRef(null);const fired=useRef(false);const ctxFired=useRef(false);
  const start=useCallback(e=>{ctxFired.current=false;fired.current=false;timer.current=setTimeout(()=>{fired.current=true;onLongPress(e);},ms);},[onLongPress,ms]);
  const cancel=useCallback(()=>clearTimeout(timer.current),[]);
  const end=useCallback(e=>{clearTimeout(timer.current);if(!fired.current&&!ctxFired.current&&onTap)onTap(e);},[onTap]);
  const markCtx=useCallback(()=>{ctxFired.current=true;clearTimeout(timer.current);},[]);
  return{onMouseDown:start,onMouseUp:end,onMouseLeave:cancel,onTouchStart:e=>{e.preventDefault();start(e.touches[0]);},onTouchEnd:e=>{e.preventDefault();end(e.changedTouches[0]);},onTouchCancel:cancel,_markCtx:markCtx};
}

/* ══ DUAL SCROLL ─────────────────────────────────────────────────── */
function DualScroll({children,showTop=false,scrollRef=null}){
  const topR=useRef(null);const botR=useRef(null);const sync=useRef(false);const[tw,setTw]=useState(3000);
  useEffect(()=>{const ob=new ResizeObserver(()=>{if(botR.current)setTw(botR.current.scrollWidth);});if(botR.current)ob.observe(botR.current);return()=>ob.disconnect();},[]);
  useEffect(()=>{if(scrollRef)scrollRef.current=botR.current;},[scrollRef]);
  const onTop=()=>{if(sync.current)return;sync.current=true;if(botR.current)botR.current.scrollLeft=topR.current.scrollLeft;sync.current=false;};
  const onBot=()=>{if(sync.current)return;sync.current=true;if(topR.current)topR.current.scrollLeft=botR.current.scrollLeft;sync.current=false;};
  return <div>{showTop&&<div ref={topR} onScroll={onTop} style={{overflowX:"auto",overflowY:"hidden",height:8,marginBottom:2}}><div style={{width:tw,height:1}}/></div>}<div ref={botR} onScroll={onBot} style={{overflowX:"auto"}}>{children}</div></div>;
}

            </tr>,

                  <div style={{display:"flex",alignItems:"center",gap:5}}><div style={{width:6,height:6,borderRadius:"50%",background:gc.acc,flexShrink:0}}/><span style={{fontWeight:600,fontSize:11,color:"#1e293b"}}>{name}</span></div>

                  const isRequesterRow=hasSwapAuth&&swapRequesterInfo.name===name&&swapRequesterInfo.group===grp;

                    const sDisplay=pendingSwap?{...s,swapPending:true}:s;
                    return <ShiftCell key={`${week.id}-${si}`} s={sDisplay} group={grp} isAdmin={isAdmin} canSwap={canSwap} C={C} customDayLabels={customDayLabels}
                      tdStyle={si===0&&wi>0?{borderLeft:"2px solid #e2e8f0"}:{}}
                      onTap={rect=>onTap&&onTap(week.id,grp,ei,si,si,rect)}
                      onLong={(x,y)=>onLong&&onLong(week.id,grp,ei,si,x,y)}
                      onCtxMenu={(x,y)=>onCtxMenu&&onCtxMenu(week.id,grp,ei,si,x,y)}
                      onHrs={h=>onHrs&&onHrs(week.id,grp,ei,si,h)}
                      onSickHrs={sh=>onSickHrs&&onSickHrs(week.id,grp,ei,si,sh)}
                      onApprove={()=>onApprove&&onApprove(week.id,grp,ei,si)}
                      onDeny={()=>onDeny&&onDeny(week.id,grp,ei,si)}
                      onApproveSwap={pendingSwap&&isAdmin?()=>onApproveSwap&&onApproveSwap(pendingSwap.id):null}
                      onDenySwap={pendingSwap&&isAdmin?()=>onDenySwap&&onDenySwap(pendingSwap.id):null}
                      onSwapRequest={canSwap?()=>onSwapRequest&&onSwapRequest(week.id,grp,ei,si,s,week.dates[si]):null}/>;
                  }):Array(7).fill(0).map((_,si)=><td key={`${week.id}-e${si}`} style={{padding:"3px 2px",...(si===0&&wi>0?{borderLeft:"2px solid #e2e8f0"}:{})}}><div style={{background:EC.bg,border:`1px solid ${EC.bo}`,borderRadius:6,minHeight:52}}/></td>);
                  return[...cells,<td key={`${week.id}-tot`} style={{padding:"3px 5px",verticalAlign:"middle",borderLeft:"1px solid #e2e8f0"}}>{emp&&<div style={{background:"#f8fafc",border:"1px solid #e2e8f0",borderRadius:5,padding:"4px",fontSize:12,fontWeight:700,color:tC,textAlign:"center",minWidth:36}}>{tot}</div>}</td>];
                })}
              </tr>
            ))
          ];
        })}</tbody>
      </table>
    </DualScroll>
  );
}

/* ══ TIME OFF CALENDAR ───────────────────────────────────────────── */
function TOCalendar({calDates,lockedTOWeeks,liveDates,requests,setRequests,masterWeeks,setMasterWeeks,allEmps,isUnlocked,staffUnlocked,staffPins,onRequestStaffPin,onRequestWeekUnlock,C,availability,setAvailability}){
  const[drag,setDrag]=useState(null);const[dragEnd,setDragEnd]=useState(null);
  const[picker,setPicker]=useState(null);const[customTime,setCustomTime]=useState("");
  const getDR=(s,e)=>{const si=calDates.indexOf(s);const ei=calDates.indexOf(e);if(si===-1||ei===-1)return[s];const[lo,hi]=si<=ei?[si,ei]:[ei,si];return calDates.slice(lo,hi+1);};
  const dragDates=drag&&dragEnd?getDR(drag.start,dragEnd):[];
  const isDateLocked=(dt,isAdm)=>{
    if(isAdm)return false;if(liveDates.has(dt))return true;
    const idx=calDates.indexOf(dt);if(idx===-1)return false;
    const ws=calDates[Math.floor(idx/7)*7];const we=calDates[Math.floor(idx/7)*7+6];
    return lockedTOWeeks.has(`${ws}|${we}`);
  };
  function submitReq(empName,group,type,dates,customT=""){
    const id=uid();const on=todayStr();
    const newReq={id,empName,group,type,dates,customTime:customT,status:"PENDING",requestedOn:on};
    setRequests(prev=>[...prev,newReq]);
    setMasterWeeks(prev=>{
      const upd=[...prev];
      dates.forEach(ds=>{
        const wi=upd.findIndex(w=>w.dates.includes(ds));if(wi===-1)return;
        const w={...upd[wi]};const g=[...(w.groups[group]||[])];const ei=g.findIndex(e=>e.name===empName);if(ei===-1)return;
        const emp={...g[ei]};const shifts=[...emp.shifts];const di=w.dates.indexOf(ds);if(di===-1)return;
        const patch=type==="VACATION"?{t:"",h:0,st:"VAC",tg:[],sh:null,rc:null,reqId:id,reqSt:"PENDING"}:{t:REQ_TYPES[type]?.t||customT||"",h:toH(REQ_TYPES[type]?.t||customT||""),st:null,tg:[],sh:null,rc:null,reqId:id,reqSt:"PENDING"};
        shifts[di]={...shifts[di],...patch};emp.shifts=shifts;g[ei]=emp;w.groups={...w.groups,[group]:g};upd[wi]=w;
      });return upd;
    });
    setPicker(null);setDrag(null);setDragEnd(null);setCustomTime("");
  }
  const approveReq=reqId=>{setRequests(prev=>prev.map(r=>r.id===reqId?{...r,status:"APPROVED"}:r));setMasterWeeks(prev=>prev.map(w=>({...w,groups:Object.fromEntries(Object.entries(w.groups).map(([g,emps])=>[g,emps.map(emp=>({...emp,shifts:emp.shifts.map(s=>s?.reqId===reqId?{...s,reqSt:"APPROVED"}:s)}))]))})));};
  const denyReq=reqId=>{setRequests(prev=>prev.map(r=>r.id===reqId?{...r,status:"DENIED"}:r));setMasterWeeks(prev=>prev.map(w=>({...w,groups:Object.fromEntries(Object.entries(w.groups).map(([g,emps])=>[g,emps.map(emp=>({...emp,shifts:emp.shifts.map(s=>s?.reqId===reqId?{...s,t:"",h:0,st:null,reqSt:"DENIED",reqId:null}:s)}))]))})));};
  const reqBg=(req,grp)=>{if(req.type==="VACATION")return req.status==="PENDING"?PEND_CLR.bg:"#fef3c7";const gc=C[grp]||DEF[grp];return gc.cbg;};
  const reqBo=(req,grp)=>{if(req.type==="VACATION")return req.status==="PENDING"?PEND_CLR.bo:"#f59e0b";const gc=C[grp]||DEF[grp];return req.status==="PENDING"?gc.cbo:gc.acc;};
  const reqTx=(req,grp)=>{if(req.type==="VACATION")return req.status==="PENDING"?PEND_CLR.tx:"#78350f";const gc=C[grp]||DEF[grp];return gc.ctx;};
  const weekBlocks=[];
  for(let i=0;i<calDates.length;i+=7){const block=calDates.slice(i,i+7);const key=`${block[0]}|${block[block.length-1]}`;const isLive=block.some(d=>liveDates.has(d));const isAdminLocked=lockedTOWeeks.has(key);weekBlocks.push({block,key,isLive,isAdminLocked});}
  const today2=todayStr();
  const todayRef=useRef(null);
  const scrollContainerRef=useRef(null);
  // Global mouseup to complete drag if released outside a cell
  useEffect(()=>{
    const up=()=>{
      if(drag){
        if(dragDates.length>0){setPicker({empName:drag.empName,group:drag.group,dates:dragDates});}
        setDrag(null);setDragEnd(null);
      }
    };
    window.addEventListener("mouseup",up);
    return()=>window.removeEventListener("mouseup",up);
  },[drag,dragDates]);
  useEffect(()=>{
    const sc=scrollContainerRef.current;
    const el=todayRef.current;
    if(sc&&el){
      setTimeout(()=>{
        const left=el.offsetLeft-(sc.clientWidth/2)+(el.offsetWidth/2);
        sc.scrollLeft=Math.max(0,left);
      },50);
    }
  },[calDates]);
  return(
    <div>
      <DualScroll showTop={true} scrollRef={scrollContainerRef}>
      <table style={{borderCollapse:"separate",borderSpacing:0,minWidth:"max-content",background:"#fff",borderRadius:8,overflow:"hidden",boxShadow:"0 1px 3px rgba(0,0,0,0.06)"}}>
        <thead>
          <tr style={{background:"#f8fafc"}}>
            <th style={{position:"sticky",left:0,zIndex:11,background:"#f8fafc",minWidth:110,padding:"5px 8px",borderBottom:"1px solid #e2e8f0",borderRight:"2px solid #e2e8f0",fontSize:9,color:"#64748b",fontWeight:700,textAlign:"left"}}>STAFF</th>
            {weekBlocks.map(({block,key,isLive,isAdminLocked},wbi)=>(
              <th key={key} colSpan={7} style={{background:"#f8fafc",borderBottom:"1px solid #e2e8f0",borderLeft:wbi>0?"2px solid #e2e8f0":"none",padding:"4px 8px",textAlign:"left",whiteSpace:"nowrap"}}>
                <div style={{display:"flex",alignItems:"center",gap:6}}>
                  <span style={{fontSize:8,color:"#64748b",fontWeight:700}}>{block[0]} – {block[6]}</span>
                  {isLive&&<span style={{fontSize:7,background:"#dcfce7",border:"1px solid #86efac",color:"#15803d",borderRadius:10,padding:"1px 5px",fontWeight:700}}>🔒 LIVE</span>}
                  {!isLive&&(isAdminLocked
                    ?<span style={{fontSize:7,background:"#fef3c7",border:"1px solid #f59e0b",color:"#92400e",borderRadius:10,padding:"1px 5px",fontWeight:700}}>🔐 LOCKED</span>
                    :<span style={{fontSize:7,background:"#f1f5f9",border:"1px solid #e2e8f0",color:"#64748b",borderRadius:10,padding:"1px 5px",fontWeight:600}}>🔓 Open</span>
                  )}
                  {isUnlocked&&!isLive&&<button onClick={()=>onRequestWeekUnlock(key,isAdminLocked)} style={{fontSize:7,padding:"1px 6px",borderRadius:4,border:"1px solid #e2e8f0",background:"none",color:"#94a3b8",cursor:"pointer"}}>{isAdminLocked?"🔓 Unlock":"🔐 Lock"}</button>}
                </div>
              </th>
            ))}
          </tr>
          <tr style={{background:"#f8fafc"}}>
            <th style={{position:"sticky",left:0,zIndex:11,background:"#f8fafc",padding:"3px 8px",borderBottom:"2px solid #e2e8f0",borderRight:"2px solid #e2e8f0"}}/>
            {weekBlocks.map(({block,key},wbi)=>block.map((date,di)=>(
              <th key={`${key}-${di}`} ref={date===today2?todayRef:null} style={{padding:"3px 2px",textAlign:"center",fontSize:9,fontWeight:700,color:"#475569",borderBottom:"2px solid #e2e8f0",borderLeft:di===0&&wbi>0?"2px solid #e2e8f0":"none",minWidth:TO_COL_W,background:date===today2?"#eff6ff":"#f8fafc"}}>
                <div>{DAYS[di]}</div>
                <div style={{fontSize:7,color:date===today2?"#3b82f6":"#94a3b8",fontWeight:400}}>{date}</div>
              </th>
            )))}
          </tr>
        </thead>
        <tbody>
          {allEmps.map((emp,ei)=>{
            const isPinUnlocked=staffUnlocked.has(`${emp.name}||${emp.group}`);
            const canEdit=isUnlocked||isPinUnlocked;
            const gc=C[emp.group]||DEF[emp.group]||DEF.Tech;
            return(
              <tr key={`${emp.name}||${emp.group}`} style={{background:ei%2===0?"#fff":gc.gbg+"33"}}>
                <td style={{padding:"3px 8px",verticalAlign:"middle",position:"sticky",left:0,background:ei%2===0?"#fff":gc.gbg+"66",zIndex:3,borderRight:"2px solid #e2e8f0",whiteSpace:"nowrap",borderBottom:"1px solid #f1f5f9"}}>
                  <div style={{display:"flex",alignItems:"center",gap:4}}>
                    <div style={{width:5,height:5,borderRadius:"50%",background:gc.acc,flexShrink:0}}/>
                    <span style={{fontWeight:600,fontSize:10,color:"#1e293b"}}>{emp.name}</span>
                    {!isUnlocked&&<button onClick={()=>onRequestStaffPin(emp.name,emp.group)} style={{marginLeft:2,padding:"1px 4px",borderRadius:3,border:`1px solid ${isPinUnlocked?gc.acc:"#e2e8f0"}`,background:isPinUnlocked?gc.cbg:"none",color:isPinUnlocked?gc.acc:"#94a3b8",fontSize:7,cursor:"pointer"}}>{isPinUnlocked?"🔓":"🔒"}</button>}
                  </div>
                </td>
                {weekBlocks.map(({block,key},wbi)=>{
                  const cells=[];let di=0;
                  const renderedReqIds=new Set();
                  while(di<block.length){
                    const date=block[di];
                    const locked=isDateLocked(date,isUnlocked);
                    // Find a request that includes this date and hasn't been rendered yet in this block
                    // Either it starts on this date, or it started in a previous week (dates[0] not in this block)
                    const req=requests.find(r=>
                      !renderedReqIds.has(r.id)&&
                      r.empName===emp.name&&r.group===emp.group&&
                      r.dates.includes(date)&&
                      (r.dates[0]===date||!block.includes(r.dates[0]))
                    );
                    const isDrag=drag&&drag.empName===emp.name&&drag.group===emp.group&&dragDates.includes(date);
                    const isSuperAvail=availability.has(`${emp.name}||${emp.group}||${date}`);
                    const isToday=date===today2;
                    const lb=di===0&&wbi>0?"2px solid #e2e8f0":"none";
                    if(req){
                      renderedReqIds.add(req.id);
                      // Count how many of this request's dates are in this block at or after current position
                      const datesInBlockFromHere=req.dates.filter(d=>{
                        const idx=block.indexOf(d);
                        return idx>=di;
                      });
                      const spanCols=Math.max(1,Math.min(datesInBlockFromHere.length,block.length-di));
                      const isContinuation=req.dates[0]!==date;
                      cells.push(<td key={`${key}-${di}`} colSpan={spanCols} style={{padding:"2px 1px",verticalAlign:"top",width:TO_COL_W*spanCols,borderLeft:lb,borderBottom:"1px solid #f1f5f9",height:"1px"}}
                        onMouseDown={e=>{if(locked||!canEdit)return;setDrag({empName:emp.name,group:emp.group,start:date});setDragEnd(date);}}
                        onMouseEnter={()=>{if(drag&&drag.empName===emp.name&&drag.group===emp.group)setDragEnd(date);}}
                        onMouseUp={()=>{if(drag&&drag.empName===emp.name&&drag.group===emp.group){const d2=dragDates.length?dragDates:[date];setPicker({empName:emp.name,group:emp.group,dates:d2});setDrag(null);setDragEnd(null);}}}>
                        <div style={{background:reqBg(req,emp.group),border:`${req.status==="PENDING"?"2px dashed":"1px solid"} ${reqBo(req,emp.group)}`,borderRadius:isContinuation?"0 4px 4px 0":"4px",padding:"2px 4px",minHeight:req.status==="PENDING"?44:38,height:"100%",userSelect:"none",overflow:"hidden",borderLeft:isContinuation?"none":undefined,boxSizing:"border-box"}}>
                          {!isContinuation&&req.status==="PENDING"&&<div style={{fontSize:6,fontWeight:700,color:reqTx(req,emp.group)}}>⏳</div>}
                          {!isContinuation&&req.status==="APPROVED"&&<div style={{fontSize:6,fontWeight:700,color:reqTx(req,emp.group)}}>✓ approved</div>}
                          {!isContinuation&&<div style={{fontSize:8,fontWeight:700,color:reqTx(req,emp.group)}}>{REQ_TYPES[req.type]?.s||req.type}</div>}
                          {!isContinuation&&req.dates.length>1&&<div style={{fontSize:6,color:reqTx(req,emp.group),opacity:0.7}}>{req.dates.length}d</div>}
                          {isContinuation&&<div style={{fontSize:6,color:reqTx(req,emp.group),opacity:0.6}}>↩ {REQ_TYPES[req.type]?.s||req.type}</div>}
                          {!isContinuation&&req.status==="PENDING"&&isUnlocked&&<div style={{display:"flex",gap:2,marginTop:1}} onMouseDown={e=>e.stopPropagation()} onClick={e=>e.stopPropagation()}><Btn onClick={()=>approveReq(req.id)} variant="success" style={{flex:1,padding:"1px",fontSize:6}}>✓</Btn><Btn onClick={()=>denyReq(req.id)} variant="danger" style={{flex:1,padding:"1px",fontSize:6}}>✕</Btn></div>}
                        </div>
                      </td>);
                      di+=spanCols;
                    }else{
                      cells.push(<td key={`${key}-${di}`} style={{padding:"2px 1px",verticalAlign:"top",opacity:locked?0.45:1,borderLeft:lb,borderBottom:"1px solid #f1f5f9",background:isToday?"#f0f9ff":"none"}}
                        onMouseDown={e=>{if(locked||!canEdit)return;setDrag({empName:emp.name,group:emp.group,start:date});setDragEnd(date);}}
                        onMouseEnter={()=>{if(drag&&drag.empName===emp.name&&drag.group===emp.group)setDragEnd(date);}}
                        onMouseUp={()=>{if(drag&&drag.empName===emp.name&&drag.group===emp.group){const d2=dragDates.length?dragDates:[date];setPicker({empName:emp.name,group:emp.group,dates:d2});setDrag(null);setDragEnd(null);}}}> 
                        <div style={{background:isSuperAvail?"#ecfdf5":isDrag?"#fed7aa":locked?"#f1f5f9":canEdit?gc.cbg+"44":gc.cbg+"22",border:`1px solid ${isSuperAvail?"#6ee7b7":isDrag?"#fb923c":locked?"#e2e8f0":gc.cbo+"55"}`,borderRadius:4,minHeight:38,cursor:locked?"not-allowed":canEdit?"crosshair":"default",display:"flex",alignItems:"center",justifyContent:"center"}}>
                          {isSuperAvail&&<span style={{fontSize:10}}>⭐</span>}
                        </div>
                      </td>);
                      di++;
                    }
                  }
                  return cells;
                })}
              </tr>
            );
          })}
        </tbody>
      </table>
      </DualScroll>
      {picker&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.3)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:9000}}>

              <Btn onClick={()=>{if(customTime.trim())submitReq(picker.empName,picker.group,"CUSTOM",picker.dates,customTime.trim());}} variant="primary" disabled={!customTime.trim()} style={{fontSize:9}}>Add</Btn>
            </div>
            <div style={{borderTop:"1px solid #f1f5f9",paddingTop:8,marginTop:4}}>
              <div style={{fontSize:8,color:"#94a3b8",marginBottom:6,fontWeight:600}}>SUPER AVAILABLE</div>
              {picker.dates.map(d=>{const k=`${picker.empName}||${picker.group}||${d}`;const isAvail=availability.has(k);return <button key={d} onClick={()=>setAvailability(prev=>{const n=new Set(prev);isAvail?n.delete(k):n.add(k);return n;})} style={{display:"block",width:"100%",padding:"5px 10px",marginBottom:3,borderRadius:5,border:`1px solid ${isAvail?"#6ee7b7":"#e2e8f0"}`,background:isAvail?"#ecfdf5":"none",color:isAvail?"#15803d":"#64748b",fontSize:9,cursor:"pointer",textAlign:"left"}}>⭐ {d} {isAvail?"(remove)":"mark available"}</button>;})}
            </div>
            <Btn onClick={()=>setPicker(null)} style={{width:"100%",marginTop:8,fontSize:9}}>Cancel</Btn>
          </div>
        </div>
      )}
    </div>
  );
}

/* ══ TIME OFF PAGE ───────────────────────────────────────────────── */
function TimeOffPage({requests,setRequests,masterWeeks,setMasterWeeks,liveWeeks,lockedTOWeeks,setLockedTOWeeks,isUnlocked,staffUnlocked,staffPins,onRequestStaffPin,pwd,pwd2,C,availability,setAvailability}){
  const nowMonth=useMemo(()=>new Date(),[]);
  const[calStart,setCalStart]=useState(()=>new Date(nowMonth.getFullYear(),nowMonth.getMonth(),1));
  const[adminConfirm,setAdminConfirm]=useState(null);
  const calDates=useMemo(()=>getCalDates(calStart),[calStart]);
  const allEmps=useMemo(()=>getOrder([...liveWeeks,...masterWeeks]),[liveWeeks,masterWeeks]);
  const liveDates=useMemo(()=>getLiveDates(liveWeeks),[liveWeeks]);
  const prevM=()=>setCalStart(d=>{const n=new Date(d.getFullYear(),d.getMonth()-1,1);return n<MIN_CAL?d:n;});
  const nextM=()=>setCalStart(d=>new Date(d.getFullYear(),d.getMonth()+1,1));
  const onRequestWeekUnlock=(key,currentlyLocked)=>setAdminConfirm({key,lock:!currentlyLocked,prompt:currentlyLocked?"Unlock this week for editing?":"Lock this week from editing?"});
  const handleWeekLockConfirm=()=>{if(!adminConfirm)return;setLockedTOWeeks(prev=>{const n=new Set(prev);adminConfirm.lock?n.add(adminConfirm.key):n.delete(adminConfirm.key);return n;});};
  return(
    <div>
      {adminConfirm&&<AdminConfirmModal prompt={adminConfirm.prompt} pwd={pwd} pwd2={pwd2} onConfirm={handleWeekLockConfirm} onClose={()=>setAdminConfirm(null)}/>}
      <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:12,padding:"10px 14px",background:"#fff",border:"1px solid #e2e8f0",borderRadius:9,boxShadow:"0 1px 3px rgba(0,0,0,0.06)",flexWrap:"wrap"}}>
        <div style={{fontWeight:800,fontSize:13,color:"#1e293b"}}>TIME OFF REQUESTS</div>
        <div style={{fontSize:9,color:"#94a3b8"}}>{requests.filter(r=>r.status==="PENDING").length} pending</div>
        <div style={{marginLeft:"auto",display:"flex",alignItems:"center",gap:8}}>
          <Btn onClick={prevM}>‹</Btn>
          <span style={{fontWeight:700,fontSize:12,color:"#1e293b",minWidth:150,textAlign:"center"}}>{calStart.toLocaleString("default",{month:"long",year:"numeric"})}</span>
          <Btn onClick={nextM}>›</Btn>
        </div>
      </div>
      <TOCalendar calDates={calDates} lockedTOWeeks={lockedTOWeeks} liveDates={liveDates} requests={requests} setRequests={setRequests} masterWeeks={masterWeeks} setMasterWeeks={setMasterWeeks} allEmps={allEmps} isUnlocked={isUnlocked} staffUnlocked={staffUnlocked} staffPins={staffPins} onRequestStaffPin={onRequestStaffPin} onRequestWeekUnlock={onRequestWeekUnlock} C={C} availability={availability} setAvailability={setAvailability}/>
    </div>
  );
}

/* ══ MASTER PAGE ─────────────────────────────────────────────────── */
function MasterPage({masterWeeks,setMasterWeeks,liveWeeks,setLiveWeeks,masterArchived,setMasterArchived,liveArchived,isUnlocked,C,onSC,onRC,requests,setRequests,addAudit,pwd,pwd2,pushUndo,customDayLabels}){
  const[masterTab,setMasterTab]=useState("active");
  const[coverageModal,setCoverageModal]=useState(null);
  const[newEmpModal,setNewEmpModal]=useState(null);
  const[newEmpName,setNewEmpName]=useState("");
  const[deleteConfirm,setDeleteConfirm]=useState(null);

  const addWeek=()=>{
    const pool=[...masterWeeks,...masterArchived];
    const last=sortWeeks(pool).slice(-1)[0];
    const dates=last?nextDates(last.dates):Array(7).fill("").map((_,i)=>{const d=new Date();d.setDate(d.getDate()+i);return`${d.getDate()}-${MON[d.getMonth()]}`;});
    const ng={};const refWeek=masterWeeks.slice(-1)[0]||masterArchived.slice(-1)[0];
    GROUPS.forEach(g=>{ng[g]=(refWeek?.groups[g]||[]).map(e=>({...e,id:uid(),shifts:dates.map((_,i)=>i===6?mkCl():mk(""))}));});
    const next=sortWeeks([...masterWeeks,{id:uid(),label:wkLabel(dates),dates,published:false,groups:ng}]);
    setMasterWeeks(next);
    saveToGas({masterWeeks:next});
  };

  const updM=(wid,g,ei,si,patch)=>{const next=masterWeeks.map(w=>{if(w.id!==wid)return w;return{...w,groups:{...w.groups,[g]:w.groups[g].map((emp,i)=>i!==ei?emp:{...emp,shifts:emp.shifts.map((s,j)=>j!==si?s:{...s,...patch})})}}};});setMasterWeeks(next);saveToGas({masterWeeks:next});};
  const appReqM=(wid,g,ei,si)=>{const s=masterWeeks.find(w=>w.id===wid)?.groups[g]?.[ei]?.shifts[si];updM(wid,g,ei,si,{reqSt:"APPROVED"});if(s?.reqId)setRequests(prev=>prev.map(r=>r.id===s.reqId?{...r,status:"APPROVED"}:r));};
  const denyReqM=(wid,g,ei,si)=>{const s=masterWeeks.find(w=>w.id===wid)?.groups[g]?.[ei]?.shifts[si];updM(wid,g,ei,si,{t:"",h:0,st:null,reqSt:"DENIED",reqId:null});if(s?.reqId)setRequests(prev=>prev.map(r=>r.id===s.reqId?{...r,status:"DENIED"}:r));};
  const moveEmp=(wid,g,ei,dir)=>{const next=masterWeeks.map(w=>{if(w.id!==wid)return w;const arr=[...(w.groups[g]||[])];const ti=ei+dir;if(ti<0||ti>=arr.length)return w;[arr[ei],arr[ti]]=[arr[ti],arr[ei]];return{...w,groups:{...w.groups,[g]:arr}};});setMasterWeeks(next);saveToGas({masterWeeks:next});};
  const renameEmp=(wid,g,ei,name)=>{const next=masterWeeks.map(w=>w.id!==wid?w:{...w,groups:{...w.groups,[g]:w.groups[g].map((e,i)=>i!==ei?e:{...e,name})}});setMasterWeeks(next);saveToGas({masterWeeks:next});};

  const confirmAddEmp=()=>{
    if(!newEmpName.trim()||!newEmpModal)return;
    const name=newEmpName.trim();const{weekId,grp}=newEmpModal;
    const sorted2=sortWeeks(masterWeeks);const fi=sorted2.findIndex(w=>w.id===weekId);
    const next=masterWeeks.map(w=>{
      const wi=sorted2.findIndex(x=>x.id===w.id);if(wi<fi)return w;
      const alreadyHas=(w.groups[grp]||[]).some(e=>e.name===name);if(alreadyHas)return w;
      return{...w,groups:{...w.groups,[grp]:[...(w.groups[grp]||[]),{id:uid(),name,shifts:w.dates.map((_,i)=>i===6?mkCl():mk(""))}]}};
    });
    setMasterWeeks(next);
    saveToGas({masterWeeks:next});
    pushUndo&&pushUndo({type:"addEmp",name,grp,weekId});
    addAudit("Admin",`Added ${name} to ${grp} from week ${weekId}`);
    setNewEmpModal(null);setNewEmpName("");
  };

  const confirmDelEmp=()=>{
    if(!deleteConfirm)return;
    const{weekId,group:grp,name}=deleteConfirm;
    const snapshot=deepClone(masterWeeks);
    pushUndo&&pushUndo({type:"delEmp",snapshot});
    const sorted2=sortWeeks(masterWeeks);const fi=sorted2.findIndex(w=>w.id===weekId);
    const next=masterWeeks.map(w=>{
      const wi=sorted2.findIndex(x=>x.id===w.id);if(wi<fi)return w;
      return{...w,groups:{...w.groups,[grp]:(w.groups[grp]||[]).filter(e=>e.name!==name)}};
    });
    setMasterWeeks(next);
    saveToGas({masterWeeks:next});
    addAudit("Admin",`Deleted ${name} from ${grp} from week ${weekId} onward`);
    setDeleteConfirm(null);
  };

  const doPublish=wid=>{
    const nextMaster=masterWeeks.map(w=>w.id===wid?{...w,published:true}:w);
    const wk=nextMaster.find(w=>w.id===wid);
    const nextLive=wk?(liveWeeks.some(w=>w.id===wid)?liveWeeks.map(w=>w.id===wid?{...deepClone(wk),approved:true}:w):sortWeeks([...liveWeeks,{...deepClone(wk),approved:true}])):liveWeeks;
    setMasterWeeks(nextMaster);
    setLiveWeeks(nextLive);
    saveToGas({masterWeeks:nextMaster,liveWeeks:nextLive});
    addAudit("Admin",`Published week ${wid}`);
  };
  const publishWeek=wid=>{const wk=masterWeeks.find(w=>w.id===wid);if(!wk)return;const flags=checkCoverage(wk);if(flags.length>0){setCoverageModal({weekId:wid,flags});return;}doPublish(wid);};
  const unpublishWeek=wid=>{const nextMaster=masterWeeks.map(w=>w.id===wid?{...w,published:false}:w);const nextLive=liveWeeks.filter(w=>w.id!==wid);setMasterWeeks(nextMaster);setLiveWeeks(nextLive);saveToGas({masterWeeks:nextMaster,liveWeeks:nextLive});};
  const archiveMasterWeek=wid=>{setMasterWeeks(prev=>{const w=prev.find(x=>x.id===wid);if(w)setMasterArchived(a=>{if(a.some(x=>x.id===wid))return a;return sortWeeks([...a,deepClone(w)]);});return prev.filter(x=>x.id!==wid);});};
  const restoreMasterArchived=wid=>{setMasterArchived(prev=>{const w=prev.find(x=>x.id===wid);if(w)setMasterWeeks(m=>{if(m.some(x=>x.id===wid))return m;return sortWeeks([...m,deepClone(w)]);});return prev.filter(x=>x.id!==wid);});};
  const pickerPos=rect=>{const ph=300;const y=(window.innerHeight-rect.bottom)>ph?rect.bottom+4:Math.max(60,rect.top-ph-4);return{x:Math.min(rect.left,window.innerWidth-258),y};};

  const renderWeekCard=(week,isArchived)=>{
    const isLive=liveWeeks.some(w=>w.id===week.id);
    const isLiveArchived=(liveArchived||[]).some(w=>w.id===week.id);
    const isLocked=isArchived||isLiveArchived;
    const pendingInWeek=requests.some(r=>r.status==="PENDING"&&week.dates.includes(r.dates&&r.dates[0]));
    return(
      <div key={week.id} style={{minWidth:860,background:"#fff",border:`1px solid ${isLiveArchived?"#fde047":"#e2e8f0"}`,borderRadius:10,padding:14,boxShadow:"0 1px 4px rgba(0,0,0,0.07)",flexShrink:0}}>
        <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:10,flexWrap:"wrap"}}>
          <span style={{fontWeight:800,fontSize:13,color:"#1e293b"}}>{week.label}</span>
          <span style={{fontSize:8,color:"#94a3b8"}}>{week.dates.filter(Boolean).join(" · ")}</span>
          {pendingInWeek&&<span style={{fontSize:9,color:"#92400e",background:"#fef3c7",border:"1px solid #f59e0b",borderRadius:20,padding:"2px 8px",fontWeight:700}}>⏳ Pending</span>}
          {isArchived&&!isLiveArchived&&<span style={{fontSize:9,color:"#64748b",background:"#f1f5f9",border:"1px solid #e2e8f0",borderRadius:20,padding:"2px 8px",fontWeight:600}}>📦 Archived</span>}
          {isLiveArchived&&<span style={{fontSize:9,color:"#b45309",background:"#fef9c3",border:"1px solid #fde047",borderRadius:20,padding:"2px 8px",fontWeight:700}}>📦 Live Archived — read only</span>}
          <div style={{marginLeft:"auto",display:"flex",gap:6,alignItems:"center",flexWrap:"wrap"}}>
            {!isArchived&&isLive&&!isLiveArchived&&<span style={{fontSize:9,color:"#15803d",background:"#dcfce7",border:"1px solid #86efac",borderRadius:20,padding:"3px 8px",fontWeight:600}}>✓ LIVE</span>}
            {!isArchived&&isUnlocked&&!isLive&&!isLiveArchived&&<Btn onClick={()=>publishWeek(week.id)} variant="primary" style={{fontSize:9}}>✓ Publish to Live</Btn>}
            {!isArchived&&isUnlocked&&isLive&&!isLiveArchived&&<Btn onClick={()=>unpublishWeek(week.id)} style={{fontSize:9}}>↩ Unpublish</Btn>}
            {!isArchived&&isUnlocked&&!isLiveArchived&&<Btn onClick={()=>archiveMasterWeek(week.id)} style={{fontSize:9,color:"#d97706",border:"1px solid #fde047",background:"#fef9c3"}}>📦 Archive</Btn>}
            {isArchived&&isUnlocked&&<Btn onClick={()=>restoreMasterArchived(week.id)} variant="success" style={{fontSize:9}}>↩ Restore</Btn>}
          </div>
        </div>
        <div style={{display:"flex",paddingLeft:118,marginBottom:4}}>{DAYS.map((d,i)=><div key={d} style={{flex:1,minWidth:88,textAlign:"center"}}><div style={{fontSize:11,fontWeight:700,color:"#475569"}}>{d}</div><div style={{fontSize:8,color:"#94a3b8"}}>{(week.dates&&week.dates[i])||""}</div></div>)}<div style={{width:44}}/></div>
        {GROUPS.map(grp=>{const gc=C[grp]||DEF[grp];return(
          <div key={grp} style={{marginBottom:12}}>
            <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:4,padding:"4px 8px",borderRadius:6,background:gc.gbg,borderLeft:`2px solid ${gc.acc}`}}>
              <span style={{fontWeight:800,fontSize:10,color:gc.htx,letterSpacing:"0.15em"}}>{grp}</span>
              {!isLocked&&isUnlocked&&<Btn onClick={()=>{setNewEmpModal({weekId:week.id,grp});setNewEmpName("");}} style={{marginLeft:"auto",fontSize:8,color:gc.acc,background:"none",border:`1px solid ${gc.acc}88`}}>+ ADD</Btn>}
            </div>
            <table style={{width:"100%",borderCollapse:"separate",borderSpacing:0,minWidth:760}}>
              <colgroup><col style={{width:118}}/>{DAYS.map((_,i)=><col key={i} style={{minWidth:88}}/>)}<col style={{width:44}}/></colgroup>
              <tbody>{(week.groups[grp]||[]).map((emp,ei)=>(
                <tr key={emp.id} style={{background:ei%2===0?"#fff":gc.gbg+"66"}}>
                  <td style={{padding:"3px 5px",verticalAlign:"middle"}}>
                    <div style={{display:"flex",alignItems:"center",gap:3}}>
                      {!isLocked&&isUnlocked&&<div style={{display:"flex",flexDirection:"column",gap:1,flexShrink:0}}><Btn onClick={()=>moveEmp(week.id,grp,ei,-1)} style={{padding:"1px 3px",fontSize:7,color:"#94a3b8"}}>▲</Btn><Btn onClick={()=>moveEmp(week.id,grp,ei,1)} style={{padding:"1px 3px",fontSize:7,color:"#94a3b8"}}>▼</Btn></div>}
                      <div style={{width:4,height:4,borderRadius:"50%",background:gc.acc,flexShrink:0}}/>
                      <input value={emp.name} onChange={e=>!isLocked&&renameEmp(week.id,grp,ei,e.target.value)} disabled={isLocked||!isUnlocked} style={{background:"none",border:"none",borderBottom:(!isLocked&&isUnlocked)?"1px solid #e2e8f0":"none",color:"#1e293b",fontWeight:600,fontSize:11,outline:"none",width:"100%",padding:"1px 2px"}}/>
                      {!isLocked&&isUnlocked&&<Btn onClick={()=>setDeleteConfirm({weekId:week.id,group:grp,empIdx:ei,name:emp.name})} variant="danger" style={{padding:"2px 4px",fontSize:8,flexShrink:0}}>✕</Btn>}
                    </div>
                  </td>
                  {emp.shifts.map((s,si)=><ShiftCell key={si} s={s} group={grp} isAdmin={!isLocked&&isUnlocked} C={C} customDayLabels={customDayLabels}
                    onTap={rect=>{if(isLocked)return;const{x,y}=pickerPos(rect);const kt=s&&s.tg||[];onSC({weekId:week.id,group:grp,empIdx:ei,shiftIdx:si,dayIdx:si,x,y,keepTags:kt,isMaster:true});}}
                    onLong={(x,y)=>{if(!isLocked)onRC({weekId:week.id,group:grp,empIdx:ei,shiftIdx:si,x,y,isMaster:true});}}
                    onCtxMenu={(x,y)=>{if(!isLocked)onRC({weekId:week.id,group:grp,empIdx:ei,shiftIdx:si,x,y,isMaster:true});}}
                    onHrs={h=>!isLocked&&updM(week.id,grp,ei,si,{h})} onSickHrs={sh=>!isLocked&&updM(week.id,grp,ei,si,{sh})}
                    onApprove={()=>!isLocked&&appReqM(week.id,grp,ei,si)} onDeny={()=>!isLocked&&denyReqM(week.id,grp,ei,si)}/>)}
                  <td style={{textAlign:"center",padding:"3px 2px",verticalAlign:"middle"}}>{(()=>{const tot=eTotal(emp);return <div style={{background:"#f8fafc",border:"1px solid #e2e8f0",borderRadius:5,padding:"3px 2px",fontSize:11,fontWeight:700,color:tot>=36?gc.acc:tot>=30?"#d97706":"#ef4444",textAlign:"center"}}>{tot}</div>;})()}</td>
                </tr>
              ))}</tbody>
            </table>
          </div>
        );})}
      </div>
    );
  };

  return(
    <div>
      {newEmpModal&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.4)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:9995}}>
          <div data-ov style={{background:"#fff",borderRadius:12,padding:24,width:300,boxShadow:"0 16px 48px rgba(0,0,0,0.2)"}}>
            <div style={{fontWeight:700,fontSize:13,color:"#1e293b",marginBottom:8}}>➕ Add Employee to {newEmpModal.grp}</div>
            <div style={{fontSize:9,color:"#64748b",marginBottom:12}}>Added to all future master weeks from this point onward.</div>
            <input autoFocus value={newEmpName} onChange={e=>setNewEmpName(e.target.value)} onKeyDown={e=>e.key==="Enter"&&confirmAddEmp()} placeholder="Employee name" style={{width:"100%",background:"#f8fafc",border:"1px solid #e2e8f0",borderRadius:7,padding:"8px 12px",color:"#1e293b",fontSize:12,outline:"none",boxSizing:"border-box",marginBottom:12}}/>
            <div style={{display:"flex",gap:8}}><Btn onClick={confirmAddEmp} variant="primary" style={{flex:1,fontSize:11}} disabled={!newEmpName.trim()}>Add</Btn><Btn onClick={()=>{setNewEmpModal(null);setNewEmpName("");}} style={{padding:"8px 14px",fontSize:11}}>Cancel</Btn></div>
          </div>
        </div>
      )}
      {deleteConfirm&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.4)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:9995}}>
          <div data-ov style={{background:"#fff",borderRadius:12,padding:24,width:320,boxShadow:"0 16px 48px rgba(0,0,0,0.2)"}}>
            <div style={{fontWeight:700,fontSize:13,color:"#dc2626",marginBottom:8}}>🗑 Delete Employee</div>
            <div style={{fontSize:10,color:"#1e293b",marginBottom:6}}>Remove <strong>{deleteConfirm.name}</strong> from <strong>{deleteConfirm.group}</strong>?</div>
            <div style={{fontSize:9,color:"#64748b",marginBottom:16}}>Removes from all master weeks from this point forward. Data is preserved in the audit log.</div>
            <div style={{display:"flex",gap:8}}><Btn onClick={confirmDelEmp} variant="danger" style={{flex:1,fontSize:11}}>Yes, Delete</Btn><Btn onClick={()=>setDeleteConfirm(null)} style={{padding:"8px 14px",fontSize:11}}>Cancel</Btn></div>
          </div>
        </div>
      )}
      {coverageModal&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.5)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:9994}}>
          <div data-ov style={{background:"#fff",borderRadius:14,padding:24,width:420,maxHeight:"80vh",overflowY:"auto",boxShadow:"0 24px 64px rgba(0,0,0,0.2)"}}>
            <div style={{fontWeight:800,fontSize:13,color:"#dc2626",marginBottom:4}}>⚠️ Coverage Flags</div>
            <div style={{fontSize:9,color:"#64748b",marginBottom:14}}>Coverage rules not met. Override and publish anyway, or go back and fix.</div>
            <div style={{display:"flex",flexDirection:"column",gap:6,marginBottom:16}}>
              {coverageModal.flags.map((f,i)=>(
                <div key={i} style={{padding:"8px 12px",background:f.group==="Tech"?"#f0fdf4":"#fefce8",border:`1px solid ${f.group==="Tech"?"#86efac":"#fde047"}`,borderRadius:7}}>
                  <div style={{fontSize:9,fontWeight:700,color:f.group==="Tech"?"#15803d":"#b45309"}}>{f.group} · {f.day}</div>
                  <div style={{fontSize:10,color:"#374151",marginTop:2}}>{f.msg}</div>
                </div>
              ))}
            </div>
            <div style={{display:"flex",gap:8}}>
              <Btn onClick={()=>{doPublish(coverageModal.weekId);setCoverageModal(null);}} variant="danger" style={{flex:1,fontSize:10}}>⚠️ Override & Publish</Btn>
              <Btn onClick={()=>setCoverageModal(null)} style={{padding:"8px 14px",fontSize:10}}>← Go Back</Btn>
            </div>
          </div>
        </div>
      )}
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:16,padding:"9px 14px",background:"#fff",border:"1px solid #e2e8f0",borderRadius:9,boxShadow:"0 1px 3px rgba(0,0,0,0.06)"}}>
        <div style={{display:"flex",gap:4,alignItems:"center"}}>
          <button onClick={()=>setMasterTab("active")} style={{padding:"6px 14px",borderRadius:7,border:`1px solid ${masterTab==="active"?"#3b82f6":"#e2e8f0"}`,background:masterTab==="active"?"#eff6ff":"none",color:masterTab==="active"?"#1d4ed8":"#64748b",fontSize:10,cursor:"pointer",fontWeight:masterTab==="active"?700:400}}>⚙ Master Schedule</button>
          <button onClick={()=>setMasterTab("archive")} style={{padding:"6px 14px",borderRadius:7,border:`1px solid ${masterTab==="archive"?"#d97706":"#e2e8f0"}`,background:masterTab==="archive"?"#fef9c3":"none",color:masterTab==="archive"?"#92400e":"#64748b",fontSize:10,cursor:"pointer",fontWeight:masterTab==="archive"?700:400,position:"relative"}}>
            📦 Master Archive{masterArchived.length>0&&<span style={{marginLeft:4,background:"#d97706",color:"#fff",borderRadius:10,fontSize:7,padding:"1px 5px",fontWeight:700}}>{masterArchived.length}</span>}
          </button>
        </div>
        <div style={{display:"flex",gap:6,alignItems:"center"}}>
          {masterTab==="active"&&isUnlocked&&<Btn onClick={addWeek} variant="primary">+ NEW WEEK</Btn>}
        </div>
      </div>
      {masterTab==="active"&&(<DualScroll showTop={true}><div style={{display:"flex",gap:14,alignItems:"flex-start",paddingBottom:24}}>{masterWeeks.length===0&&<div style={{padding:40,color:"#94a3b8",fontSize:11}}>No master weeks.</div>}{masterWeeks.map(week=>renderWeekCard(week,false))}</div></DualScroll>)}
      {masterTab==="archive"&&(<DualScroll showTop={true}><div style={{display:"flex",gap:14,alignItems:"flex-start",paddingBottom:24}}>{masterArchived.length===0&&<div style={{padding:40,color:"#94a3b8",fontSize:11}}>No archived master weeks.</div>}{masterArchived.map(week=>renderWeekCard(week,true))}</div></DualScroll>)}
    </div>
  );
}

/* ══ PAST SCHEDULES ──────────────────────────────────────────────── */
function PastSchedules({archived,onUnarchive,isUnlocked,C}){
  const tabs=[...new Set(archived.map(monthYear))];
  const[active,setActive]=useState(null);
  useEffect(()=>{if(tabs.length&&!tabs.includes(active))setActive(tabs[0]);},[archived.length]);
  if(!archived.length)return <div style={{textAlign:"center",padding:60,color:"#94a3b8",fontSize:11}}><div style={{fontSize:32,marginBottom:8}}>📦</div>No past schedules yet.</div>;
  const cur=active||tabs[0];const tw=archived.filter(w=>monthYear(w)===cur);
  const allNames={};GROUPS.forEach(g=>{allNames[g]=[];const seen=new Set();tw.forEach(w=>(w.groups[g]||[]).forEach(e=>{if(!seen.has(e.name)){seen.add(e.name);allNames[g].push(e.name);}}));});
  const total=1+tw.length*8;const customC=(C||DEF).CUSTOM||DEF.CUSTOM;
  return(
    <div>
      <div style={{display:"flex",gap:6,marginBottom:14,flexWrap:"wrap"}}>{tabs.map(t=><button key={t} onClick={()=>setActive(t)} style={{padding:"5px 14px",borderRadius:7,border:`1px solid ${cur===t?"#3b82f6":"#e2e8f0"}`,background:cur===t?"#eff6ff":"#fff",color:cur===t?"#1d4ed8":"#64748b",fontSize:9,cursor:"pointer",fontWeight:cur===t?700:400}}>{t}</button>)}</div>
      {tw.length===0?<div style={{textAlign:"center",padding:40,color:"#94a3b8",fontSize:11}}>No weeks here.</div>:(
        <DualScroll>
          <table style={{borderCollapse:"separate",borderSpacing:0,minWidth:"max-content",background:"#fff",borderRadius:8,overflow:"hidden",boxShadow:"0 1px 4px rgba(0,0,0,0.08)"}}>
            <thead><tr style={{background:"#f8fafc"}}>
              <th style={{position:"sticky",left:0,zIndex:11,background:"#f8fafc",minWidth:118,padding:"6px 10px",borderBottom:"2px solid #e2e8f0",borderRight:"2px solid #e2e8f0",fontSize:9,color:"#64748b",textAlign:"left",fontWeight:700}}>STAFF</th>
              {tw.map((w,wi)=><th key={w.id} colSpan={8} style={{background:"#f8fafc",borderBottom:"2px solid #e2e8f0",borderLeft:wi>0?"2px solid #e2e8f0":"none",padding:"6px 10px",fontWeight:700,fontSize:13,color:"#1e293b",textAlign:"left",whiteSpace:"nowrap"}}>
                <div style={{display:"flex",alignItems:"center",gap:7}}><span>{w.label}</span>{isUnlocked&&<Btn onClick={()=>onUnarchive(w.id)} variant="success" style={{fontSize:7,padding:"2px 6px"}}>↩ Restore</Btn>}</div>
              </th>)}

                      return[...cells,<td key={`${week.id}-tot`} style={{padding:"3px 5px",verticalAlign:"middle",borderLeft:"1px solid #e2e8f0"}}>{emp&&<div style={{background:"#f8fafc",border:"1px solid #e2e8f0",borderRadius:5,padding:"4px",fontSize:12,fontWeight:700,color:tC,textAlign:"center",minWidth:36}}>{tot}</div>}</td>];
                    })}

      )}
    </div>
  );
}

/* ══ UNIFIED STATS & PAST REQUESTS ──────────────────────────────── */
function StatsAndRequestsPage({requests,weeks,liveArchived,masterArchived,C}){
  const[tab,setTab]=useState("hours");
  const[mi,setMi]=useState(new Date().getMonth());const[period,setPeriod]=useState(2);
  const[expanded,setExpanded]=useState(new Set());
  const toggle=k=>setExpanded(p=>{const n=new Set(p);n.has(k)?n.delete(k):n.add(k);return n;});
  const allWeeks=useMemo(()=>[...weeks.filter(w=>w.approved),...liveArchived,...masterArchived],[weeks,liveArchived,masterArchived]);
  const order=getOrder(allWeeks);
  const rows=order.map(({name,group})=>{
    const h=allWeeks.reduce((acc,wk)=>{const emp=(wk.groups[group]||[]).find(e=>e.name===name);if(!emp)return acc;return acc+emp.shifts.reduce((a,s,i)=>{if(!dateInPP(wk.dates[i],mi,period))return a;if(!s||["VAC","OFF","CLOSED","CUSTOM"].includes(s.st))return a;return a+(s.st==="SICK"?(s.sh!==null?+s.sh:0):s.h);},0);},0);
    const shifts=allWeeks.reduce((acc,wk)=>{const emp=(wk.groups[group]||[]).find(e=>e.name===name);if(!emp)return acc;return acc+emp.shifts.filter((s,i)=>dateInPP(wk.dates[i],mi,period)&&s&&!["VAC","OFF","CLOSED","CUSTOM"].includes(s.st)&&s.h>0).length;},0);
    return{name,group,h,shifts};
  });
  const vacReqs=requests.filter(r=>r.type==="VACATION"&&r.status==="APPROVED");
  const sickYTD=(name,group)=>allWeeks.reduce((acc,wk)=>{const emp=(wk.groups[group]||[]).find(e=>e.name===name);if(!emp)return acc;return acc+emp.shifts.filter(s=>s?.st==="SICK").length;},0);
  const TABS=[{id:"hours",l:"📊 Hours"},{id:"vacation",l:"🌴 Vacation"},{id:"sick",l:"🤒 Sick Days"}];
  return(
    <div>
      <div style={{display:"flex",gap:4,marginBottom:14,flexWrap:"wrap"}}>
        {TABS.map(t=><button key={t.id} onClick={()=>setTab(t.id)} style={{padding:"6px 14px",borderRadius:7,border:`1px solid ${tab===t.id?"#3b82f6":"#e2e8f0"}`,background:tab===t.id?"#eff6ff":"none",color:tab===t.id?"#1d4ed8":"#64748b",fontSize:10,cursor:"pointer",fontWeight:tab===t.id?700:400}}>{t.l}</button>)}
      </div>
      {tab==="hours"&&(
        <div>
          <div style={{display:"flex",gap:8,alignItems:"center",flexWrap:"wrap",marginBottom:16,padding:"10px 14px",background:"#fff",border:"1px solid #e2e8f0",borderRadius:9,boxShadow:"0 1px 3px rgba(0,0,0,0.06)"}}>
            <div style={{fontWeight:800,fontSize:13,color:"#1e293b",marginRight:4}}>STAFF HOURS</div>
            <div style={{display:"flex",gap:2,flexWrap:"wrap"}}>{MON.map((m,i)=><button key={m} onClick={()=>setMi(i)} style={{padding:"3px 7px",borderRadius:5,border:`1px solid ${mi===i?"#3b82f6":"#e2e8f0"}`,background:mi===i?"#eff6ff":"none",color:mi===i?"#1d4ed8":"#64748b",fontSize:8,cursor:"pointer",fontWeight:mi===i?700:400}}>{m}</button>)}</div>
            <div style={{display:"flex",gap:4}}>{[1,2].map(v=><button key={v} onClick={()=>setPeriod(v)} style={{padding:"4px 10px",borderRadius:6,border:`1px solid ${period===v?"#3b82f6":"#e2e8f0"}`,background:period===v?"#eff6ff":"none",color:period===v?"#1d4ed8":"#64748b",fontSize:8,cursor:"pointer",fontWeight:period===v?700:400,whiteSpace:"nowrap"}}>{ppLabel(mi,v)}</button>)}</div>
          </div>
          <div style={{background:"#fff",border:"1px solid #e2e8f0",borderRadius:8,overflow:"auto",boxShadow:"0 1px 3px rgba(0,0,0,0.06)"}}>
            <table style={{width:"100%",borderCollapse:"separate",borderSpacing:0}}>
              <thead><tr>{["EMPLOYEE","ROLE","HOURS","SHIFTS"].map(l=><th key={l} style={{padding:"8px 12px",textAlign:"left",fontSize:9,background:"#f8fafc",borderBottom:"2px solid #e2e8f0",color:"#64748b",fontWeight:700}}>{l}</th>)}</tr></thead>
              <tbody>{rows.map((row,i)=>{const gc=C[row.group]||DEF[row.group];return(
                <tr key={row.name+row.group} style={{background:i%2===0?"#fff":gc.gbg+"55"}}>
                  <td style={{padding:"8px 12px",fontWeight:600,fontSize:12,color:"#1e293b",borderBottom:"1px solid #f1f5f9"}}><div style={{display:"flex",alignItems:"center",gap:6}}><div style={{width:6,height:6,borderRadius:"50%",background:gc.acc}}/>{row.name}</div></td>
                  <td style={{padding:"8px 12px",borderBottom:"1px solid #f1f5f9"}}><span style={{fontSize:9,fontWeight:700,color:gc.htx,background:gc.cbg,border:`1px solid ${gc.cbo}`,borderRadius:20,padding:"2px 8px"}}>{row.group}</span></td>
                  <td style={{padding:"8px 12px",fontSize:13,fontWeight:700,borderBottom:"1px solid #f1f5f9",color:row.h>0?"#1e293b":"#cbd5e1"}}>{row.h>0?`${row.h}h`:"—"}</td>
                  <td style={{padding:"8px 12px",fontSize:10,color:"#64748b",borderBottom:"1px solid #f1f5f9"}}>{row.shifts>0?row.shifts:"—"}</td>
                </tr>
              );})}</tbody>
            </table>
          </div>
        </div>
      )}
      {tab==="vacation"&&(
        <div style={{background:"#fff",border:"1px solid #e2e8f0",borderRadius:8,overflow:"hidden",boxShadow:"0 1px 3px rgba(0,0,0,0.06)"}}>
          {order.map((emp,i)=>{
            const k=`${emp.name}||${emp.group}`;const reqs=vacReqs.filter(r=>r.empName===emp.name&&r.group===emp.group);
            const totalVac=reqs.reduce((a,r)=>a+r.dates.length,0);const isExp=expanded.has(k);const gc=DEF[emp.group];
            return(<div key={k} style={{borderBottom:"1px solid #f1f5f9"}}>
              <div onClick={()=>reqs.length&&toggle(k)} style={{display:"flex",alignItems:"center",gap:10,padding:"10px 14px",background:i%2===0?"#fff":gc.gbg+"44",cursor:reqs.length?"pointer":"default"}}>
                <div style={{width:7,height:7,borderRadius:"50%",background:gc.acc}}/>
                <span style={{fontWeight:600,fontSize:12,color:"#1e293b",minWidth:110}}>{emp.name}</span>
                <span style={{fontSize:9,padding:"2px 8px",borderRadius:20,background:gc.cbg,border:`1px solid ${gc.cbo}`,color:gc.htx,fontWeight:700}}>{emp.group}</span>
                <div style={{marginLeft:"auto",display:"flex",gap:10,alignItems:"center"}}>
                  <span style={{fontSize:10,fontWeight:700,color:totalVac>0?gc.acc:"#94a3b8"}}>🌴 {totalVac} VAC days</span>
                  {reqs.length>0&&<span style={{fontSize:10,color:"#94a3b8"}}>{isExp?"▼":"▶"}</span>}
                </div>
              </div>
              {isExp&&reqs.length>0&&<div style={{padding:"6px 14px 10px 36px",background:gc.gbg+"44"}}>
                {reqs.map((req,ri)=>{const days=req.dates.length;const first=req.dates[0];const last2=req.dates[req.dates.length-1];return(
                  <div key={req.id} style={{display:"flex",gap:10,padding:"5px 10px",marginBottom:3,background:"#fff",border:`1px solid ${gc.cbo}`,borderRadius:6,alignItems:"center"}}>
                    <span style={{fontSize:9,color:"#64748b"}}>#{ri+1}</span>
                    <span style={{fontSize:10,fontWeight:600,color:"#1e293b"}}>{days===1?first:`${first} – ${last2}`}</span>
                    <span style={{padding:"2px 8px",borderRadius:20,background:PEND_CLR.bg,border:`1px solid ${PEND_CLR.bo}`,fontSize:9,color:PEND_CLR.tx,fontWeight:700}}>{days} day{days!==1?"s":""}</span>
                  </div>
                );})}
              </div>}
            </div>);
          })}
          {order.length===0&&<div style={{textAlign:"center",padding:40,color:"#94a3b8",fontSize:11}}>No staff data.</div>}
        </div>
      )}
      {tab==="sick"&&(
        <div style={{background:"#fff",border:"1px solid #e2e8f0",borderRadius:8,overflow:"hidden",boxShadow:"0 1px 3px rgba(0,0,0,0.06)"}}>
          <table style={{width:"100%",borderCollapse:"separate",borderSpacing:0}}>
            <thead><tr>{["EMPLOYEE","ROLE","SICK DAYS YTD"].map(l=><th key={l} style={{padding:"8px 12px",textAlign:"left",fontSize:9,background:"#f8fafc",borderBottom:"2px solid #e2e8f0",color:"#64748b",fontWeight:700}}>{l}</th>)}</tr></thead>
            <tbody>{order.map((emp,i)=>{const gc=DEF[emp.group];const sick=sickYTD(emp.name,emp.group);return(
              <tr key={emp.name+emp.group} style={{background:i%2===0?"#fff":gc.gbg+"55"}}>
                <td style={{padding:"8px 12px",fontWeight:600,fontSize:12,color:"#1e293b",borderBottom:"1px solid #f1f5f9"}}><div style={{display:"flex",alignItems:"center",gap:6}}><div style={{width:6,height:6,borderRadius:"50%",background:gc.acc}}/>{emp.name}</div></td>
                <td style={{padding:"8px 12px",borderBottom:"1px solid #f1f5f9"}}><span style={{fontSize:9,fontWeight:700,color:gc.htx,background:gc.cbg,border:`1px solid ${gc.cbo}`,borderRadius:20,padding:"2px 8px"}}>{emp.group}</span></td>
                <td style={{padding:"8px 12px",fontSize:13,fontWeight:700,borderBottom:"1px solid #f1f5f9",color:sick>0?"#ef4444":"#94a3b8"}}>🤒 {sick>0?sick:"—"}</td>

            </tbody>
          </table>
        </div>
      )}
    </div>
  );
}

/* ══ MESSAGES PAGE ──────────────────────────────────────────────── */
function MessagesPage({messages,setMessages,swapRequests,setSwapRequests,staffPins,isUnlocked,liveWeeks,setLiveWeeks,addAudit,currentUser,onApproveSwap,onDenySwap}){

  const pendingSwaps=swapRequests.filter(s=>s.status==="PENDING").length;

    setMessages(prev=>[{id:uid(),from:authedName,group:authedGroup,body:body.trim(),ts,read:false,year:2026},...prev]);
    addAudit&&addAudit(authedName,"Sent message to admin");
    setBody("");setAuthedName("");setAuthedGroup("");setSendMsg("✓ Sent!");setTimeout(()=>setSendMsg(""),2500);
  };
  const approveSwap=onApproveSwap||((sid)=>{});

        </div>
      </div>}
      <div style={{display:"flex",gap:4,marginBottom:14}}>
        <button onClick={()=>setMsgTab("messages")} style={{padding:"6px 14px",borderRadius:7,border:`1px solid ${msgTab==="messages"?"#3b82f6":"#e2e8f0"}`,background:msgTab==="messages"?"#eff6ff":"none",color:msgTab==="messages"?"#1d4ed8":"#64748b",fontSize:10,cursor:"pointer",fontWeight:msgTab==="messages"?700:400,position:"relative"}}>
          💬 Messages{unreadMsgs>0&&<span style={{marginLeft:4,background:"#ef4444",color:"#fff",borderRadius:10,fontSize:7,padding:"1px 4px",fontWeight:700}}>{unreadMsgs}</span>}
        </button>
        <button onClick={()=>setMsgTab("swaps")} style={{padding:"6px 14px",borderRadius:7,border:`1px solid ${msgTab==="swaps"?"#7c3aed":"#e2e8f0"}`,background:msgTab==="swaps"?"#ede9fe":"none",color:msgTab==="swaps"?"#4c1d95":"#64748b",fontSize:10,cursor:"pointer",fontWeight:msgTab==="swaps"?700:400,position:"relative"}}>
          🔄 Swap Requests{pendingSwaps>0&&<span style={{marginLeft:4,background:"#7c3aed",color:"#fff",borderRadius:10,fontSize:7,padding:"1px 4px",fontWeight:700}}>{pendingSwaps}</span>}
        </button>

        <div>

/* ══ BACKFILL PAGE ───────────────────────────────────────────────── */
function BackfillPage({liveWeeks,setLiveWeeks,liveArchived,setLiveArchived,masterWeeks,setMasterWeeks,masterArchived,setMasterArchived,C}){
  const allWeeks=useMemo(()=>[...liveWeeks,...liveArchived,...masterWeeks,...masterArchived],[liveWeeks,liveArchived,masterWeeks,masterArchived]);
  const[backfillData,setBackfillData]=useState({});
  const[committed,setCommitted]=useState(false);
  const[msg,setMsg]=useState("");
  const today=new Date();
  const backfillWeeks=useMemo(()=>{
    const seen=new Set();const out=[];
    [...sortWeeks(masterWeeks),...sortWeeks(masterArchived)].forEach(w=>{
      if(seen.has(w.id))return;seen.add(w.id);
      const wEnd=w.dates.filter(Boolean).slice(-1)[0];if(!wEnd)return;
      const[d,m]=wEnd.split("-");const wDate=new Date(2026,MON.indexOf(m),+d);
      if(wDate<today)out.push(w);
    });
    return out;
  },[masterWeeks,masterArchived]);

  const setCell=(weekId,empKey,di,val)=>{
    setBackfillData(prev=>{
      const wk={...(prev[weekId]||{})};const emp={...(wk[empKey]||{})};
      if(val===null){delete emp[di];}else{emp[di]=val;}
      wk[empKey]=emp;return{...prev,[weekId]:wk};
    });
    setCommitted(false);
  };

  const applyBackfill=()=>{
    const entries=[];
    Object.entries(backfillData).forEach(([weekId,empMap])=>{
      Object.entries(empMap).forEach(([empKey,dayMap])=>{
        Object.entries(dayMap).forEach(([di,val])=>{
          const[name,group]=empKey.split("||");
          entries.push({weekId,name,group,di:+di,st:val.st});
        });
      });
    });
    if(!entries.length){setMsg("No entries to apply.");return;}
    const applyToPool=(pool,setter)=>setter(pool.map(week=>{
      const weekEntries=entries.filter(e=>e.weekId===week.id);if(!weekEntries.length)return week;
      const w={...week,groups:{...week.groups}};
      GROUPS.forEach(g=>{w.groups[g]=(w.groups[g]||[]).map(emp=>{
        const empEntries=weekEntries.filter(e=>e.name===emp.name&&e.group===g);if(!empEntries.length)return emp;
        const shifts=[...emp.shifts];
        empEntries.forEach(entry=>{shifts[entry.di]={...shifts[entry.di],st:entry.st,sh:entry.st==="SICK"?8:null};});
        return{...emp,shifts};
      });});return w;
    }));
    let newLive=liveWeeks,newLiveArch=liveArchived,newMaster=masterWeeks,newMasterArch=masterArchived;
    applyToPool(liveWeeks,v=>{newLive=v;setLiveWeeks(v);});
    applyToPool(liveArchived,v=>{newLiveArch=v;setLiveArchived(v);});
    applyToPool(masterWeeks,v=>{newMaster=v;setMasterWeeks(v);});
    applyToPool(masterArchived,v=>{newMasterArch=v;setMasterArchived(v);});
    saveToGas({liveWeeks:newLive,liveArchived:newLiveArch,masterWeeks:newMaster,masterArchived:newMasterArch});
    setCommitted(true);setMsg(`✓ Applied ${entries.length} backfill entries.`);
  };

  if(!backfillWeeks.length)return <div style={{padding:24,fontSize:10,color:"#94a3b8"}}>No past weeks available for backfill.</div>;

  return(
    <div>
      <div style={{padding:"10px 14px",background:"#fff",border:"1px solid #e2e8f0",borderRadius:9,marginBottom:16,boxShadow:"0 1px 3px rgba(0,0,0,0.06)"}}>
        <div style={{fontWeight:800,fontSize:13,color:"#1e293b",marginBottom:4}}>🤒 Historical Backfill</div>
        <div style={{fontSize:9,color:"#94a3b8",marginBottom:8}}>Click any cell to toggle Sick / Vacation. Each entry is a full day. Press Apply when done.</div>
        <div style={{display:"flex",gap:8,alignItems:"center"}}>
          <Btn onClick={applyBackfill} variant={committed?"default":"success"} disabled={committed} style={{fontSize:10}}>✅ Apply All to Archive & Stats</Btn>
          {msg&&<span style={{fontSize:9,color:msg.startsWith("✓")?"#15803d":"#dc2626",fontWeight:600}}>{msg}</span>}
        </div>
      </div>
      <DualScroll showTop>
        <div style={{display:"flex",flexDirection:"column",gap:16}}>
        {backfillWeeks.map(week=>(
          <div key={week.id} style={{background:"#fff",border:"1px solid #e2e8f0",borderRadius:9,padding:14,boxShadow:"0 1px 3px rgba(0,0,0,0.06)"}}>
            <div style={{fontWeight:700,fontSize:12,color:"#1e293b",marginBottom:10}}>{week.label}</div>
            <div style={{display:"flex",paddingLeft:118,marginBottom:4}}>{DAYS.map((d,i)=><div key={d} style={{flex:1,minWidth:80,textAlign:"center"}}><div style={{fontSize:10,fontWeight:700,color:"#475569"}}>{d}</div><div style={{fontSize:7,color:"#94a3b8"}}>{week.dates?.[i]||""}</div></div>)}</div>
            {GROUPS.map(grp=>{const gc=C[grp]||DEF[grp];return(
              <div key={grp} style={{marginBottom:10}}>
                <div style={{fontSize:9,fontWeight:700,color:gc.htx,padding:"3px 8px",background:gc.gbg,borderRadius:5,marginBottom:4,borderLeft:`2px solid ${gc.acc}`}}>{grp}</div>
                {(week.groups[grp]||[]).map(emp=>{
                  const empKey=`${emp.name}||${grp}`;const empData=backfillData[week.id]?.[empKey]||{};
                  return(
                    <div key={emp.id} style={{display:"flex",alignItems:"center",marginBottom:2}}>
                      <div style={{width:118,flexShrink:0,padding:"2px 8px",fontWeight:600,fontSize:10,color:"#1e293b"}}>{emp.name}</div>
                      {emp.shifts.map((s,di)=>{
                        if(di===6)return <div key={di} style={{flex:1,minWidth:80,padding:"2px"}}><div style={{background:"#9ca3af",borderRadius:4,minHeight:34,opacity:0.25}}/></div>;
                        const override=empData[di];
                        const baseSt=s?.st;
                        const displaySt=override?override.st:baseSt;
                        return(
                          <div key={di} style={{flex:1,minWidth:80,padding:"2px"}}>
                            <div style={{background:displaySt==="SICK"?"#fee2e2":displaySt==="VAC"?"#fef3c7":"#f8fafc",border:`1px solid ${displaySt==="SICK"?"#f87171":displaySt==="VAC"?"#f59e0b":"#e2e8f0"}`,borderRadius:4,minHeight:34,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",cursor:"pointer",fontSize:9,color:displaySt==="SICK"?"#991b1b":displaySt==="VAC"?"#78350f":"#94a3b8",fontWeight:600}}
                              onClick={()=>{
                                if(displaySt==="SICK"){setCell(week.id,empKey,di,{st:"VAC"});}
                                else if(displaySt==="VAC"){setCell(week.id,empKey,di,null);}
                                else{setCell(week.id,empKey,di,{st:"SICK"});}
                              }}>
                              {displaySt==="SICK"&&"🤒 Sick"}
                              {displaySt==="VAC"&&"🌴 VAC"}
                              {!displaySt&&s?.t&&<span style={{fontSize:8,color:"#94a3b8"}}>{s.t}</span>}
                              {!displaySt&&!s?.t&&<span style={{fontSize:7,color:"#d1d5db"}}>—</span>}
                            </div>
                          </div>
                        );
                      })}
                    </div>
                  );
                })}
              </div>
            );})}
          </div>
        ))}
        </div>
      </DualScroll>
    </div>
  );
}


/* ══ CLEAR DATA MODAL ───────────────────────────────────────────── */
function ClearDataModal({masterWeeks,liveWeeks,pwd,pwd2,onConfirm,onClose}){
  const[step,setStep]=useState("date"); // "date" -> "confirm"
  const[startInput,setStartInput]=useState("");
  const[clearInput,setClearInput]=useState("");
  const[clearErr,setClearErr]=useState(false);
  // Get the last published employee list from liveWeeks or most recent masterWeek
  const lastPublished=liveWeeks.length?liveWeeks[liveWeeks.length-1]:masterWeeks[masterWeeks.length-1];
  const parseInputDate=s=>{
    if(!s)return null;
    const parts=s.split("/");if(parts.length<2)return null;
    const d=parseInt(parts[0]),m=parseInt(parts[1])-1;
    if(isNaN(d)||isNaN(m))return null;
    return new Date(2026,m,d);
  };
  const inputDate=parseInputDate(startInput);
  const isValidDate=inputDate&&!isNaN(inputDate.getTime());
  return(
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.6)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:9998}}>
      <div data-ov style={{background:"#fff",borderRadius:14,padding:24,width:360,boxShadow:"0 24px 64px rgba(0,0,0,0.3)"}}>
        {step==="date"?(
          <div>
            <div style={{fontWeight:800,fontSize:14,color:"#dc2626",marginBottom:4}}>🗑 Clear Schedule Data</div>
            <div style={{fontSize:10,color:"#64748b",marginBottom:16}}>All shift data, requests, messages, and history will be cleared. Staff names and settings are preserved. Enter the new schedule start date to generate 5 fresh weeks.</div>
            <div style={{fontSize:11,fontWeight:600,color:"#475569",marginBottom:6}}>New Start Date (DD/MM)</div>
            <input autoFocus value={startInput} onChange={e=>setStartInput(e.target.value)} placeholder="e.g. 28/04" style={{width:"100%",background:"#f8fafc",border:`1px solid ${isValidDate?"#86efac":startInput?"#f87171":"#e2e8f0"}`,borderRadius:8,padding:"10px 12px",color:"#1e293b",fontSize:14,outline:"none",boxSizing:"border-box",marginBottom:4,letterSpacing:2}}/>
            <div style={{fontSize:9,color:"#94a3b8",marginBottom:16}}>
              {isValidDate?`✓ Will start week containing ${inputDate.getDate()}-${["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"][inputDate.getMonth()]}`:startInput?"Invalid date — use DD/MM format":""}
            </div>
            <div style={{fontSize:9,color:"#475569",marginBottom:16,padding:"8px 12px",background:"#f8fafc",borderRadius:7,border:"1px solid #e2e8f0"}}>
              Staff from last published schedule will be carried forward: <strong>{lastPublished?GROUPS.flatMap(g=>(lastPublished.groups[g]||[]).map(e=>e.name)).join(", "):"none"}</strong>
            </div>
            <div style={{display:"flex",gap:8}}>
              <Btn onClick={()=>setStep("confirm")} variant="danger" style={{flex:1,fontSize:11}} disabled={!isValidDate}>Next →</Btn>
              <Btn onClick={onClose} style={{padding:"8px 14px",fontSize:11}}>Cancel</Btn>
            </div>
          </div>
        ):(
          <div>
            <div style={{fontWeight:800,fontSize:14,color:"#dc2626",marginBottom:8}}>⚠️ Confirm Clear</div>
            <div style={{fontSize:10,color:"#64748b",marginBottom:14}}>Type your admin password to confirm. This cannot be undone.</div>
            <input autoFocus type="password" value={clearInput} onChange={e=>{setClearInput(e.target.value);setClearErr(false);}} onKeyDown={e=>e.key==="Enter"&&(clearInput===pwd||clearInput===pwd2)?onConfirm(inputDate):null} placeholder="Admin password" style={{width:"100%",background:"#fff",border:`1px solid ${clearErr?"#ef4444":"#f87171"}`,borderRadius:7,padding:"9px 12px",color:"#1e293b",fontSize:12,outline:"none",boxSizing:"border-box",marginBottom:6}}/>
            {clearErr&&<div style={{fontSize:9,color:"#ef4444",marginBottom:8,fontWeight:600}}>Incorrect password.</div>}
            <div style={{display:"flex",gap:8,marginTop:8}}>
              <Btn onClick={()=>{if(clearInput===pwd||clearInput===pwd2){onConfirm(inputDate);}else setClearErr(true);}} variant="danger" style={{flex:1,fontSize:11}}>CONFIRM DELETE</Btn>
              <Btn onClick={()=>{setStep("date");setClearInput("");setClearErr(false);}} style={{padding:"8px 14px",fontSize:11}}>← Back</Btn>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}
