/* ── COVERAGE CHECKER ───────────────────────────────────────────── */
function checkCoverage(week) {
  const flags = [];
  const parseHr = s => { s=s.trim(); return s.includes(":")?+s.split(":")[0]+ +s.split(":")[1]/60:+s; };
  // v3: parse a "X-Y" shift and return [startHr, endHr] using 24h clock with PM rollover
  const parseShift = t => {
    if(!t) return [99, 0];
    const [a, b] = t.split("-");
    let st = parseHr(a), en = parseHr(b);
    // If end time appears to be PM (smaller than start, and start is morning/midday) — roll forward 12h
    if (en < st) en += 12;
    return [st, en];
  };
  // Approx float compare (avoid 7.499999 vs 7.5 misses)
  const eq = (a, b) => Math.abs(a - b) < 0.05;
  const lte = (a, b) => a <= b + 0.05;
  const gte = (a, b) => a >= b - 0.05;

  week.dates.forEach((dt, di) => {
    if(!dt || di===6) return; // skip Sun (closed)
    const dayLabel = `${DAYS[di]} ${dt}`;
    const isMonday = di===0;
    const tech = (week.groups.Tech||[]).map(e=>e.shifts[di]).filter(s=>s&&!["VAC","OFF","CLOSED","SICK","CUSTOM"].includes(s.st)&&s.t);
    const ccr = (week.groups.CCR||[]).map(e=>e.shifts[di]).filter(s=>s&&!["VAC","OFF","CLOSED","SICK","CUSTOM"].includes(s.st)&&s.t);
    const techShifts = tech.map(s=>parseShift(s.t));
    const ccrShifts = ccr.map(s=>parseShift(s.t));

    // v3 rules per spec:
    // - Every day needs a Tech at 7:30 and a CCR at 7:30
    // - Every day needs a Tech finishing at 8pm and a CCR finishing at 8pm
    // - Mondays specifically need 2 CCRs starting at 7:30
    // - Weekdays need at least 2 Techs and 2 CCRs

    if (tech.length < 2) {
      flags.push({day:dayLabel, group:"Tech", msg:"Fewer than 2 Techs scheduled"});
    } else {
      const has730Start = techShifts.some(([s])=>eq(s, 7.5));
      const has8End = techShifts.some(([,e])=>gte(e, 20));
      if (!has730Start) flags.push({day:dayLabel, group:"Tech", msg:"No Tech starting at 7:30 AM"});
      if (!has8End) flags.push({day:dayLabel, group:"Tech", msg:"No Tech finishing at 8:00 PM"});
    }

    if (ccr.length < 2) {
      flags.push({day:dayLabel, group:"CCR", msg:"Fewer than 2 CCRs scheduled"});
    } else {
      const ccr730Count = ccrShifts.filter(([s])=>eq(s, 7.5)).length;
      const ccr8End = ccrShifts.some(([,e])=>gte(e, 20));
      if (isMonday) {
        if (ccr730Count < 2) flags.push({day:dayLabel, group:"CCR", msg:"Monday: needs 2 CCRs starting at 7:30 AM"});
      } else {
        if (ccr730Count < 1) flags.push({day:dayLabel, group:"CCR", msg:"No CCR starting at 7:30 AM"});
      }
      if (!ccr8End) flags.push({day:dayLabel, group:"CCR", msg:"No CCR finishing at 8:00 PM"});
    }
  });
  return flags;
}

/* ── TIME OFF CALENDAR ──────────────────────────────────────────── */
function TimeOffPage({requests,setRequests,masterWeeks,setMasterWeeks,liveWeeks,lockedTOWeeks,setLockedTOWeeks,isAdmin,staffUnlocked,staffPins,currentUser,onRequestStaffPin,pwd,pwd2,C}){
  const [calStart,setCalStart]=useState(()=>{const d=new Date();return new Date(d.getFullYear(),d.getMonth(),1);});
  const [dragging,setDragging]=useState(false);
  const [dragStart,setDragStart]=useState(null);
  const [dragDates,setDragDates]=useState(new Set());
  const [reqModal,setReqModal]=useState(null);
  const [unlockModal,setUnlockModal]=useState(null);
  const [unlockInput,setUnlockInput]=useState("");
  const [unlockErr,setUnlockErr]=useState(false);
  const scrollRef=useRef(null);
  const renderedReqIds=useRef(new Set());

  // Get all weeks visible in this month
  const calMonthWeeks=useMemo(()=>{
    const y=calStart.getFullYear(),mo=calStart.getMonth();
    const first=new Date(y,mo,1); const last=new Date(y,mo+1,0);
    const allWk=[...liveWeeks,...(masterWeeks||[])];
    return allWk.filter(w=>{
      const ds=w.dates.filter(Boolean);
      if(!ds.length)return false;
      const fs=parseDate(ds[0]); const ls=parseDate(ds[ds.length-1]);
      return fs<=last&&ls>=first;
    });
  },[calStart,liveWeeks,masterWeeks]);

  // v3: Display ALL weeks of the displayed month (Mon-Sun blocks), generating virtual placeholders
  // for weeks that don't yet have a record in liveWeeks or masterWeeks. This way the user can always
  // see the upcoming time-off grid, even before any schedules are built.
  const displayWeeks=useMemo(()=>{
    const y=calStart.getFullYear(),mo=calStart.getMonth();
    const first=new Date(y,mo,1); const last=new Date(y,mo+1,0);
    const seenIds=new Set();
    const out=[];
    const allWk=[...liveWeeks,...(masterWeeks||[])];

    // 1) Pull in all real weeks that overlap this month
    allWk.forEach(w=>{
      if(seenIds.has(w.id))return;
      const ds=w.dates.filter(Boolean);
      if(!ds.length)return;
      const fs=parseDate(ds[0]);
      const ls=parseDate(ds[ds.length-1]);
      if(fs<=last&&ls>=first){seenIds.add(w.id);out.push(w);}
    });

    // 2) Fill in virtual weeks for any Mon-Sun blocks that touch this month and aren't covered yet
    // Track which dates are already accounted for
    const coveredDates=new Set();
    out.forEach(w=>w.dates.forEach(d=>{if(d)coveredDates.add(d);}));

    // Walk back to the Monday on or before the 1st of the month
    let cur=new Date(first);
    const dow=cur.getDay()===0?6:cur.getDay()-1;
    cur.setDate(cur.getDate()-dow);
    // Walk forward week by week until past month end
    while(cur<=last){
      const dates=Array(7).fill(0).map((_,i)=>{
        const d=new Date(cur.getTime()+i*86400000);
        return `${d.getDate()}-${MON[d.getMonth()]}`;
      });
      if(!dates.some(d=>coveredDates.has(d))){
        // No real week covers this Mon-Sun → create a virtual placeholder
        const virt={
          id:`virt-${dates[0]}`,
          label:wkLabel(dates),
          dates,
          published:false,
          virtual:true,
          groups:{Tech:[],VA:[],CCR:[]}
        };
        out.push(virt);
      }
      cur=new Date(cur.getTime()+7*86400000);
    }

    return sortWeeks(out);
  },[calStart,liveWeeks,masterWeeks]);

  const allStaff=useMemo(()=>{
    const seen=new Set(); const out=[];
    const allWk=[...liveWeeks,...(masterWeeks||[])];
    allWk.forEach(w=>GROUPS.forEach(g=>(w.groups[g]||[]).forEach(e=>{const k=`${e.name}||${g}`;if(!seen.has(k)){seen.add(k);out.push({name:e.name,group:g});}})));
    return out;
  },[liveWeeks,masterWeeks]);

  const pendingCount=requests.filter(r=>r.status==="PENDING").length;
  const prevMo=()=>setCalStart(d=>new Date(d.getFullYear(),d.getMonth()-1,1));
  const nextMo=()=>setCalStart(d=>new Date(d.getFullYear(),d.getMonth()+1,1));

  // All dates in this month's displayed weeks
  const allDisplayDates=useMemo(()=>{
    const out=[];
    displayWeeks.forEach(w=>w.dates.forEach(d=>{if(d)out.push(d);}));
    return out;
  },[displayWeeks]);

  const isLivePub=wid=>liveWeeks.some(w=>w.id===wid);
  const isLocked=wid=>lockedTOWeeks.has(wid)||isLivePub(wid);

  const handleLockToggle=(wid,currentlyLocked)=>{
    if(currentlyLocked&&isLivePub(wid)){
      // Need password to unlock a published week
      setUnlockModal({wid}); setUnlockInput(""); setUnlockErr(false);
    } else if(currentlyLocked){
      setLockedTOWeeks(prev=>{const n=new Set(prev);n.delete(wid);return n;});
    } else {
      setLockedTOWeeks(prev=>{const n=new Set(prev);n.add(wid);return n;});
    }
  };

  const submitUnlock=()=>{
    if(unlockInput===pwd||unlockInput===pwd2){
      setLockedTOWeeks(prev=>{const n=new Set(prev);n.delete(unlockModal.wid);return n;});
      setUnlockModal(null); setUnlockInput(""); setUnlockErr(false);
    } else {
      setUnlockErr(true);
    }
  };

  const submitRequest=(dates,type,empName,group,note)=>{
    const id=uid();
    const reqDate=todayStr(); // v2: capture creation date
    const r={id,empName,group,dates,type,status:"PENDING",note,ts:nowTs(),reqDate};
    setRequests(prev=>[...prev,r]);
    // Stamp PENDING in master weeks
    if(setMasterWeeks&&["VAC","SICK","AM2","PM12","PM2","CUSTOM"].includes(type)){
      setMasterWeeks(prev=>prev.map(w=>{
        const newGroups={...w.groups};
        (newGroups[group]||[]).forEach((emp,ei)=>{

// ── GAS API helpers ──────────────────────────────────────────────────
async function gasGet(action) {
  try {
    const r = await fetch(`${GAS_URL}?action=${action}`, { method:"GET" });
    if (!r.ok) return { ok: false, error: 'HTTP ' + r.status };
    return await r.json();
  } catch(e) {
    console.warn('gasGet error:', e.message);
    return { ok: false, error: e.message };
  }
}
async function gasPost(body) {
  try {
    const encoded = encodeURIComponent(JSON.stringify(body));
    const r = await fetch(`${GAS_URL}?method=post&body=${encoded}`, { method: "GET" });
    if (!r.ok) return { ok: false, error: 'HTTP ' + r.status };
    return await r.json();
  } catch(e) {
    console.warn('gasPost error:', e.message);
    return { ok: false, error: e.message };
  }
}
