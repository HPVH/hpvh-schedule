    {fields.map(f=><div key={f} style={{display:"flex",alignItems:"center",gap:4}}><span style={{fontSize:8,color:"#94a3b8",textTransform:"uppercase"}}>{f}</span><input type="color" value={(C[ckey]&&C[ckey][f])||"#ffffff"} onChange={e=>setC(prev=>({...prev,[ckey]:{...prev[ckey],[f]:e.target.value}}))} style={{width:28,height:22,cursor:"pointer",border:"1px solid #e2e8f0",borderRadius:3,padding:0}}/></div>)}
    <div style={{padding:"3px 10px",background:C[ckey]?.bg||C[ckey]?.cbg||"#f8fafc",border:`1px solid ${C[ckey]?.bo||C[ckey]?.cbo||"#e2e8f0"}`,borderRadius:5,fontSize:9,color:C[ckey]?.tx||C[ckey]?.ctx||"#1e293b"}}>Preview</div>
    <Btn onClick={()=>setC(prev=>({...prev,[ckey]:DEF[ckey]}))} style={{fontSize:8,color:"#94a3b8"}}>Reset</Btn>
  </div>);

  const setPin=(name,group,val,onDup)=>setStaffPins(prev=>{
    if(val&&prev.some(s=>(s.name!==name||s.group!==group)&&s.pin===val)){if(onDup)onDup();return prev;}
    return prev.map(s=>s.name===name&&s.group===group?{...s,pin:val}:s);
  });
  const grouped=GROUPS.map(g=>({group:g,staff:staffPins.filter(s=>s.group===g)}));
  const addViewer=()=>{if(!newViewerName.trim()||newViewerPin.length<3){setViewerMsg("Name and 3–4 digit PIN required.");return;}if(viewerPins.some(v=>v.name===newViewerName.trim())){setViewerMsg("Name already exists.");return;}setViewerPins(prev=>[...prev,{id:uid(),name:newViewerName.trim(),pin:newViewerPin}]);setNewViewerName("");setNewViewerPin("");setViewerMsg("✓ Added!");setTimeout(()=>setViewerMsg(""),2000);};

  const doArchiveSnapshot=()=>{
    try{
      const data={liveWeeks,masterWeeks,liveArchived,masterArchived,requests,messages,swapRequests,exportedAt:nowTs()};
      const snap=JSON.stringify(data,null,2);
      const blob=new Blob([`<!DOCTYPE html><html><head><meta charset="utf-8"><title>HPVH Snapshot ${nowTs()}</title></head><body><pre style="font-family:monospace;font-size:10px;background:#1e293b;color:#94a3b8;padding:20px;white-space:pre-wrap">${snap.replace(/</g,"&lt;")}</pre><p style="font-family:sans-serif;font-size:11px;color:#64748b">Read-only snapshot exported from HPVH Schedule on ${nowTs()}.</p></body></html>`],{type:"text/html"});
      const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download=`hpvh-snapshot-${new Date().toISOString().slice(0,10)}.html`;a.click();
      setArchiveMsg("✓ Snapshot downloaded.");setTimeout(()=>setArchiveMsg(""),3000);
    }catch(e){setArchiveMsg("Error creating snapshot.");}
  };

  const doExportJson=()=>{
    try{
      const data={liveWeeks,masterWeeks,liveArchived,masterArchived,requests,messages,swapRequests,auditLog,exportedAt:nowTs()};
      const blob=new Blob([JSON.stringify(data,null,2)],{type:"application/json"});
      const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download=`hpvh-export-${new Date().toISOString().slice(0,10)}.json`;a.click();
      setArchiveMsg("✓ JSON export downloaded. Paste into seedScheduleData() in GAS to migrate.");setTimeout(()=>setArchiveMsg(""),5000);
    }catch(e){setArchiveMsg("Error creating export.");}
  };

  const TABS=[{id:"settings",l:"⚙️ Settings"},{id:"pins",l:"🔑 PINs"},{id:"colours",l:"🎨 Colours"},{id:"passwords",l:"🔐 Passwords"},{id:"data",l:"💾 Data"},{id:"audit",l:"📋 Audit"},{id:"backfill",l:"🤒 Backfill"}];

  return(
    <div>
      <div style={{fontWeight:800,fontSize:14,color:"#1e293b",marginBottom:12}}>⚙️ Admin</div>
      <div style={{display:"flex",gap:4,marginBottom:16,flexWrap:"wrap"}}>
        {TABS.map(t=><button key={t.id} onClick={()=>setAdminTab(t.id)} style={{padding:"6px 12px",borderRadius:7,border:`1px solid ${adminTab===t.id?"#3b82f6":"#e2e8f0"}`,background:adminTab===t.id?"#eff6ff":"#fff",color:adminTab===t.id?"#1d4ed8":"#64748b",fontSize:10,cursor:"pointer",fontWeight:adminTab===t.id?700:400}}>{t.l}</button>)}
      </div>

      {adminTab==="settings"&&(
        <div>
          <div style={{background:"#fff",border:"1px solid #e2e8f0",borderRadius:9,padding:16,marginBottom:12,boxShadow:"0 1px 3px rgba(0,0,0,0.06)"}}>
            <div style={{fontWeight:700,fontSize:12,color:"#475569",marginBottom:10,paddingBottom:8,borderBottom:"1px solid #f1f5f9"}}>⏱ Auto-Lock Timeout</div>
            <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>{LOCK_OPTIONS.map(opt=><button key={opt.ms} onClick={()=>setLockMs(opt.ms)} style={{padding:"7px 14px",borderRadius:7,border:`1px solid ${lockMs===opt.ms?"#3b82f6":"#e2e8f0"}`,background:lockMs===opt.ms?"#eff6ff":"#f8fafc",color:lockMs===opt.ms?"#1d4ed8":"#475569",fontSize:10,cursor:"pointer",fontWeight:lockMs===opt.ms?700:400}}>{opt.label}</button>)}</div>
            <div style={{marginTop:8,fontSize:9,color:"#94a3b8"}}>Current: <strong>{LOCK_OPTIONS.find(o=>o.ms===lockMs)?.label||"5 min"}</strong></div>
          </div>
          <div style={{background:"#fff",border:"1px solid #e2e8f0",borderRadius:9,padding:16,boxShadow:"0 1px 3px rgba(0,0,0,0.06)"}}>
            <div style={{fontWeight:700,fontSize:12,color:"#475569",marginBottom:8,paddingBottom:8,borderBottom:"1px solid #f1f5f9"}}>⭐ Custom Day Label</div>
            <div style={{fontSize:9,color:"#64748b",marginBottom:10}}>Label shown on cells marked Custom (e.g. Stat Holiday, Clinic Closed).</div>
            <div style={{display:"flex",gap:8,alignItems:"center"}}>
              <input value={customLabelInput} onChange={e=>setCustomLabelInput(e.target.value)} placeholder="e.g. Stat Holiday" style={{background:"#f8fafc",border:"1px solid #e2e8f0",borderRadius:7,padding:"7px 10px",color:"#1e293b",fontSize:11,outline:"none",width:200}}/>
              <Btn onClick={()=>{setCustomDayLabels([customLabelInput||"Custom"]);}} variant="primary" style={{fontSize:10}}>Save</Btn>
            </div>
            <div style={{marginTop:6,fontSize:8,color:"#94a3b8"}}>Current: <strong>{customDayLabels?.[0]||"Custom"}</strong></div>
          </div>
        </div>
      )}

      {adminTab==="pins"&&(
        <div>
          <div style={{background:"#fff",border:"1px solid #e2e8f0",borderRadius:9,padding:16,marginBottom:12,boxShadow:"0 1px 3px rgba(0,0,0,0.06)"}}>
            <div style={{fontWeight:700,fontSize:12,color:"#475569",marginBottom:10,paddingBottom:8,borderBottom:"1px solid #f1f5f9"}}>👁 View-Only PINs</div>
            {viewerPins.map(v=><div key={v.id} style={{display:"flex",alignItems:"center",gap:8,padding:"7px 10px",borderRadius:6,background:"#f8fafc",border:"1px solid #e2e8f0",marginBottom:4}}>
              <span style={{fontSize:11,fontWeight:600,color:"#1e293b",minWidth:120}}>{v.name}</span>
              <span style={{fontSize:9,padding:"2px 8px",borderRadius:20,background:"#e0f2fe",border:"1px solid #7dd3fc",color:"#0369a1",fontWeight:700}}>VIEW ONLY</span>
              <span style={{fontSize:13,letterSpacing:3,color:"#94a3b8",minWidth:60}}>{revealPin===v.id?v.pin:maskPin(v.pin)}</span>
              <Btn onClick={()=>setRevealPin(revealPin===v.id?null:v.id)} style={{fontSize:8,padding:"2px 6px"}}>{revealPin===v.id?"Hide":"Peek"}</Btn>
              <Btn onClick={()=>setViewerPins(prev=>prev.filter(x=>x.id!==v.id))} variant="danger" style={{marginLeft:"auto",fontSize:8,padding:"2px 6px"}}>Remove</Btn>
            </div>)}
            <div style={{display:"flex",gap:8,alignItems:"center",flexWrap:"wrap",marginTop:8}}>
              <input value={newViewerName} onChange={e=>setNewViewerName(e.target.value)} placeholder="Name" style={{background:"#f8fafc",border:"1px solid #e2e8f0",borderRadius:7,padding:"7px 10px",color:"#1e293b",fontSize:11,outline:"none",width:140}}/>
              <input value={newViewerPin} onChange={e=>setNewViewerPin(e.target.value.replace(/\D/g,"").slice(0,4))} placeholder="PIN (3–4 digits)" style={{background:"#f8fafc",border:"1px solid #e2e8f0",borderRadius:7,padding:"7px 10px",color:"#1e293b",fontSize:11,outline:"none",width:120,letterSpacing:3}}/>
              <Btn onClick={addViewer} variant="primary" style={{fontSize:10}}>+ Add</Btn>
              {viewerMsg&&<span style={{fontSize:9,color:viewerMsg.startsWith("✓")?"#15803d":"#dc2626",fontWeight:600}}>{viewerMsg}</span>}
            </div>
          </div>
          <div style={{background:"#fff",border:"1px solid #e2e8f0",borderRadius:9,padding:16,boxShadow:"0 1px 3px rgba(0,0,0,0.06)"}}>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:12,paddingBottom:8,borderBottom:"1px solid #f1f5f9"}}>
              <div style={{fontWeight:700,fontSize:12,color:"#475569"}}>Staff PINs</div><Btn onClick={()=>setPinSection(v=>!v)} style={{fontSize:8}}>{pinSection?"▲ Collapse":"▼ Expand"}</Btn>
            </div>
            {pinSection&&<div>
              <div style={{fontSize:9,color:"#94a3b8",marginBottom:12}}>PINs must be unique across all staff.</div>
              {pinMsg&&<div style={{fontSize:9,color:"#dc2626",fontWeight:600,marginBottom:8,padding:"6px 10px",background:"#fee2e2",borderRadius:6}}>{pinMsg}</div>}
              {grouped.map(({group,staff})=>{const gc=DEF[group];return(
                <div key={group} style={{marginBottom:14}}>
                  <div style={{fontSize:10,fontWeight:700,color:gc.htx,padding:"4px 8px",background:gc.gbg,borderRadius:5,marginBottom:6,borderLeft:`2px solid ${gc.acc}`}}>{group}</div>
                  {staff.map(s=>{const k=`${s.name}||${s.group}`;const isEditing=editingPin&&editingPin.name===s.name&&editingPin.group===s.group;const isRevealed=revealPin===k;return(
                    <div key={k} style={{display:"flex",alignItems:"center",gap:8,padding:"7px 10px",borderRadius:6,background:isEditing?"#eff6ff":"#f8fafc",border:`1px solid ${isEditing?"#93c5fd":"#e2e8f0"}`,marginBottom:4}}>
                      <span style={{fontSize:11,fontWeight:600,color:"#1e293b",minWidth:100}}>{s.name}</span>
                      {!s.pin&&<span style={{fontSize:8,color:"#ef4444",fontWeight:600}}>⚠ No PIN</span>}
                      {isEditing?(
                        <div style={{display:"flex",gap:5,alignItems:"center",flex:1}}>
                          <input autoFocus type="tel" maxLength={4} value={pinInput} onChange={e=>setPinInput(e.target.value.replace(/\D/g,""))} placeholder="3–4 digits" style={{width:80,background:"#fff",border:"1px solid #93c5fd",borderRadius:6,padding:"5px 8px",fontSize:13,outline:"none",letterSpacing:4,textAlign:"center"}}/>
                          <Btn onClick={()=>{if(pinInput.length>=3){let dup=false;setPin(s.name,s.group,pinInput,()=>{dup=true;});if(!dup){setEditingPin(null);setPinInput("");setPinMsg("");}else{setPinInput("");setPinMsg("⚠ PIN already used.");}}} } variant="primary" style={{fontSize:9}} disabled={pinInput.length<3}>Save</Btn>
                          <Btn onClick={()=>{setEditingPin(null);setPinInput("");}} style={{fontSize:9}}>Cancel</Btn>
                          {s.pin&&<Btn onClick={()=>{setPin(s.name,s.group,"");setEditingPin(null);setPinInput("");}} variant="danger" style={{fontSize:9}}>Clear</Btn>}
                        </div>
                      ):(
                        <div style={{display:"flex",gap:6,alignItems:"center",flex:1}}>
                          <span style={{fontSize:14,letterSpacing:3,color:"#94a3b8",minWidth:60}}>{s.pin?(isRevealed?s.pin:maskPin(s.pin)):"—"}</span>
                          {s.pin&&<Btn onClick={()=>setRevealPin(isRevealed?null:k)} style={{fontSize:8,padding:"2px 6px"}}>{isRevealed?"Hide":"Peek"}</Btn>}
                          <Btn onClick={()=>{setEditingPin({name:s.name,group:s.group});setPinInput(s.pin||"");setRevealPin(null);}} style={{fontSize:9,marginLeft:"auto"}}>{s.pin?"Change PIN":"Set PIN"}</Btn>
                        </div>
                      )}
                    </div>
                  );})}
                </div>
              );})}
            </div>}
          </div>
        </div>
      )}

      {adminTab==="colours"&&(
        <div style={{background:"#fff",border:"1px solid #e2e8f0",borderRadius:9,padding:16,boxShadow:"0 1px 3px rgba(0,0,0,0.06)"}}>
          <div style={{fontWeight:700,fontSize:12,color:"#475569",marginBottom:12,paddingBottom:8,borderBottom:"1px solid #f1f5f9"}}>Shift Colours</div>
          <CR label="Tech Shifts" ckey="Tech" fields={["cbg","cbo","ctx"]}/><CR label="VA Shifts" ckey="VA" fields={["cbg","cbo","ctx"]}/><CR label="CCR Shifts" ckey="CCR" fields={["cbg","cbo","ctx"]}/>
          <div style={{fontWeight:700,fontSize:12,color:"#475569",margin:"12px 0 8px",paddingTop:8,borderTop:"1px solid #f1f5f9"}}>Status Colours</div>
          <CR label="Vacation (VAC)" ckey="VAC" fields={["bg","bo","tx"]}/><CR label="Day Off (OFF)" ckey="OFF" fields={["bg","bo","tx"]}/><CR label="Closed" ckey="CLOSED" fields={["bg","bo","tx"]}/><CR label="Sick" ckey="SICK" fields={["bg","bo","tx"]}/><CR label="Custom Day ⭐" ckey="CUSTOM" fields={["bg","bo","tx"]}/>
          <Btn onClick={()=>setC({...DEF})} variant="danger" style={{marginTop:8}}>Reset All</Btn>
        </div>
      )}

      {adminTab==="passwords"&&(
        <div>
          <div style={{background:"#fff",border:"1px solid #e2e8f0",borderRadius:9,padding:16,marginBottom:12,boxShadow:"0 1px 3px rgba(0,0,0,0.06)"}}>
            <div style={{fontWeight:700,fontSize:12,color:"#475569",marginBottom:12,paddingBottom:8,borderBottom:"1px solid #f1f5f9"}}>🔐 Admin Password 1</div>
            <div style={{fontSize:9,color:"#64748b",marginBottom:8}}>Name shown in audit log for this password.</div>
            <input value={adminName1} onChange={e=>setAdminName1(e.target.value||"Admin")} placeholder="Admin name (e.g. Daniel)" style={{background:"#f8fafc",border:"1px solid #e2e8f0",borderRadius:7,padding:"7px 10px",color:"#1e293b",fontSize:11,outline:"none",width:200,marginBottom:10}}/>
            <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:10}}>
              <input type="password" value={np} onChange={e=>{setNp(e.target.value);setMsg("");}} placeholder="New password" style={{background:"#f8fafc",border:"1px solid #e2e8f0",borderRadius:7,padding:"8px 12px",color:"#1e293b",fontSize:12,outline:"none",width:180}}/>
              <input type="password" value={cp} onChange={e=>{setCp(e.target.value);setMsg("");}} placeholder="Confirm" style={{background:"#f8fafc",border:"1px solid #e2e8f0",borderRadius:7,padding:"8px 12px",color:"#1e293b",fontSize:12,outline:"none",width:180}}/>
              <Btn onClick={()=>{if(!np){setMsg("Enter a password.");return;}if(np!==cp){setMsg("Passwords don't match.");return;}setPwd(np);setNp("");setCp("");setMsg("✓ Updated!");}} variant="primary" style={{padding:"8px 16px",fontSize:11}}>Update</Btn>
            </div>
            <div style={{fontSize:9,color:"#64748b",marginBottom:6}}>Admin PIN (3–4 digits) — alternative to password for quick unlock.</div>
            <div style={{display:"flex",gap:8,alignItems:"center"}}>
              <input type="tel" maxLength={4} value={adminPin1} onChange={e=>setAdminPin1(e.target.value.replace(/\D/g,""))} placeholder="PIN (optional)" style={{background:"#f8fafc",border:"1px solid #e2e8f0",borderRadius:7,padding:"7px 10px",color:"#1e293b",fontSize:13,outline:"none",width:100,letterSpacing:4}}/>
              {adminPin1&&<Btn onClick={()=>setAdminPin1("")} variant="danger" style={{fontSize:9}}>Clear</Btn>}
              {adminPin1.length>=3&&<span style={{fontSize:8,color:"#15803d",fontWeight:600}}>✓ PIN set</span>}
            </div>
            {msg&&<div style={{marginTop:8,fontSize:10,color:msg.startsWith("✓")?"#15803d":"#dc2626",fontWeight:600}}>{msg}</div>}
          </div>
          <div style={{background:"#fff",border:"1px solid #e2e8f0",borderRadius:9,padding:16,boxShadow:"0 1px 3px rgba(0,0,0,0.06)"}}>
            <div style={{fontWeight:700,fontSize:12,color:"#475569",marginBottom:12,paddingBottom:8,borderBottom:"1px solid #f1f5f9"}}>🔐 Admin Password 2</div>
            <div style={{fontSize:9,color:"#94a3b8",marginBottom:8}}>Either password grants full access. Name shown in audit log.</div>
            <input value={adminName2} onChange={e=>setAdminName2(e.target.value)} placeholder="Admin name (e.g. Dr. Smith)" style={{background:"#f8fafc",border:"1px solid #e2e8f0",borderRadius:7,padding:"7px 10px",color:"#1e293b",fontSize:11,outline:"none",width:200,marginBottom:10}}/>
            <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:10}}>
              <input type="password" value={np2} onChange={e=>{setNp2(e.target.value);setMsg2("");}} placeholder="New password" style={{background:"#f8fafc",border:"1px solid #e2e8f0",borderRadius:7,padding:"8px 12px",color:"#1e293b",fontSize:12,outline:"none",width:180}}/>
              <input type="password" value={cp2} onChange={e=>{setCp2(e.target.value);setMsg2("");}} placeholder="Confirm" style={{background:"#f8fafc",border:"1px solid #e2e8f0",borderRadius:7,padding:"8px 12px",color:"#1e293b",fontSize:12,outline:"none",width:180}}/>
              <Btn onClick={()=>{if(!np2){setMsg2("Enter a password.");return;}if(np2!==cp2){setMsg2("Passwords don't match.");return;}setPwd2(np2);setNp2("");setCp2("");setMsg2("✓ Updated!");}} variant="primary" style={{padding:"8px 16px",fontSize:11}}>Update</Btn>
            </div>
            <div style={{fontSize:9,color:"#64748b",marginBottom:6}}>Admin PIN (3–4 digits) — alternative to password for quick unlock.</div>
            <div style={{display:"flex",gap:8,alignItems:"center"}}>
              <input type="tel" maxLength={4} value={adminPin2} onChange={e=>setAdminPin2(e.target.value.replace(/\D/g,""))} placeholder="PIN (optional)" style={{background:"#f8fafc",border:"1px solid #e2e8f0",borderRadius:7,padding:"7px 10px",color:"#1e293b",fontSize:13,outline:"none",width:100,letterSpacing:4}}/>
              {adminPin2&&<Btn onClick={()=>setAdminPin2("")} variant="danger" style={{fontSize:9}}>Clear</Btn>}

            </div>
            {msg2&&<div style={{marginTop:8,fontSize:10,color:msg2.startsWith("✓")?"#15803d":"#dc2626",fontWeight:600}}>{msg2}</div>}
            {pwd2&&<div style={{marginTop:8,fontSize:9,color:"#15803d"}}>✓ Password 2 set — logged as "{adminName2||"Admin 2"}".</div>}
          </div>
        </div>
      )}

      {adminTab==="data"&&(
        <div>
          <div style={{background:"#fff",border:"1px solid #e2e8f0",borderRadius:9,padding:16,marginBottom:12,boxShadow:"0 1px 3px rgba(0,0,0,0.06)"}}>
            <div style={{fontWeight:700,fontSize:12,color:"#475569",marginBottom:8,paddingBottom:8,borderBottom:"1px solid #f1f5f9"}}>📦 Archive Snapshot</div>
            <div style={{fontSize:9,color:"#94a3b8",marginBottom:12}}>Downloads a read-only HTML snapshot of all current schedule data.</div>
            <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
              <Btn onClick={doArchiveSnapshot} variant="primary" style={{fontSize:10}}>⬇ Download Snapshot</Btn>
              <Btn onClick={doExportJson} style={{fontSize:10,background:"#f0fdf4",border:"1px solid #86efac",color:"#15803d"}}>📦 Export All Data (JSON)</Btn>
            </div>
            <div style={{fontSize:8,color:"#94a3b8",marginTop:8}}>Use "Export All Data" to get a JSON file for migrating to the Google Sheet via seedScheduleData().</div>
            {archiveMsg&&<div style={{marginTop:8,fontSize:9,color:archiveMsg.startsWith("✓")?"#15803d":"#dc2626",fontWeight:600}}>{archiveMsg}</div>}
          </div>
          <div style={{background:"#fff",border:"2px solid #ef4444",borderRadius:9,padding:16,boxShadow:"0 1px 3px rgba(0,0,0,0.06)"}}>
            <div style={{fontWeight:700,fontSize:12,color:"#dc2626",marginBottom:8,paddingBottom:8,borderBottom:"1px solid #fee2e2"}}>🗑 Clear All Data</div>
            <div style={{fontSize:9,color:"#64748b",marginBottom:12}}>Clears all shift data, requests, messages and history. You will choose a new start date and fresh weeks will be generated with existing staff.</div>
            {clearConfirm1&&<ClearDataModal masterWeeks={masterWeeks} liveWeeks={liveWeeks} pwd={pwd_for_clear[0]} pwd2={pwd_for_clear[1]} onConfirm={sd=>{onClearAll(sd);setClearConfirm1(false);}} onClose={()=>setClearConfirm1(false)}/>}
            <Btn onClick={()=>setClearConfirm1(true)} variant="danger" style={{fontSize:10}}>🗑 Clear All Data...</Btn>
          </div>
        </div>
      )}

      {adminTab==="audit"&&<AuditPage auditLog={auditLog} masterWeeks={masterWeeks} masterArchived={masterArchived} deletedEmps={deletedEmps}/>}
      {adminTab==="backfill"&&<BackfillPage liveWeeks={liveWeeks} setLiveWeeks={setLiveWeeks} liveArchived={liveArchived} setLiveArchived={setLiveArchived} masterWeeks={masterWeeks} setMasterWeeks={setMasterWeeks} masterArchived={masterArchived} setMasterArchived={setMasterArchived} C={C}/>}
    </div>
  );

/* ══ PRINT MODAL ─────────────────────────────────────────────────── */
function PrintModal({weeks,isAdmin,onClose,customDayLabels}){
  const[printing,setPrinting]=useState(false);
  const pubWeeks=weeks.filter(w=>w.approved);
  const customLabel=customDayLabels?.[0]||"Custom";
  const doPrint=()=>{
    setPrinting(true);
    const html=`<!DOCTYPE html><html><head><meta charset="utf-8"><title>HPVH Live Schedule</title><style>*{box-sizing:border-box;}body{font-family:Arial,sans-serif;font-size:8px;margin:8px;background:#fff;}h2{font-size:11px;margin:0 0 6px;color:#1e293b;}h3{font-size:9px;margin:8px 0 3px;color:#475569;}table{border-collapse:collapse;width:100%;margin-bottom:6px;page-break-inside:avoid;}th,td{border:1px solid #d1d5db;padding:2px 4px;text-align:center;font-size:7px;vertical-align:middle;}th{background:#f1f5f9;font-weight:700;}.grp{background:#e2e8f0;text-align:left;font-weight:700;padding:3px 6px;}.name{text-align:left;font-weight:600;white-space:nowrap;}.vac{background:#fef3c7;color:#78350f;}.off{background:#d1d5db;color:#374151;}.closed{background:#9ca3af;color:#1f2937;}.sick{background:#fee2e2;color:#991b1b;}.swap{background:#ede9fe;color:#4c1d95;}.custom{background:#f0e6ff;color:#581c87;}@page{size:landscape;margin:0.7cm;}</style></head><body><h2>HPVH Live Schedule — Printed ${new Date().toLocaleDateString()}</h2>${pubWeeks.map(w=>{const allNames={};GROUPS.forEach(g=>{allNames[g]=[];const seen=new Set();(w.groups[g]||[]).forEach(e=>{if(!seen.has(e.name)){seen.add(e.name);allNames[g].push(e.name);}});});return`<h3>${w.label}</h3><table><tr><th class="name">Staff</th>${DAYS.map((d,i)=>`<th>${d}<br/><span style="font-weight:400;color:#6b7280">${w.dates?.[i]||""}</span></th>`).join("")}<th>Hrs</th></tr>${GROUPS.flatMap(g=>{const names=allNames[g];if(!names.length)return[];return[`<tr><td class="grp" colspan="${DAYS.length+2}">${g}</td></tr>`,...names.map(name=>{const emp=(w.groups[g]||[]).find(e=>e.name===name);if(!emp)return"";const tot=eTotal(emp);return`<tr><td class="name">${name}</td>${emp.shifts.map(s=>{if(!s)return"<td></td>";if(s.st==="VAC")return`<td class="vac">🌴VAC</td>`;if(s.st==="OFF")return`<td class="off">OFF</td>`;if(s.st==="CLOSED")return`<td class="closed">—</td>`;if(s.st==="SICK")return`<td class="sick">🤒SICK${s.sh?` ${s.sh}h`:""}</td>`;if(s.st==="CUSTOM")return`<td class="custom">⭐${s.customLabel||customLabel}</td>`;if(s.swapped)return`<td class="swap">↔${s.t}</td>`;return`<td>${s.t||""}</td>`;}).join("")}<td style="font-weight:700">${tot||""}</td></tr>`;})];}).join("")}</table>`;}).join("")}</body></html>`;
    try{
      const ifr=document.createElement("iframe");ifr.style.cssText="position:fixed;top:-9999px;left:-9999px;width:1400px;height:900px;border:none;";
      document.body.appendChild(ifr);ifr.contentDocument.open();ifr.contentDocument.write(html);ifr.contentDocument.close();
      setTimeout(()=>{try{ifr.contentWindow.focus();ifr.contentWindow.print();}catch(e){}setTimeout(()=>{if(document.body.contains(ifr))document.body.removeChild(ifr);setPrinting(false);},3000);},700);
    }catch(e){setPrinting(false);}
  };
  return(
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.5)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:9998}}>
      <div data-ov style={{background:"#fff",borderRadius:14,padding:24,width:300,boxShadow:"0 24px 64px rgba(0,0,0,0.2)"}}>
        <div style={{fontWeight:700,fontSize:14,color:"#1e293b",marginBottom:8}}>🖨 Print Live Schedule</div>
        <div style={{fontSize:9,color:"#94a3b8",marginBottom:16}}>Prints the current live published schedule only.</div>
        <div style={{display:"flex",gap:8}}><Btn onClick={doPrint} variant="primary" style={{flex:1,padding:"9px",fontSize:11}}>{printing?"Preparing…":"🖨 Print"}</Btn><Btn onClick={onClose} style={{padding:"9px 14px",fontSize:11}}>Close</Btn></div>
      </div>
    </div>
  );
}

/* ══ ROOT APP ════════════════════════════════════════════════════════ */
function App(){
  /* ── GAS session state ───────────────────────────────────────────── */
  const[gasToken,setGasToken]       = useState(null);   // Google ID token
  const[gasRole,setGasRole]         = useState(null);   // "admin"|"staff"|"viewer"
  const[gasLoading,setGasLoading]   = useState(false);  // initial data load
  const[gasError,setGasError]       = useState("");
  const[lastModTs,setLastModTs]     = useState(0);      // for polling
  const[syncing,setSyncing]         = useState(false);  // save-in-progress indicator

  /* ── Schedule state (same as v15) ───────────────────────────────── */
  const[liveWeeks,setLiveWeeks]           = useState([]);
  const[masterWeeks,setMasterWeeks]       = useState([]);
  const[liveArchived,setLiveArchived]     = useState([]);
  const[masterArchived,setMasterArchived] = useState([]);
  const[requests,setRequests]             = useState([]);
  const[messages,setMessages]             = useState([]);
  const[swapRequests,setSwapRequests]     = useState([]);
  const[auditLog,setAuditLog]             = useState([]);
  const[availability,setAvailability]     = useState(()=>new Set());
  const[lockedTOWeeks,setLockedTOWeeks]   = useState(()=>new Set());
  const[C,setC]                           = useState({...DEF});
  const[pwd,setPwd]                       = useState("hpvh2024");
  const[pwd2,setPwd2]                     = useState("");
  const[adminName1,setAdminName1]         = useState("Admin");
  const[adminName2,setAdminName2]         = useState("");
  const[adminPin1,setAdminPin1]           = useState("");
  const[adminPin2,setAdminPin2]           = useState("");
  const[staffPins,setStaffPins]           = useState([]);
  const[viewerPins,setViewerPins]         = useState([]);
  const[lockMs,setLockMs]                 = useState(DEFAULT_LOCK_MS);
  const[access,setAccess]                 = useState(null);
  const[isUnlocked,setIsUnlocked]         = useState(false);
  const[page,setPage]                     = useState("main");
  const[pwdModal,setPwdModal]             = useState(false);
  const[pwdInput,setPwdInput]             = useState("");const[pwdErr,setPwdErr]=useState(false);
  const[picker,setPicker]                 = useState(null);const[ctx,setCtx]=useState(null);
  const[ctxSick,setCtxSick]               = useState("0");const[ctxCustomLabel,setCtxCustomLabel]=useState("");
  const[printOpen,setPrintOpen]           = useState(false);
  const[staffPinModal,setStaffPinModal]   = useState(null);
  const[staffUnlocked,setStaffUnlocked]   = useState(()=>new Set());
  const[swapRequesterInfo,setSwapRequesterInfo] = useState(null);
  const[swapPinModal,setSwapPinModal]     = useState(false);
  const[swapModal,setSwapModal]           = useState(null);
  const[currentUser,setCurrentUser]       = useState(null);
  const[undoStack,setUndoStack]           = useState(null);
  const[deletedEmps,setDeletedEmps]       = useState([]);
  const[customDayLabels,setCustomDayLabels] = useState(["Custom"]);
  const staffTimers = useRef({});const lastAct = useRef(Date.now());

  /* ── Load schedule data from GAS response ────────────────────────── */
  function applySchedData(data) {
    if (!data) return;
    if (data.liveWeeks)     setLiveWeeks(data.liveWeeks);
    if (data.masterWeeks)   setMasterWeeks(data.masterWeeks);
    if (data.liveArchived)  setLiveArchived(data.liveArchived);
    if (data.masterArchived)setMasterArchived(data.masterArchived);
    if (data.requests)      setRequests(data.requests);
    if (data.messages)      setMessages(data.messages);
    if (data.swapRequests)  setSwapRequests(data.swapRequests);
    if (data.auditLog)      setAuditLog(data.auditLog);
    if (data.staffPins)     setStaffPins(data.staffPins);
    const s = data.settings || {};
    if (s.adminPwd)         setPwd(s.adminPwd);
    if (s.adminPwd2)        setPwd2(s.adminPwd2);
    if (s.adminName1)       setAdminName1(s.adminName1);
    if (s.adminName2)       setAdminName2(s.adminName2);
    if (s.adminPin1)        setAdminPin1(String(s.adminPin1||""));
    if (s.adminPin2)        setAdminPin2(String(s.adminPin2||""));
    if (s.lockMs)           setLockMs(Number(s.lockMs)||DEFAULT_LOCK_MS);
    if (s.customDayLabels)  setCustomDayLabels(Array.isArray(s.customDayLabels)?s.customDayLabels:["Custom"]);
    if (s.colours && Object.keys(s.colours).length>0) setC({...DEF,...s.colours});
  }

  /* ── Called by LandingLock after Google Sign-In + PIN success ─────── */
  const handleSignedIn = useCallback(async ({token,role,name,group,schedData})=>{
    setGasToken(token);
    setGasRole(role);
    setGasLoading(true);
    setGasError("");
    try {
      applySchedData(schedData);
      // Get current timestamp for polling baseline
      const modRes = await gasGetLastMod(token);
      setLastModTs(modRes.ts || 0);
      // Set up session
      const isAdmin = role==="admin";
      setAccess(role);
      if (isAdmin) { setIsUnlocked(true); lastAct.current=Date.now(); }
      setCurrentUser({name,group});
      // Log login to GAS audit (fire-and-forget)
      const entry={actor:name||"Unknown",description:`${role==="admin"?"Admin login":"Staff login"} via Google`,type:"login",ts:nowTs()};
      gasAddAudit(token,entry).catch(()=>{});
      setAuditLog(prev=>[...prev,{...entry,id:uid()}]);
    } catch(err) {
      setGasError("Could not load schedule data: "+err.message);
    } finally {
      setGasLoading(false);
    }
  },[]);

  /* ── GAS save helper — writes to Sheet and applies confirmed state back ─── */
  const saveToGas = useCallback(async (changes) => {
    if (!gasToken) return;
    setSyncing(true);
    try {
      const res = await gasSaveSchedule(gasToken, changes);
      // Only advance the timestamp — do NOT apply data back.
      // The Sheet write may not have flushed yet so reading back
      // risks returning stale/empty arrays that wipe local state.
      if (res?.ok && res?.data?.lastModified) {
        setLastModTs(res.data.lastModified);
      }
    } catch(err) {
      console.warn("GAS save failed:", err.message);
    } finally {
      setSyncing(false);
    }
  },[gasToken, applySchedData]);

  /* ── Polling — check for remote changes every 12 seconds ─────────── */
  // lastModTsRef lets the interval always read the latest value without
  // being in the dependency array — prevents the interval from tearing
  // down and rebuilding (and firing stale fetches) on every save.
  const lastModTsRef = useRef(0);
  useEffect(()=>{ lastModTsRef.current = lastModTs; }, [lastModTs]);

  useEffect(()=>{
    if (!gasToken || !access) return;
    const interval = setInterval(async ()=>{
      try {
        const res = await gasGetLastMod(gasToken);
        if (res.ts && res.ts > lastModTsRef.current) {
          setLastModTs(res.ts);
          const sched = await gasGetSchedule(gasToken);
          applySchedData(sched.data);
        }
      } catch(err) {
        // Polling failure is silent — app keeps working from memory
      }
    }, POLL_INTERVAL_MS);
    return ()=>clearInterval(interval);
  },[gasToken,access]);

  const addAudit=useCallback((actor,description,type="action",context="")=>{
    const entry={id:uid(),actor,description,type,context,ts:nowTs()};
    setAuditLog(prev=>[...prev,entry]);
    if(gasToken) gasAddAudit(gasToken,{actor,description,type,context,ts:nowTs()}).catch(()=>{});
  },[gasToken]);

  const pushUndo=useCallback(action=>setUndoStack(action),[]);
  const doUndo=()=>{
    if(!undoStack)return;
    if(undoStack.type==="delEmp"&&undoStack.snapshot){setMasterWeeks(undoStack.snapshot);saveToGas({masterWeeks:undoStack.snapshot});addAudit("Admin","Undo: restored deleted employee");}
    setUndoStack(null);
  };

  useEffect(()=>{
    const allNames=new Set();
    masterWeeks.forEach(w=>GROUPS.forEach(g=>(w.groups[g]||[]).forEach(e=>{if(e.name&&e.name.trim().length>2&&e.name!=="New Staff")allNames.add(`${e.name.trim()}||${g}`);})));
    setStaffPins(prev=>{
      const existing=new Set(prev.map(s=>`${s.name}||${s.group}`));
      const toAdd=[...allNames].filter(k=>!existing.has(k)).map(k=>{const[name,group]=k.split("||");return{name,group,pin:""};});
      const pruned=prev.filter(s=>allNames.has(`${s.name}||${s.group}`)||s.pin);
      return toAdd.length?[...pruned,...toAdd]:pruned;
    });
    setDeletedEmps(prev=>{
      const existingDelKeys=new Set(prev.map(d=>`${d.name}||${d.group}`));
      const newlyDeleted=staffPins.filter(s=>s.pin&&!allNames.has(`${s.name}||${s.group}`)&&!existingDelKeys.has(`${s.name}||${s.group}`)).map(s=>({name:s.name,group:s.group,deleted:true}));
      return newlyDeleted.length?[...prev,...newlyDeleted]:prev;
    });
  },[masterWeeks]);

  useEffect(()=>{
    if(!isUnlocked)return;
    const bump=()=>{lastAct.current=Date.now();};
    const check=setInterval(()=>{if(Date.now()-lastAct.current>lockMs){setIsUnlocked(false);if(["master","past-sched","stats","admin"].includes(page))setPage("main");}},15000);
    ["mousedown","keydown","touchstart"].forEach(e=>document.addEventListener(e,bump));
    return()=>{clearInterval(check);["mousedown","keydown","touchstart"].forEach(e=>document.removeEventListener(e,bump));};
  },[isUnlocked,page,lockMs]);

  useEffect(()=>{const h=e=>{if(!e.target.closest("[data-ov]")){setPicker(null);setCtx(null);}};document.addEventListener("mousedown",h);return()=>document.removeEventListener("mousedown",h);},[]);

  const onRequestStaffPin=(name,group)=>{const k=`${name}||${group}`;if(staffUnlocked.has(k))return;setStaffPinModal({name,group});};
  const grantStaffUnlock=(name,group)=>{
    const k=`${name}||${group}`;
    setStaffUnlocked(prev=>{const n=new Set(prev);n.add(k);return n;});
    if(staffTimers.current[k])clearTimeout(staffTimers.current[k]);
    staffTimers.current[k]=setTimeout(()=>setStaffUnlocked(prev=>{const n=new Set(prev);n.delete(k);return n;}),lockMs);
  };

  /* ── Live week mutations — save to GAS after every change ─────────── */
  const updLive=(wid,g,ei,si,patch)=>setLiveWeeks(prev=>{
    const next=prev.map(w=>{if(w.id!==wid)return w;return{...w,groups:{...w.groups,[g]:w.groups[g].map((emp,i)=>i!==ei?emp:{...emp,shifts:emp.shifts.map((s,j)=>j!==si?s:{...s,...patch})})}}; });
    saveToGas({liveWeeks:next});
    return next;
  });
  const appReqLive=(wid,g,ei,si)=>{const s=liveWeeks.find(w=>w.id===wid)?.groups[g]?.[ei]?.shifts[si];updLive(wid,g,ei,si,{reqSt:"APPROVED"});if(s?.reqId)setRequests(prev=>{const next=prev.map(r=>r.id===s.reqId?{...r,status:"APPROVED"}:r);saveToGas({requests:next});return next;});};
  const denyReqLive=(wid,g,ei,si)=>{const s=liveWeeks.find(w=>w.id===wid)?.groups[g]?.[ei]?.shifts[si];updLive(wid,g,ei,si,{t:"",h:0,st:null,reqSt:"DENIED",reqId:null});if(s?.reqId)setRequests(prev=>{const next=prev.map(r=>r.id===s.reqId?{...r,status:"DENIED"}:r);saveToGas({requests:next});return next;});};

  const ctxIsM=ctx?.isMaster;
  const ctxAct=action=>{
    if(!ctx)return;const{weekId:wid,group:g,empIdx:ei,shiftIdx:si}=ctx;
    const updFn=ctxIsM?(patch=>setMasterWeeks(prev=>{const next=prev.map(w=>{if(w.id!==wid)return w;return{...w,groups:{...w.groups,[g]:w.groups[g].map((emp,i)=>i!==ei?emp:{...emp,shifts:emp.shifts.map((s,j)=>j!==si?s:{...s,...patch})})}}; });saveToGas({masterWeeks:next});return next;})):(patch=>updLive(wid,g,ei,si,patch));
    if(["VAC","OFF","CLOSED"].includes(action))updFn({st:action,rc:null,customLabel:null});
    else if(action==="CUSTOM"){const lbl=ctxCustomLabel||customDayLabels[0]||"Custom";updFn({st:"CUSTOM",rc:null,customLabel:lbl,t:"",h:0});}
    else if(action==="SICK")updFn({st:"SICK",sh:parseFloat(ctxSick)||0});
    else if(Object.keys(TAG_CFG).includes(action)){const w2=ctxIsM?masterWeeks:liveWeeks;const curTg=w2.find(w=>w.id===wid)?.groups[g]?.[ei]?.shifts[si]?.tg||[];updFn({tg:curTg.includes(action)?curTg.filter(t=>t!==action):[...curTg,action]});}
    else if(action.startsWith("RC_")){const nr=action.slice(3);const w2=ctxIsM?masterWeeks:liveWeeks;const cur=w2.find(w=>w.id===wid)?.groups[g]?.[ei]?.shifts[si];updFn({rc:cur?.rc===nr?null:nr});}
    else if(action==="CLEAR")updFn({t:"",h:0,st:null,tg:[],sh:null,rc:null,reqId:null,reqSt:null,customLabel:null});
    setCtx(null);
  };

  const applyPreset=t=>{
    if(!picker)return;const{weekId:wid,group:g,empIdx:ei,shiftIdx:si,keepTags:kt,isMaster}=picker;
    const patch={t,h:toH(t),st:null,tg:kt||[],sh:null,customLabel:null};
    if(isMaster)setMasterWeeks(prev=>{const next=prev.map(w=>{if(w.id!==wid)return w;return{...w,groups:{...w.groups,[g]:w.groups[g].map((emp,i)=>i!==ei?emp:{...emp,shifts:emp.shifts.map((s,j)=>j!==si?s:{...s,...patch})})}}; });saveToGas({masterWeeks:next});return next;});
    else updLive(wid,g,ei,si,patch);
    setPicker(null);
  };

  const archiveWeek=wid=>{
    setLiveWeeks(prev=>{const w=prev.find(x=>x.id===wid);let nextArchived=liveArchived;if(w){nextArchived=liveArchived.some(x=>x.id===wid)?liveArchived:sortWeeks([...liveArchived,{...deepClone(w),approved:true}]);setLiveArchived(nextArchived);saveToGas({liveArchived:nextArchived});}const next=prev.filter(x=>x.id!==wid);saveToGas({liveWeeks:next});return next;});
    setMasterWeeks(prev=>{const next=prev.map(w=>w.id===wid?{...w,published:false}:w);saveToGas({masterWeeks:next});return next;});
  };
  const unarchiveWeek=wid=>{
    setLiveArchived(prev=>{
      const w=prev.find(x=>x.id===wid);
      if(w){const clone=deepClone(w);clone.approved=true;
        setLiveWeeks(lv=>{if(lv.some(x=>x.id===wid))return lv;if(datesOverlap(clone.dates,lv)){alert("Cannot restore: dates overlap.");return lv;}const next=sortWeeks([...lv,clone]);saveToGas({liveWeeks:next});return next;});
        setMasterWeeks(mv=>{const next=mv.some(x=>x.id===wid)?mv.map(m=>m.id===wid?{...m,published:true}:m):sortWeeks([...mv,{...deepClone(w),published:true}]);saveToGas({masterWeeks:next});return next;});
      }
      const next=prev.filter(x=>x.id!==wid);saveToGas({liveArchived:next});return next;
    });
  };

  const pickerPos=rect=>{const ph=300;const y=(window.innerHeight-rect.bottom)>ph?rect.bottom+4:Math.max(60,rect.top-ph-4);return{x:Math.min(rect.left,window.innerWidth-258),y};};
  const onTapLive=(wid,g,ei,si,di,rect)=>{const{x,y}=pickerPos(rect);const kt=liveWeeks.find(w=>w.id===wid)?.groups[g]?.[ei]?.shifts[si]?.tg||[];setPicker({weekId:wid,group:g,empIdx:ei,shiftIdx:si,dayIdx:di,x,y,keepTags:kt,isMaster:false});};
  const onLongLive=(wid,g,ei,si,x,y)=>{setCtx({weekId:wid,group:g,empIdx:ei,shiftIdx:si,x,y,isMaster:false});const s=liveWeeks.find(w=>w.id===wid)?.groups[g]?.[ei]?.shifts[si];setCtxSick(s?.h!=null?String(s.h):"0");setCtxCustomLabel(s?.customLabel||customDayLabels[0]||"Custom");};
  const onCtxLive=(wid,g,ei,si,x,y)=>onLongLive(wid,g,ei,si,x,y);
  const onSC=p=>setPicker(p);
  const onRC=p=>{setCtx(p);const s=masterWeeks.find(w=>w.id===p.weekId)?.groups[p.group]?.[p.empIdx]?.shifts[p.shiftIdx];setCtxSick(s?.h!=null?String(s.h):"0");setCtxCustomLabel(s?.customLabel||customDayLabels[0]||"Custom");};
  const ctxShift=(ctx?.isMaster?masterWeeks:liveWeeks)?.find(w=>w.id===ctx?.weekId)?.groups[ctx?.group]?.[ctx?.empIdx]?.shifts[ctx?.shiftIdx];
  const pendingCount=requests.filter(r=>r.status==="PENDING").length;
  const unreadMsgCount=messages.filter(m=>!m.read&&!m.isSwap).length;
  const pendingSwapCount=swapRequests.filter(s=>s.status==="PENDING").length;

  const onClearAll=(startDate)=>{
    const refWeek=liveWeeks.length?liveWeeks[liveWeeks.length-1]:(masterWeeks.length?masterWeeks[masterWeeks.length-1]:null);
    const staffByGroup={};
    GROUPS.forEach(g=>{staffByGroup[g]=(refWeek?.groups[g]||[]).map(e=>({name:e.name,group:g}));});
    const d=new Date(startDate);const dow=d.getDay()===0?6:d.getDay()-1;
    d.setDate(d.getDate()-dow);
    const MON2=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
    const buildWeek=(startMon)=>{
      const dates=Array(7).fill(0).map((_,i)=>{const dd=new Date(startMon);dd.setDate(dd.getDate()+i);return`${dd.getDate()}-${MON2[dd.getMonth()]}`;});
      const groups={};
      GROUPS.forEach(g=>{groups[g]=(staffByGroup[g]||[]).map(e=>({id:uid(),name:e.name,shifts:dates.map((_,i)=>i===6?mkCl():mk(""))}));});
      return{id:uid(),label:wkLabel(dates),dates,published:true,groups};
    };
    const newWeeks=[];let cur=new Date(d);
    for(let i=0;i<5;i++){newWeeks.push(buildWeek(cur));cur.setDate(cur.getDate()+7);}
    const emptyLive=newWeeks.map(w=>({...deepClone(w),approved:true}));
    setMasterWeeks(newWeeks);setLiveWeeks(emptyLive);
    setLiveArchived([]);setMasterArchived([]);
    setRequests([]);setMessages([]);setSwapRequests([]);setAuditLog([]);
    setAvailability(new Set());setLockedTOWeeks(new Set());
    setDeletedEmps([]);setUndoStack(null);setCurrentUser(null);
    setSwapRequesterInfo(null);setIsUnlocked(false);setPage("main");
    saveToGas({liveWeeks:emptyLive,masterWeeks:newWeeks,liveArchived:[],masterArchived:[],requests:[],messages:[],swapRequests:[],auditLog:[]});
  };

  const approveSwap=useCallback(sid=>{
    setSwapRequests(prev=>{
      const swap=prev.find(s=>s.id===sid);if(!swap)return prev;
      setLiveWeeks(lw=>{const next=lw.map(week=>{
        if(week.id!==swap.weekId)return week;
        const updated={...week,groups:{...week.groups}};
        GROUPS.forEach(g=>{updated.groups[g]=(updated.groups[g]||[]).map(emp=>{
          if(emp.name===swap.requesterName&&g===swap.requesterGroup){const sh=[...emp.shifts];sh[swap.shiftIdx]={...swap.targetShift,swapped:true,swapPending:false,swapFromGroup:swap.targetGroup};return{...emp,shifts:sh};}
          if(emp.name===swap.targetName&&g===swap.targetGroup){const sh=[...emp.shifts];sh[swap.shiftIdx]={...swap.requesterShift,swapped:true,swapPending:false,swapFromGroup:swap.requesterGroup};return{...emp,shifts:sh};}
          return emp;
        });});return updated;
      });saveToGas({liveWeeks:next});return next;});

        {page==="past-sched"&&isUnlocked&&<PastSchedules archived={liveArchived} onUnarchive={unarchiveWeek} isUnlocked={isUnlocked} C={C}/>}
        {page==="stats"&&isUnlocked&&<StatsAndRequestsPage requests={requests} weeks={liveWeeks} liveArchived={liveArchived} masterArchived={masterArchived} C={C}/>}
        {page==="admin"&&isUnlocked&&<AdminPage C={C} setC={c=>{setC(c);saveToGas({settings:{colours:c}});}} pwd={pwd} setPwd={p=>{setPwd(p);saveToGas({settings:{adminPwd:p}});}} pwd2={pwd2} setPwd2={p=>{setPwd2(p);saveToGas({settings:{adminPwd2:p}});}} adminName1={adminName1} setAdminName1={n=>{setAdminName1(n);saveToGas({settings:{adminName1:n}});}} adminName2={adminName2} setAdminName2={n=>{setAdminName2(n);saveToGas({settings:{adminName2:n}});}} adminPin1={adminPin1} setAdminPin1={p=>{setAdminPin1(p);saveToGas({settings:{adminPin1:p}});}} adminPin2={adminPin2} setAdminPin2={p=>{setAdminPin2(p);saveToGas({settings:{adminPin2:p}});}} staffPins={staffPins} setStaffPins={s=>{setStaffPins(s);saveToGas({staffPins:s});}} viewerPins={viewerPins} setViewerPins={setViewerPins} lockMs={lockMs} setLockMs={m=>{setLockMs(m);saveToGas({settings:{lockMs:String(m)}});}} auditLog={auditLog} liveWeeks={liveWeeks} masterWeeks={masterWeeks} liveArchived={liveArchived} masterArchived={masterArchived} requests={requests} messages={messages} swapRequests={swapRequests} onClearAll={onClearAll} pwd_for_clear={[pwd,pwd2]} deletedEmps={deletedEmps} customDayLabels={customDayLabels} setCustomDayLabels={l=>{setCustomDayLabels(l);saveToGas({settings:{customDayLabels:l}});}} setLiveWeeks={l=>{setLiveWeeks(l);saveToGas({liveWeeks:l});}} setLiveArchived={l=>{setLiveArchived(l);saveToGas({liveArchived:l});}} setMasterWeeks={m=>{setMasterWeeks(m);saveToGas({masterWeeks:m});}} setMasterArchived={m=>{setMasterArchived(m);saveToGas({masterArchived:m});}}/>}
        {LOCKED.map(t=>t.id).includes(page)&&!isUnlocked&&<div style={{textAlign:"center",marginTop:100}}><div style={{fontSize:48,opacity:0.15,marginBottom:16}}>🔐</div><div style={{fontWeight:700,fontSize:16,color:"#94a3b8",marginBottom:12}}>Admin unlock required</div><Btn onClick={openPwd} style={{fontSize:11,border:"1px solid #f59e0b",color:"#b45309",background:"#fef3c7"}}>🔒 Unlock Now</Btn></div>}
      </div>

      <div style={{position:"fixed",bottom:0,left:0,right:0,height:24,background:NAV,display:"flex",alignItems:"center",padding:"0 16px",boxShadow:"0 -1px 4px rgba(0,0,0,0.1)"}}>
        <span style={{fontSize:7,color:"#475569"}}>HPVH v16 · {isUnlocked?`🔓 ADMIN – auto-locks ${LOCK_OPTIONS.find(o=>o.ms===lockMs)?.label||"5min"}`:"🔒 View mode"}</span>
        <span style={{marginLeft:"auto",fontSize:7,color:"#475569"}}>{liveArchived.length} archived · {liveWeeks.length} live · {pendingCount} pending · {unreadMsgCount+pendingSwapCount} inbox</span>
      </div>
    </div>
  );
}

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(React.createElement(App));
    document.getElementById('loading-screen').style.display = 'none';
  </script>

</body>
</html>
