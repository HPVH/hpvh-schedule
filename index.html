/* ── LOCALSTORAGE HELPER ─────────────────────────────────────── */
// ── GAS API helpers ──────────────────────────────────────────────────
async function gasGet(action) {
  const r = await fetch(`${GAS_URL}?action=${action}`, { method:"GET" });
  return r.json();
}
async function gasPost(body) {
  const r = await fetch(GAS_URL, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(body)
  });
  return r.json();
}

function App(){
  // ── GAS sync state ─────────────────────────────────────────────
  const [gasReady, setGasReady] = useState(false);
  const [gasError, setGasError] = useState(null);
  const saveTimer = useRef(null);

  // ── Persisted state (loaded from GAS on mount) ─────────────────
  const [liveWeeks,setLiveWeeks]=useState([]);
  const [masterWeeks,setMasterWeeks]=useState([]);
  const [masterBackfill,setMasterBackfill]=useState([]);
  const [liveArchived,setLiveArchived]=useState([]);
  const [masterArchived,setMasterArchived]=useState([]);
  const [requests,setRequests]=useState([]);
  const [messages,setMessages]=useState([]);
  const [swapRequests,setSwapRequests]=useState([]);
  const [auditLog,setAuditLog]=useState([]);
  const [lockedTOWeeks,setLockedTOWeeks]=useState(()=>new Set());
  const [C,setC]=useState({...DEF_COLORS});
  const [pwd,setPwd]=useState("hpvh2024");
  const [pwd2,setPwd2]=useState("");
  const [adminName1,setAdminName1]=useState("Admin");
  const [adminName2,setAdminName2]=useState("");
  // NOTE: adminPin1, adminPin2, staffPins, viewerPins all live server-side.
  // The frontend holds a local copy for display in Admin page ONLY — never used
  // for validation. All PIN checks go through GAS verifyPin / verifyAnyPin.
  const [adminPin1,setAdminPin1]=useState("");
  const [adminPin2,setAdminPin2]=useState("");
  const [staffPins,setStaffPins]=useState([]);
  const [viewerPins,setViewerPins]=useState([]);
  const [lockMs,setLockMs]=useState(DEFAULT_LOCK_MS);
  const [deletedEmps,setDeletedEmps]=useState([]);
  const [customDayLabels,setCustomDayLabels]=useState(["Custom"]);
  const [cellTypeStyles,setCellTypeStyles]=useState({});
  const [customCellTypes,setCustomCellTypes]=useState([]);

  // ── Load from GAS on mount ──────────────────────────────────────
  useEffect(()=>{
    gasGet("load").then(res=>{
      if(!res.ok){ setGasError("Could not load data from server: "+res.error); return; }
      const d=res.data||{};
      if(d.liveWeeks)       setLiveWeeks(d.liveWeeks);
      if(d.masterWeeks)     setMasterWeeks(d.masterWeeks);
      if(d.masterBackfill)  setMasterBackfill(d.masterBackfill);
      if(d.liveArchived)    setLiveArchived(d.liveArchived);
      if(d.masterArchived)  setMasterArchived(d.masterArchived);
      if(d.requests)        setRequests(d.requests);
      if(d.messages)        setMessages(d.messages);
      if(d.swapRequests)    setSwapRequests(d.swapRequests);
      if(d.auditLog)        setAuditLog(d.auditLog);
      if(d.lockedTOWeeks)   setLockedTOWeeks(new Set(d.lockedTOWeeks));
      if(d.C)               setC(d.C);
      if(d.adminName1)      setAdminName1(d.adminName1);
      if(d.adminName2)      setAdminName2(d.adminName2);
      if(d.lockMs)          setLockMs(d.lockMs);
      if(d.deletedEmps)     setDeletedEmps(d.deletedEmps);
      if(d.customDayLabels) setCustomDayLabels(d.customDayLabels);
      if(d.cellTypeStyles)  setCellTypeStyles(d.cellTypeStyles);
      if(d.customCellTypes) setCustomCellTypes(d.customCellTypes);
      setGasReady(true);
    }).catch(e=>setGasError("Network error: "+e.message));
  },[]);

  // ── Load pins separately (admin session only) ───────────────────
  const loadPinsFromGas = useCallback(async (adminPwd) => {
    const res = await gasPost({ action:"getPins", adminPwd });
    if(res.ok) setStaffPins(res.data);
    return res;
  },[]);

  // ── Save to GAS (debounced 1.5s so rapid state changes batch) ──
  const gasData = useMemo(()=>({
    liveWeeks,masterWeeks,masterBackfill,liveArchived,masterArchived,
    requests,messages,swapRequests,auditLog,
    lockedTOWeeks:[...lockedTOWeeks],
    C,adminName1,adminName2,lockMs,deletedEmps,customDayLabels,
    cellTypeStyles,customCellTypes
  }),[liveWeeks,masterWeeks,masterBackfill,liveArchived,masterArchived,
      requests,messages,swapRequests,auditLog,lockedTOWeeks,
      C,adminName1,adminName2,lockMs,deletedEmps,customDayLabels,
      cellTypeStyles,customCellTypes]);

  useEffect(()=>{
    if(!gasReady) return;
    if(saveTimer.current) clearTimeout(saveTimer.current);
    saveTimer.current = setTimeout(()=>{
      gasPost({ action:"save", data:gasData })
        .catch(e=>console.warn("GAS save failed:",e.message));
    }, 1500);
  },[gasData, gasReady]);

  // ── PIN validation via GAS (never client-side) ─────────────────
  // Returns Promise<{match,name,group}>
  const gasVerifyPin = useCallback(async (name, group, pin) => {
    const res = await gasPost({ action:"verifyPin", name, group, pin });
    return res.ok ? res.data : { match: false };
  },[]);

  // Verify any staff pin (for send-message flow)
  const gasVerifyAnyPin = useCallback(async (pin) => {
    const res = await gasPost({ action:"verifyAnyPin", pin });
    return res.ok ? res.data : { match: false };
  },[]);

  // Verify admin password via GAS
  const gasVerifyAdmin = useCallback(async (p) => {
    const res = await gasPost({ action:"verifyAdmin", pwd:p });
    return res.ok ? res.data : { match: false };
  },[]);
  // ── Non-persisted session state ────────────────────────────────
  const [access,setAccess]=useState(null);
  const [isAdmin,setIsAdmin]=useState(false);
  const [page,setPage]=useState("schedule");
  const [picker,setPicker]=useState(null);
  const [ctx,setCtx]=useState(null);
  const [printOpen,setPrintOpen]=useState(false);
  const [staffPinModal,setStaffPinModal]=useState(null);
  const [staffUnlocked,setStaffUnlocked]=useState(()=>new Set());
  const [swapRequesterInfo,setSwapRequesterInfo]=useState(null);
  const [swapPinModal,setSwapPinModal]=useState(false);
  const [swapModal,setSwapModal]=useState(null);
  const [currentUser,setCurrentUser]=useState(null);
  const [undoStack,setUndoStack]=useState(null);
  const staffTimers=useRef({});
  const lastAct=useRef(Date.now());

  // ── GAS-backed: no local saveLS effect needed (handled above) ──

  // ── Computed ────────────────────────────────────────────────────
  const pendingCount=requests.filter(r=>r.status==="PENDING").length;
  const unreadMsgCount=messages.filter(m=>!m.read&&!m.isSwap).length;
  const pendingSwapCount=swapRequests.filter(s=>s.status==="PENDING").length;

  // ── Audit ───────────────────────────────────────────────────────
  const addAudit=useCallback((actor,description,type="action",context="")=>{
    setAuditLog(prev=>[...prev,{id:uid(),actor,description,type,context,ts:nowTs()}]);
  },[]);

  // ── Auto-load pins when admin opens admin page ─────────────────
  useEffect(()=>{
    if(isAdmin&&page==="admin"&&gasReady&&pwd){
      loadPinsFromGas(pwd);
    }
  },[isAdmin,page,gasReady]);
  useEffect(()=>{
    const allNames=new Set();
    masterWeeks.forEach(w=>GROUPS.forEach(g=>(w.groups[g]||[]).forEach(e=>{if(e.name&&e.name.trim().length>2&&e.name!=="New Staff")allNames.add(`${e.name.trim()}||${g}`);})));
    setStaffPins(prev=>{
      const existing=new Set(prev.map(s=>`${s.name}||${s.group}`));
      const toAdd=[...allNames].filter(k=>!existing.has(k)).map(k=>{const [name,group]=k.split("||");return{name,group,pin:""};});
      const pruned=prev.filter(s=>allNames.has(`${s.name}||${s.group}`)||s.pin);
      return toAdd.length?[...pruned,...toAdd]:pruned;
    });
    setDeletedEmps(prev=>{
      const existingDelKeys=new Set(prev.map(d=>`${d.name}||${d.group}`));
      const newlyDeleted=staffPins.filter(s=>s.pin&&!allNames.has(`${s.name}||${s.group}`)&&!existingDelKeys.has(`${s.name}||${s.group}`)).map(s=>({name:s.name,group:s.group,deleted:true}));
      return newlyDeleted.length?[...prev,...newlyDeleted]:prev;
    });
  },[masterWeeks]);

  // ── Auto-lock ───────────────────────────────────────────────────
  useEffect(()=>{
    if(!isAdmin&&!access)return;
    const bump=()=>{lastAct.current=Date.now();};
    const check=setInterval(()=>{
      if(Date.now()-lastAct.current>lockMs){
        if(isAdmin){setIsAdmin(false);if(["master","past-sched","stats","admin"].includes(page))setPage("schedule");}
        else if(access){setAccess(null);setCurrentUser(null);setStaffUnlocked(new Set());}
      }
    },15000);
    ["mousedown","keydown","touchstart"].forEach(e=>document.addEventListener(e,bump));
    return()=>{clearInterval(check);["mousedown","keydown","touchstart"].forEach(e=>document.removeEventListener(e,bump));};
  },[isAdmin,access,page,lockMs]);

  // ── Close overlays on outside click ────────────────────────────
  useEffect(()=>{
    const h=e=>{if(!e.target.closest("[data-ov]")){setPicker(null);setCtx(null);}};
    document.addEventListener("mousedown",h);
    return()=>document.removeEventListener("mousedown",h);
  },[]);

  // ── Access handler ──────────────────────────────────────────────
  const handleAccess=acc=>{
    setAccess(acc);
    if(acc.type==="admin"){setIsAdmin(true);setCurrentUser({name:acc.name});}
    else{setIsAdmin(false);setCurrentUser({name:acc.name,group:acc.group});}
    addAudit(acc.name,"Logged in","login");
    lastAct.current=Date.now();
  };

  const lockAll=()=>{setAccess(null);setIsAdmin(false);setCurrentUser(null);setStaffUnlocked(new Set());setSwapRequesterInfo(null);if(["master","past-sched","stats","admin"].includes(page))setPage("schedule");};
  const lockAdmin=()=>{setIsAdmin(false);if(["master","past-sched","stats","admin"].includes(page))setPage("schedule");};

  // ── Admin password modal ────────────────────────────────────────
  const [pwdModal,setPwdModal]=useState(false);
  const [pwdInput,setPwdInput]=useState("");
  const [pwdErr,setPwdErr]=useState(false);
  const openAdminPwd=()=>{setPwdModal(true);setPwdInput("");setPwdErr(false);};
  const tryAdminPwd=()=>{
    if(pwdInput===pwd||pwdInput===pwd2){setIsAdmin(true);setCurrentUser(u=>u||{name:"Admin"});setPwdModal(false);addAudit("Admin","Admin unlocked","login");}
    else{setPwdErr(true);setTimeout(()=>setPwdErr(false),1400);}
  };

  // ── Staff PIN unlock ────────────────────────────────────────────
  const onRequestStaffPin=(name,group)=>{
    const k=`${name}||${group}`;
    if(staffUnlocked.has(k))return;
    // If it's the current user, just unlock
    if(currentUser&&currentUser.name===name&&currentUser.group===group){grantStaffUnlock(name,group);return;}
    setStaffPinModal({name,group});
  };
  const grantStaffUnlock=(name,group)=>{
    const k=`${name}||${group}`;
    setStaffUnlocked(prev=>{const n=new Set(prev);n.add(k);return n;});
    if(staffTimers.current[k])clearTimeout(staffTimers.current[k]);
    staffTimers.current[k]=setTimeout(()=>setStaffUnlocked(prev=>{const n=new Set(prev);n.delete(k);return n;}),lockMs);
  };

  // ── Live schedule updater ───────────────────────────────────────
  const updLive=(wid,g,ei,si,patch)=>setLiveWeeks(prev=>prev.map(w=>{if(w.id!==wid)return w;return{...w,groups:{...w.groups,[g]:w.groups[g].map((emp,i)=>i!==ei?emp:{...emp,shifts:emp.shifts.map((s,j)=>j!==si?s:{...s,...patch})})}};}));
  const updLiveNote=(wid,note)=>setLiveWeeks(prev=>prev.map(w=>w.id===wid?{...w,note}:w));
  const approveReqLive=(wid,g,ei,si)=>{const s=liveWeeks.find(w=>w.id===wid)?.groups[g]?.[ei]?.shifts[si];updLive(wid,g,ei,si,{reqSt:"APPROVED"});if(s?.reqId)setRequests(prev=>prev.map(r=>r.id===s.reqId?{...r,status:"APPROVED"}:r));};
  const denyReqLive=(wid,g,ei,si)=>{const s=liveWeeks.find(w=>w.id===wid)?.groups[g]?.[ei]?.shifts[si];updLive(wid,g,ei,si,{t:"",h:0,st:null,reqSt:"DENIED",reqId:null});if(s?.reqId)setRequests(prev=>prev.map(r=>r.id===s.reqId?{...r,status:"DENIED"}:r));};

  // ── Picker & context menu ───────────────────────────────────────
  const calcPickerPos=rect=>{const ph=300;const y=(window.innerHeight-rect.bottom)>ph?rect.bottom+4:Math.max(60,rect.top-ph-4);return{x:Math.min(rect.left,window.innerWidth-240),y};};

  const onTapLive=info=>{const r=info.rect;setPicker({...info,pos:calcPickerPos(r)});setCtx(null);};
  const onLongLive=info=>{setCtx({...info,pos:{x:Math.min(info.x,window.innerWidth-230),y:Math.min(info.y,window.innerHeight-420)}});setPicker(null);};
  const onCtxLive=info=>{setCtx({...info,pos:{x:Math.min(info.x,window.innerWidth-230),y:Math.min(info.y,window.innerHeight-420)}});setPicker(null);};

  const applyPreset=(t,clear)=>{
    if(!picker)return;
    const{weekId:wid,group:g,empIdx:ei,shiftIdx:si,keepTags:kt=[],isMaster,isBackfill}=picker;
    const setFn=isBackfill?setMasterBackfill:isMaster?setMasterWeeks:null;
    const applyToWeeks=patch=>setFn(prev=>(prev||[]).map(w=>{if(w.id!==wid)return w;return{...w,groups:{...w.groups,[g]:w.groups[g].map((emp,i)=>i!==ei?emp:{...emp,shifts:emp.shifts.map((s,j)=>j!==si?s:{...s,...patch})})}};}));
    if(clear){
      const patch={t:"",h:0,st:null,tg:[],sh:null,rc:null,reqId:null,reqSt:null,customLabel:null};
      setFn?applyToWeeks(patch):updLive(wid,g,ei,si,patch);
    } else {
      const patch={t,h:toHours(t),st:null,tg:kt,sh:null,customLabel:null};
      setFn?applyToWeeks(patch):updLive(wid,g,ei,si,patch);
    }
    setPicker(null);
  };

  const ctxAction=(action,arg1,arg2)=>{
    if(!ctx)return;
    const{weekId:wid,group:g,empIdx:ei,shiftIdx:si,isMaster,isBackfill}=ctx;
    const setFn=isBackfill?setMasterBackfill:isMaster?setMasterWeeks:null;
    const updFn=patch=>{
      if(setFn)setFn(prev=>(prev||[]).map(w=>{if(w.id!==wid)return w;return{...w,groups:{...w.groups,[g]:w.groups[g].map((emp,i)=>i!==ei?emp:{...emp,shifts:emp.shifts.map((s,j)=>j!==si?s:{...s,...patch})})}};}));
      else updLive(wid,g,ei,si,patch);
    };
    const sourcePool=isBackfill?(masterBackfill||[]):isMaster?masterWeeks:liveWeeks;
    const curS=sourcePool.find(w=>w.id===wid)?.groups[g]?.[ei]?.shifts[si];
    if(["VAC","OFF","CLOSED"].includes(action))updFn({st:action,rc:null,customLabel:null});
    else if(action==="CUSTOM")updFn({st:"CUSTOM",rc:null,customLabel:arg1||customDayLabels[0]||"Custom",t:"",h:0});
    else if(action==="SICK")updFn({st:"SICK",sh:parseFloat(arg2)||0});
    else if(action==="TAG"){const curTg=curS?.tg||[];updFn({tg:curTg.includes(arg1)?curTg.filter(t=>t!==arg1):[...curTg,arg1]});}
    else if(action==="RC"){updFn({rc:curS?.rc===arg1?null:arg1});}
    else if(action==="CLEAR")updFn({t:"",h:0,st:null,tg:[],sh:null,rc:null,reqId:null,reqSt:null,customLabel:null});
    setCtx(null);
  };

  // ── Archive / Unarchive ─────────────────────────────────────────
  const archiveWeek=wid=>{
    setLiveWeeks(prev=>{const w=prev.find(x=>x.id===wid);if(w)setLiveArchived(a=>sortWeeks([...a.filter(x=>x.id!==wid),{...deepClone(w),approved:true}]));return prev.filter(x=>x.id!==wid);});
    setMasterWeeks(prev=>prev.map(w=>w.id===wid?{...w,published:false}:w));
    addAudit("Admin","Archived week");
  };
  // v3: archive a past-schedule week into Master Archive (keeps it in Past Schedules too)
  const archivePastToMaster=wid=>{
    const w=liveArchived.find(x=>x.id===wid);
    if(!w){alert("Week not found in Past Schedules.");return;}
    if(masterArchived.some(x=>x.id===wid)){alert("This week is already in Master Archive.");return;}
    setMasterArchived(prev=>sortWeeks([...prev,deepClone(w)]));
    addAudit("Admin",`Archived past schedule ${w.label} → Master Archive`);
  };

  const unarchiveWeek=wid=>{
    setLiveArchived(prev=>{
      const w=prev.find(x=>x.id===wid);
      if(w){const clone=deepClone(w);clone.approved=true;
        setLiveWeeks(lv=>{if(lv.some(x=>x.id===wid))return lv;if(datesOverlap(clone.dates,lv)){alert("Cannot restore: dates overlap with live schedule.");return lv;}return sortWeeks([...lv,clone]);});
        setMasterWeeks(mv=>{if(mv.some(x=>x.id===wid))return mv.map(m=>m.id===wid?{...m,published:true}:m);return sortWeeks([...mv,{...deepClone(w),published:true}]);});
      }
      return prev.filter(x=>x.id!==wid);
    });
  };

  // ── Swap requests ───────────────────────────────────────────────
  const submitSwap=({weekId,shiftIdx,targetName,targetGroup,note,date})=>{
    const week=liveWeeks.find(w=>w.id===weekId);if(!week)return;
    const rEmpIdx=week.groups[swapRequesterInfo.group]?.findIndex(e=>e.name===swapRequesterInfo.name);
    const tEmpIdx=week.groups[targetGroup]?.findIndex(e=>e.name===targetName);
    if(rEmpIdx<0||tEmpIdx<0)return;
    const rShift=week.groups[swapRequesterInfo.group]?.[rEmpIdx]?.shifts[shiftIdx];
    const tShift=week.groups[targetGroup]?.[tEmpIdx]?.shifts[shiftIdx];
    const sr={id:uid(),weekId,shiftIdx,requesterName:swapRequesterInfo.name,requesterGroup:swapRequesterInfo.group,requesterShift:rShift,targetName,targetGroup,targetShift:tShift,note,date,status:"PENDING",ts:nowTs()};
    setSwapRequests(prev=>[...prev,sr]);
    updLive(weekId,swapRequesterInfo.group,rEmpIdx,shiftIdx,{swapPending:true});
    updLive(weekId,targetGroup,tEmpIdx,shiftIdx,{swapPending:true});
    setMessages(prev=>[...prev,{id:uid(),from:"System",body:`🔄 Swap request: ${swapRequesterInfo.name} (${swapRequesterInfo.group}) ⇄ ${targetName} (${targetGroup}) on ${date}${note?` — "${note}"`:""}`,ts:nowTs(),read:false,isSwap:true,swapId:sr.id}]);
    addAudit(swapRequesterInfo.name,`Requested swap with ${targetName} on ${date}`);
    setSwapRequesterInfo(null);
  };

  const approveSwap=id=>{
    const sr=swapRequests.find(s=>s.id===id);
    if(!sr){alert("Swap request not found.");return;}
    if(sr.status!=="PENDING"){alert(`This swap is already ${sr.status.toLowerCase()}.`);return;}
    const week=liveWeeks.find(w=>w.id===sr.weekId);
    if(!week){alert("The week for this swap is no longer in the live schedule (it may have been archived). The swap can't be approved automatically.");return;}
    const rEmpIdx=week.groups[sr.requesterGroup]?.findIndex(e=>e.name===sr.requesterName);
    const tEmpIdx=week.groups[sr.targetGroup]?.findIndex(e=>e.name===sr.targetName);
    if(rEmpIdx<0||tEmpIdx<0){alert("One or both employees are no longer in this week's schedule.");return;}
    setSwapRequests(prev=>prev.map(s=>s.id===id?{...s,status:"APPROVED"}:s));
    setLiveWeeks(prev=>prev.map(w=>{
      if(w.id!==sr.weekId)return w;
      const ng=deepClone(w.groups);
      const rS=ng[sr.requesterGroup][rEmpIdx].shifts[sr.shiftIdx];
      const tS=ng[sr.targetGroup][tEmpIdx].shifts[sr.shiftIdx];
      // v2: when swapping, the COVERING person's shift carries their original role color (swapFromGroup)
      // so a CCR taking a VA's shift shows in CCR colors on the VA's row, and vice versa
      const rNew={...tS,swapped:true,swapPending:false,swapFromGroup:sr.targetGroup};
      const tNew={...rS,swapped:true,swapPending:false,swapFromGroup:sr.requesterGroup};
      ng[sr.requesterGroup][rEmpIdx].shifts[sr.shiftIdx]=rNew;
      ng[sr.targetGroup][tEmpIdx].shifts[sr.shiftIdx]=tNew;
      return{...w,groups:ng};
    }));
    // v2: mark related System message read so it stops nagging the inbox count
    setMessages(prev=>prev.map(m=>m.swapId===id?{...m,read:true}:m));
    addAudit("Admin",`Approved swap: ${sr.requesterName} ⇄ ${sr.targetName} on ${sr.date}`);
  };

  const denySwap=id=>{
    const sr=swapRequests.find(s=>s.id===id);
    if(!sr){alert("Swap request not found.");return;}
    if(sr.status!=="PENDING"){alert(`This swap is already ${sr.status.toLowerCase()}.`);return;}
    const week=liveWeeks.find(w=>w.id===sr.weekId);
    setSwapRequests(prev=>prev.map(s=>s.id===id?{...s,status:"DENIED"}:s));
    // Try to clear swapPending flags if the week still exists in live
    if(week){
      const rEmpIdx=week.groups[sr.requesterGroup]?.findIndex(e=>e.name===sr.requesterName);
      const tEmpIdx=week.groups[sr.targetGroup]?.findIndex(e=>e.name===sr.targetName);
      if(rEmpIdx>=0)updLive(sr.weekId,sr.requesterGroup,rEmpIdx,sr.shiftIdx,{swapPending:false});
      if(tEmpIdx>=0)updLive(sr.weekId,sr.targetGroup,tEmpIdx,sr.shiftIdx,{swapPending:false});
    }
    setMessages(prev=>prev.map(m=>m.swapId===id?{...m,read:true}:m));
    addAudit("Admin",`Denied swap: ${sr.requesterName} ⇄ ${sr.targetName}`);
  };

  // ── Undo ────────────────────────────────────────────────────────
  const pushUndo=useCallback(action=>setUndoStack(action),[]);
  const doUndo=()=>{
    if(!undoStack)return;
    if(undoStack.type==="delEmp"&&undoStack.snapshot)setMasterWeeks(undoStack.snapshot);
    setUndoStack(null);
  };

  // ── Clear all data ──────────────────────────────────────────────
  const onClearAll=({startDate,lastPublished})=>{
    const d=startDate;
    const dow=d.getDay()===0?6:d.getDay()-1;
    const monday=new Date(d.getTime()-dow*86400000);
    const seed=lastPublished;
    const newWeeks=[];
    for(let w=0;w<5;w++){
      const dates=Array(7).fill(0).map((_,i)=>{const dd=new Date(monday.getTime()+(w*7+i)*86400000);return`${dd.getDate()}-${MON[dd.getMonth()]}`;});
      const groups={};
      GROUPS.forEach(g=>{groups[g]=(seed?.groups[g]||[]).map(e=>({...e,id:uid(),shifts:dates.map((_,i)=>i===6?mkClosed():mkShift(""))}));});
      newWeeks.push({id:uid(),label:wkLabel(dates),dates,published:false,groups});
    }
    setLiveWeeks([]);setMasterWeeks(sortWeeks(newWeeks));setLiveArchived([]);setMasterArchived([]);
    setMasterBackfill([]);
    setRequests([]);setMessages([]);setSwapRequests([]);setAuditLog([]);
    setAccess(null);setIsAdmin(false);setCurrentUser(null);setSwapRequesterInfo(null);setUndoStack(null);
    setPage("schedule");
    try{gasPost({action:"save",data:{}}).catch(()=>{});}catch{}
  };

  // ── Get current shift for context menu ─────────────────────────
  const ctxShift=useMemo(()=>{
    if(!ctx)return null;
    const{weekId,group,empIdx,shiftIdx,isMaster,isBackfill}=ctx;
    const weeks=isBackfill?(masterBackfill||[]):isMaster?masterWeeks:liveWeeks;
    return weeks.find(w=>w.id===weekId)?.groups[group]?.[empIdx]?.shifts[shiftIdx]||null;
  },[ctx,masterWeeks,liveWeeks,masterBackfill]);

  // ── Nav visible tabs ────────────────────────────────────────────
  const VISIBLE_TABS=[
    {id:"schedule",l:"SCHEDULE"},
    {id:"timeoff",l:"TIME OFF"},
    {id:"messages",l:"Messages"},
  ];
  const ADMIN_TABS=[
    {id:"master",l:"⚙ MASTER"},
    {id:"past-sched",l:"Past Schedules"},
    {id:"stats",l:"STATS & REQUESTS"},
    {id:"admin",l:"ADMIN"},
  ];

  // ── VAC/SICK status count from live weeks ───────────────────────
  const vacCount=liveWeeks.reduce((a,w)=>a+GROUPS.reduce((b,g)=>b+(w.groups[g]||[]).reduce((c,e)=>c+(e.shifts.some(s=>s.st==="VAC")?1:0),0),0),0);
  const sickCount=liveWeeks.reduce((a,w)=>a+GROUPS.reduce((b,g)=>b+(w.groups[g]||[]).reduce((c,e)=>c+(e.shifts.some(s=>s.st==="SICK")?1:0),0),0),0);

  // ── GAS loading / error screens ────────────────────────────────
  if(gasError){
    return(
      <div style={{position:"fixed",inset:0,background:"#0f172a",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",color:"#f8fafc",fontFamily:"system-ui,sans-serif"}}>
        <div style={{fontSize:32,marginBottom:16}}>⚠️</div>
        <div style={{fontWeight:700,fontSize:14,marginBottom:8}}>Could not connect to server</div>
        <div style={{fontSize:10,color:"#94a3b8",maxWidth:320,textAlign:"center",marginBottom:24}}>{gasError}</div>
        <div style={{fontSize:9,color:"#475569",maxWidth:320,textAlign:"center",marginBottom:16}}>Check that your GAS_URL is correct and the deployment is live. Then reload.</div>
        <button onClick={()=>window.location.reload()} style={{padding:"10px 24px",borderRadius:8,background:"#3b82f6",color:"#fff",border:"none",fontSize:11,cursor:"pointer",fontWeight:600}}>Reload</button>
      </div>
    );
  }
  if(!gasReady){
    return(
      <div style={{position:"fixed",inset:0,background:"#0f172a",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",color:"#f8fafc",fontFamily:"system-ui,sans-serif"}}>
        <div style={{width:64,height:64,borderRadius:18,background:"linear-gradient(135deg,#3b82f6,#06b6d4)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:32,marginBottom:24,boxShadow:"0 8px 32px rgba(59,130,246,0.4)"}}>🐾</div>
        <div style={{fontWeight:700,fontSize:14,marginBottom:8}}>HPVH Schedule</div>
        <div style={{fontSize:10,color:"#64748b",marginBottom:24}}>Connecting to server…</div>
        <div style={{width:120,height:3,background:"#1e293b",borderRadius:2,overflow:"hidden"}}>
          <div style={{width:"40%",height:"100%",background:"#3b82f6",borderRadius:2,animation:"slide 1.2s ease-in-out infinite"}}/>
        </div>
        <style>{`@keyframes slide{0%{transform:translateX(-100%)}100%{transform:translateX(350%)}}`}</style>
      </div>
    );
  }

  // ── Lock screen ─────────────────────────────────────────────────
  if(!access&&!isAdmin){
    return <LandingLock adminName1={adminName1} adminName2={adminName2} onAccess={handleAccess} gasVerifyAdmin={gasVerifyAdmin} gasVerifyAnyPin={gasVerifyAnyPin}/>;
  }

  return(
    <div style={{background:PAGE_BG,minHeight:"100vh",fontFamily:"system-ui,-apple-system,sans-serif"}}>
      <style>{SCROLLBAR_CSS}</style>

      {/* ── NAVBAR ───────────────────────────────────────────────── */}
      <div style={{position:"sticky",top:0,zIndex:500,background:NAV_BG,display:"flex",alignItems:"center",padding:"0 14px",boxShadow:"0 2px 8px rgba(0,0,0,0.15)",height:50,overflowX:"auto",gap:0}}>
        <div style={{width:26,height:26,borderRadius:7,background:"linear-gradient(135deg,#3b82f6,#06b6d4)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:13,marginRight:10,flexShrink:0}}>🐾</div>

        {currentUser&&<div style={{fontSize:9,color:"#60a5fa",fontWeight:700,marginRight:8,flexShrink:0,whiteSpace:"nowrap",background:"#1e3a5f",padding:"2px 8px",borderRadius:10}}>👤 {currentUser.name}</div>}

        {VISIBLE_TABS.map(t=>(
          <button key={t.id} onClick={()=>setPage(t.id)} style={{height:50,padding:"0 11px",border:"none",background:"none",cursor:"pointer",fontWeight:700,fontSize:10,color:page===t.id?"#60a5fa":"#94a3b8",borderBottom:page===t.id?"2px solid #3b82f6":"2px solid transparent",flexShrink:0,whiteSpace:"nowrap",position:"relative"}}>
            {t.l}
            {t.id==="timeoff"&&pendingCount>0&&<span style={{position:"absolute",top:8,right:2,background:"#ef4444",color:"#fff",borderRadius:10,fontSize:7,padding:"1px 4px",fontWeight:700}}>{pendingCount}</span>}
            {t.id==="messages"&&isAdmin&&(unreadMsgCount>0||pendingSwapCount>0)&&<span style={{position:"absolute",top:8,right:2,background:"#ef4444",color:"#fff",borderRadius:10,fontSize:7,padding:"1px 4px",fontWeight:700}}>{unreadMsgCount||pendingSwapCount}</span>}
          </button>
        ))}

        {page==="schedule"&&!isAdmin&&(
          swapRequesterInfo
            ?<button onClick={()=>setSwapRequesterInfo(null)} style={{height:32,padding:"0 10px",margin:"0 4px",border:"1px solid #a78bfa",background:"#ede9fe",cursor:"pointer",fontWeight:700,fontSize:9,color:"#4c1d95",borderRadius:7,flexShrink:0,whiteSpace:"nowrap"}}>🔄 {swapRequesterInfo.name} · Cancel</button>
            :access?.type==="staff"&&<button onClick={()=>setSwapPinModal(true)} style={{height:32,padding:"0 10px",margin:"0 4px",border:"1px solid #334155",background:"none",cursor:"pointer",fontWeight:600,fontSize:9,color:"#94a3b8",borderRadius:7,flexShrink:0,whiteSpace:"nowrap"}}>🔄 Request Swap</button>
        )}

        {isAdmin&&<div style={{width:1,height:24,background:"#334155",margin:"0 4px",flexShrink:0}}/>}
        {isAdmin&&ADMIN_TABS.map(t=>(
          <button key={t.id} onClick={()=>setPage(t.id)} style={{height:50,padding:"0 11px",border:"none",background:"none",cursor:"pointer",fontWeight:700,fontSize:10,color:page===t.id?"#60a5fa":"#94a3b8",borderBottom:page===t.id?"2px solid #3b82f6":"2px solid transparent",flexShrink:0,whiteSpace:"nowrap"}}>
            {t.l}
          </button>
        ))}

        <div style={{marginLeft:"auto",display:"flex",alignItems:"center",gap:6,flexShrink:0}}>
          {vacCount>0&&<span style={{padding:"3px 7px",borderRadius:20,background:"#78350f",border:"1px solid #d97706",fontSize:8,color:"#fbbf24",fontWeight:600,whiteSpace:"nowrap"}}>{vacCount} VAC</span>}
          {sickCount>0&&<span style={{padding:"3px 7px",borderRadius:20,background:"#7f1d1d",border:"1px solid #ef4444",fontSize:8,color:"#fca5a5",fontWeight:600,whiteSpace:"nowrap"}}>{sickCount} SICK</span>}
          {undoStack&&isAdmin&&<Btn onClick={doUndo} style={{fontSize:8,border:"1px solid #a78bfa",color:"#4c1d95",background:"#ede9fe"}}>↩ Undo</Btn>}
          <Btn onClick={()=>setPrintOpen(true)} style={{fontSize:8,border:"1px solid #334155",color:"#64748b",background:"none"}}>🖨</Btn>
          {isAdmin
            ?<Btn onClick={lockAdmin} style={{fontSize:8,border:"1px solid #3b82f6",background:"#1e40af",color:"#93c5fd",fontWeight:700}}>🔓 Lock Admin</Btn>
            :<Btn onClick={openAdminPwd} style={{fontSize:8,border:"1px solid #f59e0b",background:"#78350f",color:"#fbbf24",fontWeight:700}}>🔒 Admin</Btn>
          }
          <Btn onClick={lockAll} style={{fontSize:8,border:"1px solid #334155",color:"#94a3b8",background:"none"}}>⏏ Sign Out</Btn>
        </div>
      </div>

      {/* ── CONTENT ──────────────────────────────────────────────── */}
      <div style={{padding:"16px 18px 80px"}}>
        {page==="schedule"&&(
          <HorizSchedule
            weeks={liveWeeks} isAdmin={isAdmin} C={C}
            staffPins={staffPins} staffUnlocked={staffUnlocked}
            swapRequesterInfo={swapRequesterInfo} swapRequests={swapRequests}
            customDayLabels={customDayLabels}
            onTap={onTapLive} onLong={onLongLive} onCtxMenu={onCtxLive}
            onHrs={(wid,g,ei,si,h)=>updLive(wid,g,ei,si,{h})}
            onSickHrs={(wid,g,ei,si,sh)=>updLive(wid,g,ei,si,{sh})}
            onArchive={isAdmin?archiveWeek:null}
            onApprove={approveReqLive} onDeny={denyReqLive}
            onApproveSwap={approveSwap} onDenySwap={denySwap}
            onSwapRequest={(wid,grp,ei,si,shift,date)=>setSwapModal({requesterName:swapRequesterInfo?.name,requesterGroup:swapRequesterInfo?.group,requesterShift:shift,requesterDate:date,weekId:wid,shiftIdx:si})}
            onWeekNoteChange={updLiveNote}
          />
        )}
        {page==="timeoff"&&(
          <TimeOffPage
            requests={requests} setRequests={setRequests}
            masterWeeks={masterWeeks} setMasterWeeks={setMasterWeeks}
            liveWeeks={liveWeeks} lockedTOWeeks={lockedTOWeeks} setLockedTOWeeks={setLockedTOWeeks}
            isAdmin={isAdmin} staffUnlocked={staffUnlocked} staffPins={staffPins}
            currentUser={currentUser}
            onRequestStaffPin={onRequestStaffPin} pwd={pwd} pwd2={pwd2} C={C}
          />
        )}
        {page==="messages"&&(
          <MessagesPage
            messages={messages} setMessages={setMessages}
            swapRequests={swapRequests}
            isAdmin={isAdmin} addAudit={addAudit} currentUser={currentUser}
            onApproveSwap={approveSwap} onDenySwap={denySwap}
            gasVerifyAnyPin={gasVerifyAnyPin}
          />
        )}
        {page==="master"&&isAdmin&&(
          <MasterPage
            masterWeeks={masterWeeks} setMasterWeeks={setMasterWeeks}
            liveWeeks={liveWeeks} setLiveWeeks={setLiveWeeks}
            masterArchived={masterArchived} setMasterArchived={setMasterArchived}
            liveArchived={liveArchived} setLiveArchived={setLiveArchived}
            masterBackfill={masterBackfill} setMasterBackfill={setMasterBackfill}
            C={C}
            onSC={info=>{const r=info.rect;setPicker({...info,pos:calcPickerPos(r)});setCtx(null);}}
            onRC={info=>{setCtx({...info,pos:{x:Math.min(info.x,window.innerWidth-230),y:Math.min(info.y,window.innerHeight-420)}});setPicker(null);}}
            requests={requests} setRequests={setRequests}
            addAudit={addAudit} pwd={pwd} pwd2={pwd2}
            pushUndo={pushUndo} customDayLabels={customDayLabels}
          />
        )}
        {page==="past-sched"&&isAdmin&&(
          <PastSchedules archived={liveArchived} onUnarchive={unarchiveWeek} onArchiveToMaster={archivePastToMaster} C={C}/>
        )}
        {page==="stats"&&isAdmin&&(
          <StatsPage requests={requests} liveWeeks={liveWeeks} liveArchived={liveArchived} masterWeeks={masterWeeks} masterArchived={masterArchived} masterBackfill={masterBackfill} C={C}/>
        )}
        {page==="admin"&&isAdmin&&(
          <AdminPage C={C} setC={setC} pwd={pwd} setPwd={setPwd} pwd2={pwd2} setPwd2={setPwd2}
            adminName1={adminName1} setAdminName1={setAdminName1} adminName2={adminName2} setAdminName2={setAdminName2}
            adminPin1={adminPin1} setAdminPin1={setAdminPin1} adminPin2={adminPin2} setAdminPin2={setAdminPin2}
            staffPins={staffPins} setStaffPins={setStaffPins} viewerPins={viewerPins} setViewerPins={setViewerPins}
            lockMs={lockMs} setLockMs={setLockMs} auditLog={auditLog}
            liveWeeks={liveWeeks} masterWeeks={masterWeeks} liveArchived={liveArchived} masterArchived={masterArchived}
            requests={requests} messages={messages} swapRequests={swapRequests}
            onClearAll={onClearAll} deletedEmps={deletedEmps}
            customDayLabels={customDayLabels} setCustomDayLabels={setCustomDayLabels}
            cellTypeStyles={cellTypeStyles} setCellTypeStyles={setCellTypeStyles}
            customCellTypes={customCellTypes} setCustomCellTypes={setCustomCellTypes}
            setLiveWeeks={setLiveWeeks} setLiveArchived={setLiveArchived}
            setMasterWeeks={setMasterWeeks} setMasterArchived={setMasterArchived}
            gasPost={gasPost} loadPinsFromGas={loadPinsFromGas}
          />
        )}
        {(["master","past-sched","stats","admin"].includes(page))&&!isAdmin&&(
          <div style={{textAlign:"center",marginTop:100}}>
            <div style={{fontSize:48,opacity:0.15,marginBottom:16}}>🔐</div>
            <div style={{fontWeight:700,fontSize:16,color:"#94a3b8",marginBottom:12}}>Admin unlock required</div>
            <Btn onClick={openAdminPwd} style={{fontSize:11,border:"1px solid #f59e0b",color:"#b45309",background:"#fef3c7"}}>🔒 Unlock Now</Btn>
          </div>
        )}
      </div>

      {/* ── STATUS BAR ───────────────────────────────────────────── */}
      <div style={{position:"fixed",bottom:0,left:0,right:0,height:24,background:NAV_BG,display:"flex",alignItems:"center",padding:"0 16px",boxShadow:"0 -1px 4px rgba(0,0,0,0.1)",zIndex:400}}>
        <span style={{fontSize:7,color:"#475569"}}>HPVH {APP_VERSION} · {isAdmin?`🔓 ADMIN – auto-locks ${LOCK_OPTIONS.find(o=>o.ms===lockMs)?.label||"5min"}`:"🔒 View mode"}</span>
        <span style={{marginLeft:"auto",fontSize:7,color:"#475569"}}>{liveArchived.length} archived · {liveWeeks.length} live · {pendingCount} pending · {unreadMsgCount+pendingSwapCount} inbox</span>
      </div>

      {/* ── OVERLAYS ─────────────────────────────────────────────── */}

      {/* Admin password modal */}
      {pwdModal&&(
        <Modal onClose={()=>setPwdModal(false)}>
          <div style={{padding:24,width:280}}>
            <div style={{fontWeight:700,fontSize:13,color:"#1e293b",marginBottom:12}}>🔒 Admin Login</div>
            <input type="password" autoFocus value={pwdInput} onChange={e=>{setPwdInput(e.target.value);setPwdErr(false);}} onKeyDown={e=>e.key==="Enter"&&tryAdminPwd()} placeholder="Password" style={{width:"100%",background:"#f8fafc",border:`1px solid ${pwdErr?"#ef4444":"#e2e8f0"}`,borderRadius:8,padding:"10px 12px",color:"#1e293b",fontSize:13,outline:"none",boxSizing:"border-box",marginBottom:4}}/>
            {pwdErr&&<div style={{fontSize:9,color:"#ef4444",fontWeight:700,marginBottom:6}}>⚠ Incorrect</div>}
            <div style={{display:"flex",gap:8,marginTop:10}}>
              <Btn onClick={tryAdminPwd} variant="primary" style={{flex:1,fontSize:11}}>Unlock</Btn>
              <Btn onClick={()=>setPwdModal(false)} style={{fontSize:11}}>Cancel</Btn>
            </div>
          </div>
        </Modal>
      )}

      {/* Staff PIN modal */}
      {staffPinModal&&(
        <StaffPinModal name={staffPinModal.name} group={staffPinModal.group} C={C} onUnlock={()=>grantStaffUnlock(staffPinModal.name,staffPinModal.group)} onClose={()=>setStaffPinModal(null)} gasVerifyPin={gasVerifyPin}/>
      )}

      {/* Swap PIN auth modal */}
      {swapPinModal&&(
        <Modal onClose={()=>setSwapPinModal(false)}>
          <div style={{padding:24}}>
            <div style={{fontWeight:700,fontSize:13,color:"#1e293b",marginBottom:8}}>🔄 Request Swap — Enter PIN</div>
            <GasPinPadAsync
              onEntry={async pin=>{
                const res=await gasVerifyAnyPin(pin);
                if(res.match){setSwapRequesterInfo({name:res.name,group:res.group});addAudit(res.name,"Initiated swap request");setSwapPinModal(false);}
              }}
              onCancel={()=>setSwapPinModal(false)}
            />
          </div>
        </Modal>
      )}

      {/* Swap request modal */}
      {swapModal&&(
        <SwapRequestModal
          requesterName={swapModal.requesterName} requesterGroup={swapModal.requesterGroup}
          requesterDate={swapModal.requesterDate} weekId={swapModal.weekId} shiftIdx={swapModal.shiftIdx}
          liveWeeks={liveWeeks} staffPins={staffPins} C={C}
          onSubmit={submitSwap} onClose={()=>setSwapModal(null)}
        />
      )}

      {/* Shift picker */}
      {picker&&(
        <ShiftPicker
          pos={picker.pos}
          currentShift={(picker.isMaster?masterWeeks:liveWeeks).find(w=>w.id===picker.weekId)?.groups[picker.group]?.[picker.empIdx]?.shifts[picker.shiftIdx]}
          shiftIdx={picker.shiftIdx}
          onSelect={applyPreset}
          onClose={()=>setPicker(null)}
        />
      )}

      {/* Context menu */}
      {ctx&&(
        <ContextMenu
          pos={ctx.pos}
          currentShift={ctxShift}
          C={C} customDayLabels={customDayLabels}
          onAction={ctxAction}
          onClose={()=>setCtx(null)}
        />
      )}

      {/* Print modal */}
      {printOpen&&<PrintModal weeks={liveWeeks} customDayLabels={customDayLabels} onClose={()=>setPrintOpen(false)}/>}
    </div>
  );
}

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
